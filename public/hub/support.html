<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/hub/hub-shell.js"></script>
<style>
  .support-wrap { max-width: 580px; }

  .support-header { margin-bottom: 1.75rem; }
  .support-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 400;
    color: var(--hub-text-primary, #1A1714);
    margin-bottom: 4px;
  }
  .support-header p { font-size: 14px; color: var(--hub-text-muted, #6B6560); }

  .support-form {
    background: var(--hub-chat-bg, #fff);
    border: 1px solid var(--hub-border, #E4E0D8);
    border-radius: 14px;
    padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .sf-field { display: flex; flex-direction: column; gap: 5px; }
  .sf-field label {
    font-size: 13px; font-weight: 700;
    color: var(--hub-text-primary, #1A1714);
    letter-spacing: 0.02em;
  }
  .sf-field input, .sf-field textarea {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--hub-text-primary, #1A1714);
    background: var(--hub-page-bg, #F4F2EE);
    border: 1px solid var(--hub-border, #E4E0D8);
    border-radius: 8px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    resize: vertical;
  }
  .sf-field input::placeholder, .sf-field textarea::placeholder { color: var(--hub-text-muted, #9A9488); }
  .sf-field input:focus, .sf-field textarea:focus { border-color: var(--gold, #C9A84C); }

  .sf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .sf-error {
    font-size: 13px; color: #C0392B;
    padding: 10px 12px;
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 8px;
    display: none;
  }
  .sf-error.visible { display: block; }

  .sf-submit {
    font-family: 'Lato', sans-serif;
    font-size: 14px; font-weight: 700;
    background: var(--gold, #C9A84C);
    color: var(--hub-btn-text, #0C0B09);
    border: none; border-radius: 8px;
    padding: 12px 24px;
    cursor: pointer; transition: opacity 0.15s;
    align-self: flex-start;
  }
  .sf-submit:hover { opacity: 0.85; }
  .sf-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .support-success {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
    background: var(--hub-chat-bg, #fff);
    border: 1px solid var(--hub-border, #E4E0D8);
    border-radius: 14px;
  }
  .support-success .success-icon { font-size: 40px; margin-bottom: 1rem; }
  .support-success h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 400;
    color: var(--hub-text-primary, #1A1714);
    margin-bottom: 8px;
  }
  .support-success p { font-size: 14px; color: var(--hub-text-muted, #6B6560); }

  .support-unavailable {
    padding: 2rem;
    background: rgba(201,168,76,0.06);
    border: 1px dashed rgba(201,168,76,0.2);
    border-radius: 12px;
    font-size: 14px;
    color: var(--hub-text-muted, #6B6560);
  }

  @media (max-width: 500px) {
    .sf-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="hs-overlay"></div>
<aside id="hs-sidebar"></aside>
<div id="hs-main">
  <header id="hs-header"></header>
  <main class="hs-content">
    <div class="support-wrap">

      <div class="support-header">
        <h2>Support</h2>
        <p id="support-sub">Send a message and we'll get back to you.</p>
      </div>

      <!-- FORM -->
      <div class="support-form" id="support-form">
        <div class="sf-row">
          <div class="sf-field">
            <label for="sf-name">Your Name</label>
            <input type="text" id="sf-name" placeholder="Jane Smith">
          </div>
          <div class="sf-field">
            <label for="sf-email">Your Email</label>
            <input type="email" id="sf-email" placeholder="jane@email.com">
          </div>
        </div>
        <div class="sf-field">
          <label for="sf-subject">Subject</label>
          <input type="text" id="sf-subject" placeholder="What do you need help with?">
        </div>
        <div class="sf-field">
          <label for="sf-message">Message</label>
          <textarea id="sf-message" rows="5" placeholder="Tell us more about what you need..."></textarea>
        </div>
        <div class="sf-error" id="sf-error"></div>
        <button class="sf-submit" id="sf-submit" onclick="submitSupport()">Send Message</button>
      </div>

      <!-- SUCCESS -->
      <div class="support-success" id="support-success">
        <div class="success-icon">✅</div>
        <h3>Message sent!</h3>
        <p id="success-sub">Your message has been received. We'll get back to you soon.</p>
      </div>

      <!-- NO FIREBASE -->
      <div class="support-unavailable" id="support-unavailable" style="display:none;">
        Support is not available yet for this hub. Check back soon.
      </div>

    </div>
  </main>
</div>

<script>
  var _studentDb = null;
  var _slug = '';

  function submitSupport() {
    var name    = document.getElementById('sf-name').value.trim();
    var email   = document.getElementById('sf-email').value.trim();
    var subject = document.getElementById('sf-subject').value.trim();
    var message = document.getElementById('sf-message').value.trim();
    var errEl   = document.getElementById('sf-error');

    errEl.className = 'sf-error';
    if (!name || !email || !message) {
      errEl.textContent = 'Please fill in your name, email, and message.';
      errEl.className = 'sf-error visible';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.className = 'sf-error visible';
      return;
    }

    var btn = document.getElementById('sf-submit');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    _studentDb.collection('supportRequests').add({
      hubSlug:   _slug,
      name:      name,
      email:     email,
      subject:   subject || '(No subject)',
      message:   message,
      read:      false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      document.getElementById('support-form').style.display = 'none';
      document.getElementById('support-success').style.display = 'block';
    }).catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Send Message';
      errEl.textContent = 'Something went wrong. Please try again.';
      errEl.className = 'sf-error visible';
    });
  }

  initHubPage('support', function(hub, slug, studentAuth, studentDb) {
    _slug = slug;

    if (hub.hubName) document.getElementById('support-sub').textContent = 'Send a message to ' + hub.hubName + ' and they\'ll get back to you.';
    if (hub.hubName) document.getElementById('success-sub').textContent = hub.hubName + ' has received your message and will get back to you soon.';

    // Pre-fill email if logged in
    if (studentAuth) {
      studentAuth.onAuthStateChanged(function(user) {
        if (user) {
          if (user.email) document.getElementById('sf-email').value = user.email;
          if (user.displayName) document.getElementById('sf-name').value = user.displayName;
        }
      });
    }

    if (studentDb) {
      _studentDb = studentDb;
    } else {
      document.getElementById('support-form').style.display = 'none';
      document.getElementById('support-unavailable').style.display = 'block';
    }
  });
</script>
</body>
</html>

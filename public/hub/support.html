<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/hub/hub-shell.js"></script>
<style>
  .page-intro h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--hub-text-primary, #1A1714); margin-bottom: 6px; }
  .page-intro p { font-size: 14px; color: var(--hub-text-muted, #6B6560); }
  .coming-soon { margin-top: 2rem; padding: 2rem; background: rgba(201,168,76,0.06); border: 1px dashed rgba(201,168,76,0.2); border-radius: 12px; color: var(--hub-text-muted, #6B6560); font-size: 14px; }
</style>
</head>
<body>

<div id="hs-overlay"></div>
<aside id="hs-sidebar"></aside>
<div id="hs-main">
  <header id="hs-header"></header>
  <main class="hs-content">
    <div class="page-intro">
      <h2>Support</h2>
      <p id="support-sub">Get help from your hub owner.</p>
    </div>
    <div class="coming-soon">Support features coming soon — contact your hub owner, FAQs, and resources will be available here.</div>
  </main>
</div>

<script>
  initHubPage('support', function(hub, slug) {
    if (hub.hubName) document.getElementById('support-sub').textContent = 'Get help and resources from ' + hub.hubName + '.';
  });
</script>
</body>
</html>

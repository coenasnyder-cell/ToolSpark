<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Results</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513796:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.12);
    --radius: 14px;
    --radius-sm: 9px;
    --hub-page-bg:      #0C0B09;
    --hub-chat-bg:      #141210;
    --hub-text-primary: #F0EDE6;
    --hub-text-muted:   #9A9488;
    --hub-border:       #2A2720;
    --hub-btn-text:     #0C0B09;
    --hub-nav-bg:       #0C0B09;
    --hub-nav-text:     #F0EDE6;
    --hub-nav-btn:      #C9A84C;
  }

  html, body { height: 100%; height: 100dvh; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--hub-page-bg);
    color: var(--hub-text-primary);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .hub-nav {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem;
    height: 56px;
    background: var(--hub-nav-bg);
    border-bottom: 1px solid var(--hub-border);
  }
  .hub-nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .hub-logo-img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; display: none; }
  .hub-logo-img.visible { display: block; }
  .hub-name-text { font-size: 15px; font-weight: 700; color: var(--hub-nav-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .btn-new-session-nav {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1px solid var(--hub-nav-btn);
    color: var(--hub-nav-btn);
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .btn-new-session-nav:hover { opacity: 0.75; }

  /* RESULTS AREA */
  .results-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 1rem 4rem;
    min-height: 0;
  }
  .results-scroll::-webkit-scrollbar { width: 4px; }
  .results-scroll::-webkit-scrollbar-track { background: transparent; }
  .results-scroll::-webkit-scrollbar-thumb { background: var(--hub-border); border-radius: 2px; }

  .results-inner {
    max-width: 860px;
    margin: 0 auto;
  }

  .results-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 1.1rem;
  }

  .report-body {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    color: var(--hub-text-primary);
  }
  .report-lede {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: var(--radius);
    padding: 1.35rem 1.4rem;
    box-shadow: 0 12px 36px rgba(0,0,0,0.18);
  }
  .report-lede-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.55rem;
  }
  .report-lede-copy {
    font-size: 16px;
    line-height: 1.85;
    color: var(--hub-text-primary);
  }
  .report-sections {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .report-section-card {
    background: linear-gradient(180deg, rgba(20,18,16,0.98), rgba(17,15,13,0.98));
    border: 1px solid var(--hub-border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 12px 34px rgba(0,0,0,0.18);
  }
  .report-section-head {
    padding: 1rem 1.25rem 0.95rem;
    border-bottom: 1px solid var(--hub-border);
    background: rgba(201,168,76,0.05);
  }
  .report-section-kicker {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.35rem;
  }
  .report-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    line-height: 1.2;
    color: var(--hub-text-primary);
  }
  .report-section-body {
    padding: 1.2rem 1.25rem 1.25rem;
    font-size: 15px;
    line-height: 1.82;
    color: var(--hub-text-primary);
  }
  .report-section-body > *:last-child { margin-bottom: 0; }
  .report-section-body p { margin-bottom: 0.95rem; }
  .report-section-body strong { color: var(--gold); font-weight: 700; }
  .report-section-body em { color: var(--hub-text-muted); font-style: italic; }
  .report-section-body h3 {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 999px;
    padding: 5px 10px;
    margin: 1rem 0 0.7rem;
  }
  .report-section-body h3:first-child { margin-top: 0; }
  .report-section-body ul,
  .report-section-body ol {
    padding-left: 1.2rem;
    margin: 0 0 1rem;
  }
  .report-section-body li {
    margin-bottom: 0.55rem;
    line-height: 1.75;
  }
  .report-section-body code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.92em;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 0.1rem 0.35rem;
  }
  .report-section-body hr {
    border: none;
    border-top: 1px solid var(--hub-border);
    margin: 1rem 0;
  }
  .report-fallback-card {
    background: linear-gradient(180deg, rgba(20,18,16,0.98), rgba(17,15,13,0.98));
    border: 1px solid var(--hub-border);
    border-radius: var(--radius);
    padding: 1.2rem 1.25rem 1.25rem;
    box-shadow: 0 12px 34px rgba(0,0,0,0.18);
    font-size: 15px;
    line-height: 1.82;
  }

  /* ACTIONS */
  .results-actions {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--hub-border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-start-new {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    background: var(--gold);
    color: var(--hub-btn-text);
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .btn-start-new:hover { opacity: 0.85; }
  .btn-download {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1px solid var(--hub-border);
    color: var(--hub-text-muted);
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .btn-download:hover { border-color: var(--hub-text-muted); color: var(--hub-text-primary); }

  /* LOADING / ERROR */
  .state-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--hub-text-muted);
    font-size: 15px;
    text-align: center;
    padding: 2rem;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--hub-border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .results-scroll { padding: 1.5rem 1rem 3rem; }
    .report-lede-copy,
    .report-section-body,
    .report-fallback-card { font-size: 14px; }
    .report-section-title { font-size: 20px; }
    .results-actions { flex-direction: column; }
    .btn-start-new { text-align: center; }
  }
</style>
</head>
<body>

<nav class="hub-nav">
  <div class="hub-nav-left">
    <img id="nav-logo" class="hub-logo-img" src="" alt="logo">
    <span class="hub-name-text" id="nav-name"></span>
  </div>
  <div class="nav-right">
    <a id="back-to-hub-btn" href="#" class="btn-new-session-nav" style="margin-right:6px;">← Hub</a>
    <a id="new-session-btn" href="#" class="btn-new-session-nav">New Session</a>
  </div>
</nav>

<div id="loading-state" class="state-center">
  <div class="spinner"></div>
  <span>Loading your results...</span>
</div>

<div id="no-results-state" class="state-center" style="display:none;">
  <span style="font-size:32px;">⚡</span>
  <p>No results found.</p>
  <a id="back-link" href="#" class="btn-start-new">Start a Session</a>
</div>

<div id="results-wrap" style="display:none;" class="results-scroll">
  <div class="results-inner">
    <div class="results-label" id="results-label">⚡ Your Results</div>
    <div class="report-body" id="report-body"></div>
    <div class="results-actions">
      <a id="new-session-link" href="#" class="btn-start-new">Start New Session</a>
      <button class="btn-download" onclick="downloadResults()">Download Results</button>
    </div>
  </div>
</div>

<script>
  function injectGA(id) {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag(){ window.dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', id);
  }

  var slug = window.location.pathname.split('/').filter(Boolean)[1] || '';

  function toolUrl() { return '/hub/' + slug + '/tool'; }

  document.getElementById('new-session-btn').href = toolUrl();
  document.getElementById('back-link').href = toolUrl();
  document.getElementById('new-session-link').href = toolUrl();
  document.getElementById('back-to-hub-btn').href = '/hub/' + slug + '/dashboard';

  function renderMarkdown(text) {
    if (!text) return '';
    var escaped = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    var lines = escaped.split('\n');
    var html = '';
    var inList = false;
    var listType = '';
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (/^### (.+)/.test(line)) {
        if (inList) { html += '</' + listType + '>'; inList = false; }
        html += '<h3>' + line.replace(/^### /, '') + '</h3>';
      } else if (/^## (.+)/.test(line)) {
        if (inList) { html += '</' + listType + '>'; inList = false; }
        html += '<h2>' + line.replace(/^## /, '') + '</h2>';
      } else if (/^- (.+)/.test(line)) {
        if (!inList || listType !== 'ul') {
          if (inList) html += '</' + listType + '>';
          html += '<ul>'; inList = true; listType = 'ul';
        }
        html += '<li>' + formatInline(line.replace(/^- /, '')) + '</li>';
      } else if (/^\d+\. (.+)/.test(line)) {
        if (!inList || listType !== 'ol') {
          if (inList) html += '</' + listType + '>';
          html += '<ol>'; inList = true; listType = 'ol';
        }
        html += '<li>' + formatInline(line.replace(/^\d+\. /, '')) + '</li>';
      } else if (/^---/.test(line)) {
        if (inList) { html += '</' + listType + '>'; inList = false; }
        html += '<hr>';
      } else if (line.trim() === '') {
        if (inList) { html += '</' + listType + '>'; inList = false; }
      } else {
        if (inList) { html += '</' + listType + '>'; inList = false; }
        html += '<p>' + formatInline(line) + '</p>';
      }
    }
    if (inList) html += '</' + listType + '>';
    return html;
  }

  function formatInline(text) {
    return text
      .replace(/\*\*\s*$/, '')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }

  function stripHtml(html) {
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
  }

  function buildReadableReport(text) {
    var rendered = renderMarkdown(text);
    var temp = document.createElement('div');
    temp.innerHTML = rendered;

    var introHtml = '';
    var sections = [];
    var currentSection = null;

    Array.prototype.slice.call(temp.childNodes).forEach(function(node) {
      if (node.nodeType === 1 && node.tagName === 'H2') {
        currentSection = {
          title: node.textContent.trim(),
          content: ''
        };
        sections.push(currentSection);
        return;
      }

      var nodeHtml = node.outerHTML || node.textContent || '';
      if (!nodeHtml.trim()) return;

      if (currentSection) {
        currentSection.content += nodeHtml;
      } else {
        introHtml += nodeHtml;
      }
    });

    if (!sections.length) {
      return '<div class="report-fallback-card">' + rendered + '</div>';
    }

    var introText = stripHtml(introHtml);
    var ledeHtml = introText
      ? (
          '<div class="report-lede">' +
            '<div class="report-lede-label">Quick Read</div>' +
            '<div class="report-lede-copy">' + introHtml + '</div>' +
          '</div>'
        )
      : '';

    var sectionsHtml = sections.map(function(section, index) {
      var title = section.title || ('Section ' + (index + 1));
      var body = section.content || '<p>No details were included in this section.</p>';
      return (
        '<section class="report-section-card">' +
          '<div class="report-section-head">' +
            '<div class="report-section-kicker">Section ' + (index + 1) + '</div>' +
            '<div class="report-section-title">' + title + '</div>' +
          '</div>' +
          '<div class="report-section-body">' + body + '</div>' +
        '</section>'
      );
    }).join('');

    return ledeHtml + '<div class="report-sections">' + sectionsHtml + '</div>';
  }

  var currentReportText = '';

  function downloadResults() {
    if (!currentReportText) return;
    var toolName = document.getElementById('results-label').textContent.replace('⚡ Your ', '') || 'Results';
    var filename = toolName.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-results.txt';
    var blob = new Blob([currentReportText], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var resultId = new URLSearchParams(window.location.search).get('id');

  function showResult(reportText) {
    currentReportText = reportText;
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('report-body').innerHTML = buildReadableReport(reportText);
    document.getElementById('results-wrap').style.display = 'block';
  }

  function showNoResults() {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('no-results-state').style.display = 'flex';
  }

  function applyHubBranding(hub) {
    var color = hub.primaryColor || '#C9A84C';
    document.documentElement.style.setProperty('--gold', color);
    var colorMap = {
      '--hub-page-bg':      hub.pageBgColor,
      '--hub-text-primary': hub.textPrimaryColor,
      '--hub-text-muted':   hub.textMutedColor,
      '--hub-border':       hub.borderColor,
      '--hub-btn-text':     hub.btnTextColor,
      '--hub-nav-bg':       hub.navBgColor,
      '--hub-nav-text':     hub.navTextColor,
      '--hub-nav-btn':      hub.navBtnColor
    };
    Object.keys(colorMap).forEach(function(prop) {
      if (colorMap[prop]) document.documentElement.style.setProperty(prop, colorMap[prop]);
    });
    document.title = (hub.toolName || 'Your Results') + (hub.hubName ? ' — ' + hub.hubName : '');
    if (hub.gaTrackingId) injectGA(hub.gaTrackingId);
    if (hub.logoUrl) {
      var lg = document.getElementById('nav-logo');
      lg.src = hub.logoUrl;
      lg.classList.add('visible');
    }
    document.getElementById('nav-name').textContent = hub.hubName || '';
    document.getElementById('results-label').textContent = '⚡ Your ' + (hub.toolName || 'Results');
  }

  if (!slug) {
    showNoResults();
  } else {
    db.collection('hubs').doc(slug).get().then(function(snap) {
      var hub = snap.exists ? snap.data() : {};
      applyHubBranding(hub);

      if (resultId && hub.studentFirebase && hub.studentFirebase.projectId) {
        // Load result from student's Firestore
        try {
          var studentApp;
          try { studentApp = firebase.app('student'); }
          catch(e) { studentApp = firebase.initializeApp(hub.studentFirebase, 'student'); }
          var studentDb = studentApp.firestore();

          studentDb.collection('toolResults').doc(resultId).get().then(function(doc) {
            if (doc.exists && doc.data().reportText) {
              showResult(doc.data().reportText);
            } else {
              showNoResults();
            }
          }).catch(function() { showNoResults(); });

        } catch(e) { showNoResults(); }

      } else {
        // Fallback: sessionStorage (no student Firebase connected)
        var reportText = sessionStorage.getItem('hub_result_' + slug);
        if (reportText) {
          sessionStorage.removeItem('hub_result_' + slug);
          showResult(reportText);
        } else {
          showNoResults();
        }
      }

    }).catch(function() { showNoResults(); });
  }
</script>

</body>
</html>

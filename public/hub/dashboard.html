<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    document.addEventListener('DOMContentLoaded', () => {
      firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
    });
  </script>
  <script src="/js/hub-shell.js"></script>
  <style>
    body {
      display: flex;
      min-height: 100vh;
    }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 40px 32px;
      max-width: 900px;
    }

    .welcome-head {
      margin-bottom: 32px;
    }
    .welcome-eyebrow {
      font-size: 13px;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    /* Quick access grid */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .quick-card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, transform .15s;
      cursor: pointer;
      border: 1.5px solid transparent;
    }
    .quick-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      transform: translateY(-1px);
      border-color: var(--border);
    }
    .quick-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .quick-card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .quick-card-sub {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.4;
    }

    /* Announcements */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }
    .empty-state {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    /* Loading */
    #hub-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text3);
    }

    @media (max-width: 768px) {
      .main { margin-left: 0; padding: 80px 16px 32px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="hub-loading">Loading...</div>

  <div id="hub-member-sidebar"></div>

  <!-- Main content -->
  <main class="main" id="main-content" style="display:none;">
    <div class="welcome-head">
      <div class="welcome-eyebrow" id="welcome-eyebrow">Welcome back</div>
      <div class="welcome-title" id="welcome-title">Good to see you.</div>
    </div>

    <div class="quick-grid">
      <a class="quick-card" id="card-courses" href="#">
        <div class="quick-icon" style="background:rgba(107,47,179,.1);">
          <svg width="22" height="22" fill="none" stroke="#6B2FB3" stroke-width="2" viewBox="0 0 24 24">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="quick-card-title">Courses</div>
        <div class="quick-card-sub">Access your training and lessons.</div>
      </a>

<div class="quick-card" style="opacity:.5;cursor:default;">
        <div class="quick-icon" style="background:rgba(107,47,179,.06);">
          <svg width="22" height="22" fill="none" stroke="#6B2FB3" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="quick-card-title">Community</div>
        <div class="quick-card-sub">Coming soon.</div>
      </div>
    </div>

    <div class="section-label">Announcements</div>
    <div class="empty-state" id="announcements-area">
      Nothing here yet. Check back soon.
    </div>
  </main>

  <script>
    window.HUB_MEMBER_ACTIVE = 'dashboard';

    initHubPage(function(hub, slug, creatorId, user) {
      const firstName = (user.displayName || '').split(' ')[0] || 'there';
      document.getElementById('welcome-eyebrow').textContent = hub.displayName;
      document.getElementById('welcome-title').textContent   = 'Welcome back, ' + firstName + '.';
      document.getElementById('card-courses').href = '/hub/courses?hub=' + slug;
      document.getElementById('main-content').style.display = 'block';
    });
  </script>
</body>
</html>

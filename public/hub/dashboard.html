<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    document.addEventListener('DOMContentLoaded', () => {
      firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
    });
  </script>
  <script src="/js/hub-shell.js"></script>
  <style>
    body {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 50;
    }

    .sidebar-top {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-hub-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #000;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .sidebar-hub-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sidebar-hub-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s, color .15s;
      cursor: pointer;
    }
    .nav-item:hover {
      background: var(--card-alt);
      color: var(--text);
    }
    .nav-item.active {
      background: rgba(107,47,179,.08);
      color: var(--purple);
      font-weight: 700;
    }
    .nav-item svg {
      flex-shrink: 0;
      opacity: .6;
    }
    .nav-item.active svg { opacity: 1; }
    .nav-item.disabled {
      opacity: .4;
      cursor: default;
      pointer-events: none;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .sidebar-user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      padding: 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-user-email {
      font-size: 11px;
      color: var(--text3);
      padding: 0 4px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sign-out-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      width: 100%;
      text-align: left;
      transition: color .15s, background .15s;
    }
    .sign-out-btn:hover { background: var(--red-bg); color: var(--red); }

    /* Mobile top bar */
    .mobile-bar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
      z-index: 50;
    }
    .mobile-hub-name {
      font-size: 15px;
      font-weight: 700;
    }
    .mobile-menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text);
    }
    .mobile-nav-drawer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    .mobile-nav-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.4);
    }
    .mobile-nav-panel {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }
    .mobile-nav-close {
      background: none;
      border: none;
      cursor: pointer;
      align-self: flex-end;
      padding: 4px;
      color: var(--text2);
      margin-bottom: 16px;
    }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 40px 32px;
      max-width: 900px;
    }

    .welcome-head {
      margin-bottom: 32px;
    }
    .welcome-eyebrow {
      font-size: 13px;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    /* Quick access grid */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .quick-card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, transform .15s;
      cursor: pointer;
      border: 1.5px solid transparent;
    }
    .quick-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      transform: translateY(-1px);
      border-color: var(--border);
    }
    .quick-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .quick-card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .quick-card-sub {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.4;
    }

    /* Announcements */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }
    .empty-state {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    /* Loading */
    #hub-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text3);
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-bar { display: flex; }
      .main { margin-left: 0; padding: 80px 16px 32px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="hub-loading">Loading...</div>

  <!-- Mobile top bar -->
  <div class="mobile-bar" id="mobile-bar" style="display:none;">
    <div class="mobile-hub-name" id="mobile-hub-name"></div>
    <button class="mobile-menu-btn" onclick="openMobileNav()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Mobile nav drawer -->
  <div class="mobile-nav-drawer" id="mobile-nav-drawer">
    <div class="mobile-nav-backdrop" onclick="closeMobileNav()"></div>
    <div class="mobile-nav-panel">
      <button class="mobile-nav-close" onclick="closeMobileNav()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="mobile-nav-items"></div>
    </div>
  </div>

  <!-- Desktop sidebar -->
  <aside class="sidebar" id="sidebar" style="display:none;">
    <div class="sidebar-top">
      <div class="sidebar-hub-logo" id="sidebar-logo">
        <span id="sidebar-initial">H</span>
        <img id="sidebar-logo-img" src="" alt="" style="display:none;" />
      </div>
      <div class="sidebar-hub-name" id="sidebar-hub-name"></div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <div class="sidebar-user-name" id="sidebar-user-name"></div>
      <div class="sidebar-user-email" id="sidebar-user-email"></div>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main-content" style="display:none;">
    <div class="welcome-head">
      <div class="welcome-eyebrow" id="welcome-eyebrow">Welcome back</div>
      <div class="welcome-title" id="welcome-title">Good to see you.</div>
    </div>

    <div class="quick-grid">
      <a class="quick-card" id="card-courses" href="#">
        <div class="quick-icon" style="background:rgba(107,47,179,.1);">
          <svg width="22" height="22" fill="none" stroke="#6B2FB3" stroke-width="2" viewBox="0 0 24 24">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="quick-card-title">Courses</div>
        <div class="quick-card-sub">Access your training and lessons.</div>
      </a>

<div class="quick-card" style="opacity:.5;cursor:default;">
        <div class="quick-icon" style="background:rgba(107,47,179,.06);">
          <svg width="22" height="22" fill="none" stroke="#6B2FB3" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="quick-card-title">Community</div>
        <div class="quick-card-sub">Coming soon.</div>
      </div>
    </div>

    <div class="section-label">Announcements</div>
    <div class="empty-state" id="announcements-area">
      Nothing here yet. Check back soon.
    </div>
  </main>

  <script>
    const NAV_ITEMS = [
      {
        label: 'Dashboard',
        href:  'dashboard',
        icon:  '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'
      },
      {
        label: 'Courses',
        href:  'courses',
        icon:  '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>'
      },
{
        label:    'Community',
        href:     null,
        disabled: true,
        icon:     '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
      }
    ];

    let hubSlug = '';

    function buildNavItem(item, isActive) {
      const cls   = ['nav-item', isActive ? 'active' : '', item.disabled ? 'disabled' : ''].filter(Boolean).join(' ');
      const href  = item.href ? `/hub/${item.href}?hub=${hubSlug}` : '#';
      const tag   = item.href && !item.disabled ? 'a' : 'div';
      const hattr = item.href && !item.disabled ? `href="${href}"` : '';
      return `<${tag} class="${cls}" ${hattr}>${item.icon}<span>${item.label}</span></${tag}>`;
    }

    function renderNav(slug) {
      hubSlug = slug;
      const nav = NAV_ITEMS.map(item => buildNavItem(item, item.href === 'dashboard')).join('');
      document.getElementById('sidebar-nav').innerHTML   = nav;
      document.getElementById('mobile-nav-items').innerHTML = nav;
    }

    function openMobileNav()  { document.getElementById('mobile-nav-drawer').style.display = 'block'; }
    function closeMobileNav() { document.getElementById('mobile-nav-drawer').style.display = 'none'; }

    function signOut() {
      auth.signOut().then(() => { window.location.href = '/hub/join?hub=' + hubSlug; });
    }

    // Init
    initHubPage(function(hub, slug, creatorId, user) {
      hubSlug = slug;

      // Sidebar
      const name    = hub.displayName || 'Your Hub';
      const initial = name.charAt(0).toUpperCase();
      document.getElementById('sidebar-hub-name').textContent = name;
      document.getElementById('sidebar-initial').textContent  = initial;
      document.getElementById('mobile-hub-name').textContent  = name;

      if (hub.branding && hub.branding.logoUrl) {
        const img = document.getElementById('sidebar-logo-img');
        img.src           = hub.branding.logoUrl;
        img.style.display = 'block';
        document.getElementById('sidebar-initial').style.display = 'none';
      }

      // User info in sidebar
      const displayName = user.displayName || user.email;
      document.getElementById('sidebar-user-name').textContent  = displayName;
      document.getElementById('sidebar-user-email').textContent = user.email;

      // Welcome message
      const firstName = (user.displayName || '').split(' ')[0] || 'there';
      document.getElementById('welcome-eyebrow').textContent = hub.displayName;
      document.getElementById('welcome-title').textContent   = 'Welcome back, ' + firstName + '.';

      // Quick card links
      document.getElementById('card-courses').href = '/hub/courses?hub=' + slug;

      // Render nav
      renderNav(slug);

      // Show UI
      document.getElementById('hub-loading').style.display  = 'none';
      document.getElementById('sidebar').style.display      = 'flex';
      document.getElementById('main-content').style.display = 'block';

      // Mobile bar
      if (window.innerWidth <= 768) {
        document.getElementById('mobile-bar').style.display = 'flex';
      }
    });
  </script>
</body>
</html>

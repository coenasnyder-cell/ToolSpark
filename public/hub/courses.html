<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/hub/hub-shell.js"></script>
<style>
  .courses-header { margin-bottom: 2rem; }
  .courses-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--hub-text-primary, #1A1714); margin-bottom: 4px; }
  .courses-header p { font-size: 14px; color: var(--hub-text-muted, #6B6560); }

  .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

  .course-card { background: var(--hub-chat-bg, #fff); border: 1px solid var(--hub-border, #E4E0D8); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; transition: box-shadow 0.15s, border-color 0.15s; cursor: pointer; }
  .course-card:hover { border-color: var(--gold, #C9A84C); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .course-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: var(--hub-nav-bg, #0C0B09); overflow: hidden; }
  .course-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .course-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1A1714 0%, #2C2720 100%); }
  .course-thumb-placeholder svg { opacity: 0.2; }

  .course-progress-bar { height: 3px; background: var(--hub-border, #E4E0D8); }
  .course-progress-fill { height: 100%; background: var(--gold, #C9A84C); transition: width 0.3s; }

  .course-body { padding: 1rem 1.1rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .course-title { font-size: 15px; font-weight: 700; color: var(--hub-text-primary, #1A1714); line-height: 1.3; }
  .course-desc { font-size: 13px; color: var(--hub-text-muted, #6B6560); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .course-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; }
  .course-lessons { font-size: 12px; color: var(--hub-text-muted, #9A9488); }
  .course-cta { font-size: 12px; font-weight: 700; color: var(--gold, #C9A84C); }

  .courses-empty { text-align: center; padding: 3rem 1rem; color: var(--hub-text-muted, #9A9488); font-size: 14px; border: 1px dashed var(--hub-border, #E4E0D8); border-radius: 12px; }
  .courses-loading { text-align: center; padding: 2rem; color: var(--hub-text-muted, #9A9488); font-size: 14px; }
</style>
</head>
<body>

<div id="hs-overlay"></div>
<aside id="hs-sidebar"></aside>
<div id="hs-main">
  <header id="hs-header"></header>
  <main class="hs-content">

    <div class="courses-header">
      <h2 id="courses-title">Courses &amp; Training</h2>
      <p id="courses-sub">Step-by-step programs to help you get results.</p>
    </div>

    <div id="courses-grid" class="courses-grid">
      <div class="courses-loading">Loading courses...</div>
    </div>

  </main>
</div>

<script>
  initHubPage('courses', function(hub, slug, studentAuth, studentDb) {
    if (hub.hubName) {
      document.getElementById('courses-title').textContent = hub.hubName + ' Courses';
      document.getElementById('courses-sub').textContent = 'Step-by-step training from ' + hub.hubName + '.';
    }

    if (!studentDb) {
      document.getElementById('courses-grid').innerHTML = '<div class="courses-empty">Courses coming soon — check back shortly.</div>';
      return;
    }

    studentDb.collection('courses')
      .where('isPublished', '==', true)
      .orderBy('order')
      .get()
      .then(function(snap) {
        var grid = document.getElementById('courses-grid');
        if (snap.empty) {
          grid.innerHTML = '<div class="courses-empty">Courses coming soon — check back shortly.</div>';
          return;
        }

        grid.innerHTML = snap.docs.map(function(doc) {
          var c = doc.data();
          var lessonCount = typeof c.lessonCount === 'number' ? c.lessonCount : 0;
          var thumb = c.thumbnail
            ? '<img src="' + escHtml(c.thumbnail) + '" alt="' + escHtml(c.title || '') + '">'
            : '<div class="course-thumb-placeholder"><svg width="48" height="48" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 17A2.5 2.5 0 014 14.5V5a2 2 0 012-2h14v14"/></svg></div>';

          return '<div class="course-card" onclick="openCourse(\'' + escHtml(doc.id) + '\',\'' + escHtml(slug) + '\')">' +
            '<div class="course-thumb">' + thumb + '</div>' +
            '<div class="course-progress-bar"><div class="course-progress-fill" style="width:0%"></div></div>' +
            '<div class="course-body">' +
              '<div class="course-title">' + escHtml(c.title || 'Untitled Course') + '</div>' +
              (c.description ? '<div class="course-desc">' + escHtml(c.description) + '</div>' : '') +
              '<div class="course-meta">' +
                '<span class="course-lessons">' + lessonCount + ' lesson' + (lessonCount === 1 ? '' : 's') + '</span>' +
                '<span class="course-cta">Start →</span>' +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');
      }).catch(function(e) {
        console.error(e);
        document.getElementById('courses-grid').innerHTML =
          '<div class="courses-empty">Could not load courses. Please try again later.</div>';
      });
  });


  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function openCourse(courseId, slug) {
    window.location.href = '/hub/' + slug + '/course?id=' + courseId;
  }
</script>
</body>
</html>

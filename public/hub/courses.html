<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    document.addEventListener('DOMContentLoaded', () => {
      firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
    });
  </script>
  <script src="/js/hub-shell.js"></script>
  <style>
    body {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar — identical structure to dashboard */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 50;
    }
    .sidebar-top {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-hub-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #000;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .sidebar-hub-logo img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-hub-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s, color .15s;
    }
    .nav-item:hover { background: var(--card-alt); color: var(--text); }
    .nav-item.active { background: rgba(107,47,179,.08); color: var(--purple); font-weight: 700; }
    .nav-item svg { flex-shrink: 0; opacity: .6; }
    .nav-item.active svg { opacity: 1; }
    .nav-item.disabled { opacity: .4; cursor: default; pointer-events: none; }
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .sidebar-user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      padding: 0 4px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-user-email {
      font-size: 11px;
      color: var(--text3);
      padding: 0 4px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sign-out-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      width: 100%;
      text-align: left;
      transition: color .15s, background .15s;
    }
    .sign-out-btn:hover { background: var(--red-bg); color: var(--red); }

    /* Mobile top bar */
    .mobile-bar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
      z-index: 50;
    }
    .mobile-hub-name { font-size: 15px; font-weight: 700; }
    .mobile-menu-btn {
      background: none; border: none; cursor: pointer; padding: 4px; color: var(--text);
    }
    .mobile-nav-drawer { display: none; position: fixed; inset: 0; z-index: 100; }
    .mobile-nav-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
    .mobile-nav-panel {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }
    .mobile-nav-close {
      background: none; border: none; cursor: pointer;
      align-self: flex-end; padding: 4px; color: var(--text2); margin-bottom: 16px;
    }

    /* Main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 40px 32px;
      max-width: 960px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 28px;
    }

    /* Courses grid */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .course-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: box-shadow .15s, transform .15s;
      border: 1.5px solid transparent;
    }
    .course-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      transform: translateY(-2px);
      border-color: var(--border);
    }

    .course-cover {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--purple) 100%);
      position: relative;
      overflow: hidden;
    }
    .course-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .course-cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: rgba(255,255,255,.4);
    }

    .course-body {
      padding: 18px 20px;
    }
    .course-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .course-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .course-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .course-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(107,47,179,.1);
      color: var(--purple);
    }
    .course-lesson-count {
      font-size: 12px;
      color: var(--text3);
    }

    /* States */
    .empty-state {
      grid-column: 1 / -1;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .empty-state-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state-sub {
      font-size: 14px;
      color: var(--text2);
    }

    .courses-loading {
      grid-column: 1 / -1;
      padding: 48px 0;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
    }

    #hub-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text3);
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-bar { display: flex; }
      .main { margin-left: 0; padding: 80px 16px 32px; }
    }
  </style>
</head>
<body>

  <div id="hub-loading">Loading...</div>

  <!-- Mobile bar -->
  <div class="mobile-bar" id="mobile-bar" style="display:none;">
    <div class="mobile-hub-name" id="mobile-hub-name"></div>
    <button class="mobile-menu-btn" onclick="openMobileNav()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Mobile nav drawer -->
  <div class="mobile-nav-drawer" id="mobile-nav-drawer">
    <div class="mobile-nav-backdrop" onclick="closeMobileNav()"></div>
    <div class="mobile-nav-panel">
      <button class="mobile-nav-close" onclick="closeMobileNav()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="mobile-nav-items"></div>
    </div>
  </div>

  <!-- Desktop sidebar -->
  <aside class="sidebar" id="sidebar" style="display:none;">
    <div class="sidebar-top">
      <div class="sidebar-hub-logo" id="sidebar-logo">
        <span id="sidebar-initial">H</span>
        <img id="sidebar-logo-img" src="" alt="" style="display:none;" />
      </div>
      <div class="sidebar-hub-name" id="sidebar-hub-name"></div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <div class="sidebar-user-name" id="sidebar-user-name"></div>
      <div class="sidebar-user-email" id="sidebar-user-email"></div>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content" style="display:none;">
    <div class="page-title">Courses</div>
    <div class="courses-grid" id="courses-grid">
      <div class="courses-loading">Loading courses...</div>
    </div>
  </main>

  <script>
    const NAV_ITEMS = [
      {
        label: 'Dashboard',
        href:  'dashboard',
        icon:  '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'
      },
      {
        label: 'Courses',
        href:  'courses',
        icon:  '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>'
      },
      {
        label:    'Community',
        href:     null,
        disabled: true,
        icon:     '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
      }
    ];

    let hubSlug = '';

    function buildNavItem(item, isActive) {
      const cls  = ['nav-item', isActive ? 'active' : '', item.disabled ? 'disabled' : ''].filter(Boolean).join(' ');
      const href = item.href ? `/hub/${item.href}?hub=${hubSlug}` : '#';
      const tag  = item.href && !item.disabled ? 'a' : 'div';
      const attr = item.href && !item.disabled ? `href="${href}"` : '';
      return `<${tag} class="${cls}" ${attr}>${item.icon}<span>${item.label}</span></${tag}>`;
    }

    function renderNav(slug) {
      hubSlug = slug;
      const nav = NAV_ITEMS.map(item => buildNavItem(item, item.href === 'courses')).join('');
      document.getElementById('sidebar-nav').innerHTML      = nav;
      document.getElementById('mobile-nav-items').innerHTML = nav;
    }

    function openMobileNav()  { document.getElementById('mobile-nav-drawer').style.display = 'block'; }
    function closeMobileNav() { document.getElementById('mobile-nav-drawer').style.display = 'none'; }

    function signOut() {
      auth.signOut().then(() => { window.location.href = '/hub/join?hub=' + hubSlug; });
    }

    function loadCourses(creatorId) {
      db.collection('creators').doc(creatorId)
        .collection('courses')
        .where('isPublished', '==', true)
        .orderBy('order')
        .get()
        .then(snap => {
          const grid = document.getElementById('courses-grid');
          if (snap.empty) {
            grid.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-title">No courses yet</div>
                <div class="empty-state-sub">Check back soon — content is on the way.</div>
              </div>`;
            return;
          }

          grid.innerHTML = snap.docs.map(doc => {
            const c    = doc.data();
            const href = `/hub/course?hub=${hubSlug}&course=${doc.id}`;
            const cover = c.coverUrl
              ? `<img src="${c.coverUrl}" alt="${c.title || ''}" loading="lazy" />`
              : `<div class="course-cover-placeholder">${(c.title || 'C').charAt(0)}</div>`;
            const desc  = c.description ? `<div class="course-desc">${c.description}</div>` : '';
            return `
              <a class="course-card" href="${href}">
                <div class="course-cover">${cover}</div>
                <div class="course-body">
                  <div class="course-title">${c.title || 'Untitled Course'}</div>
                  ${desc}
                  <div class="course-meta">
                    <span class="course-badge">Course</span>
                  </div>
                </div>
              </a>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('courses-grid').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-title">Could not load courses</div>
              <div class="empty-state-sub">Refresh the page to try again.</div>
            </div>`;
        });
    }

    initHubPage(function(hub, slug, creatorId, user) {
      hubSlug = slug;

      const name    = hub.displayName || 'Your Hub';
      const initial = name.charAt(0).toUpperCase();

      document.getElementById('sidebar-hub-name').textContent = name;
      document.getElementById('sidebar-initial').textContent  = initial;
      document.getElementById('mobile-hub-name').textContent  = name;

      if (hub.branding && hub.branding.logoUrl) {
        const img = document.getElementById('sidebar-logo-img');
        img.src           = hub.branding.logoUrl;
        img.style.display = 'block';
        document.getElementById('sidebar-initial').style.display = 'none';
      }

      document.getElementById('sidebar-user-name').textContent  = user.displayName || user.email;
      document.getElementById('sidebar-user-email').textContent = user.email;

      renderNav(slug);
      loadCourses(creatorId);

      document.getElementById('hub-loading').style.display  = 'none';
      document.getElementById('sidebar').style.display      = 'flex';
      document.getElementById('main-content').style.display = 'block';

      if (window.innerWidth <= 768) {
        document.getElementById('mobile-bar').style.display = 'flex';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>

      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"

  </script>
  <script src="/js/hub-shell.js"></script>
  <style>
    body {
      display: flex;
      min-height: 100vh;
    }

    /* Main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 40px 32px;
      max-width: 960px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 28px;
    }

    /* Courses grid */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .course-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: box-shadow .15s, transform .15s;
      border: 1.5px solid transparent;
    }
    .course-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      transform: translateY(-2px);
      border-color: var(--border);
    }

    .course-cover {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--purple) 100%);
      position: relative;
      overflow: hidden;
    }
    .course-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .course-cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: rgba(255,255,255,.4);
    }

    .course-body {
      padding: 18px 20px;
    }
    .course-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .course-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .course-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .course-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(107,47,179,.1);
      color: var(--purple);
    }
    .course-lesson-count {
      font-size: 12px;
      color: var(--text3);
    }

    /* States */
    .empty-state {
      grid-column: 1 / -1;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .empty-state-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state-sub {
      font-size: 14px;
      color: var(--text2);
    }

    .courses-loading {
      grid-column: 1 / -1;
      padding: 48px 0;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
    }

    #hub-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text3);
    }

    @media (max-width: 768px) {
      .main { margin-left: 0; padding: 80px 16px 32px; }
    }
  </style>
</head>
<body>

  <div id="hub-loading">Loading...</div>

  <div id="hub-member-sidebar"></div>

  <!-- Main -->
  <main class="main" id="main-content" style="display:none;">
    <div class="page-title">Courses</div>
    <div class="courses-grid" id="courses-grid">
      <div class="courses-loading">Loading courses...</div>
    </div>
  </main>

  <script>
    window.HUB_MEMBER_ACTIVE = 'courses';

    let hubSlug = '';

    function loadCourses(creatorId) {
      db.collection('creators').doc(creatorId)
        .collection('courses')
        .where('isPublished', '==', true)
        .orderBy('order')
        .get()
        .then(snap => {
          const grid = document.getElementById('courses-grid');
          if (snap.empty) {
            grid.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-title">No courses yet</div>
                <div class="empty-state-sub">Check back soon — content is on the way.</div>
              </div>`;
            return;
          }

          grid.innerHTML = snap.docs.map(doc => {
            const c    = doc.data();
            const href = `/hub/course?hub=${hubSlug}&course=${doc.id}`;
            const cover = c.coverUrl
              ? `<img src="${c.coverUrl}" alt="${c.title || ''}" loading="lazy" />`
              : `<div class="course-cover-placeholder">${(c.title || 'C').charAt(0)}</div>`;
            const desc  = c.description ? `<div class="course-desc">${c.description}</div>` : '';
            return `
              <a class="course-card" href="${href}">
                <div class="course-cover">${cover}</div>
                <div class="course-body">
                  <div class="course-title">${c.title || 'Untitled Course'}</div>
                  ${desc}
                  <div class="course-meta">
                    <span class="course-badge">Course</span>
                  </div>
                </div>
              </a>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('courses-grid').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-title">Could not load courses</div>
              <div class="empty-state-sub">Refresh the page to try again.</div>
            </div>`;
        });
    }

    initHubPage(function(hub, slug, creatorId, user) {
      hubSlug = slug;
      loadCourses(creatorId);
      document.getElementById('main-content').style.display = 'block';
    });
  </script>
</body>
</html>

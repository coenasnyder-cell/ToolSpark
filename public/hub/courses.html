<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/hub/hub-shell.js"></script>
<style>

  .courses-header { margin-bottom: 2rem; }
  .courses-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 400;
    color: var(--hub-text-primary, #1A1714);
    margin-bottom: 4px;
  }
  .courses-header p { font-size: 14px; color: var(--hub-text-muted, #6B6560); }

  /* GRID */
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  /* CARD */
  .course-card {
    background: var(--hub-chat-bg, #fff);
    border: 1px solid var(--hub-border, #E4E0D8);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    text-decoration: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .course-card:hover {
    border-color: var(--gold, #C9A84C);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  /* THUMBNAIL */
  .course-thumb {
    position: relative;
    width: 100%; aspect-ratio: 16/9;
    background: var(--hub-nav-bg, #0C0B09);
    overflow: hidden;
  }
  .course-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .course-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1A1714 0%, #2C2720 100%);
  }
  .course-thumb-placeholder svg { opacity: 0.2; }
  .course-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    padding: 4px 10px; border-radius: 20px;
  }
  .course-badge.coming-soon {
    background: rgba(201,168,76,0.15);
    color: var(--gold, #C9A84C);
    border: 1px solid rgba(201,168,76,0.3);
  }
  .course-badge.in-progress {
    background: rgba(46,204,113,0.15);
    color: #2ECC71;
    border: 1px solid rgba(46,204,113,0.3);
  }

  /* PROGRESS BAR */
  .course-progress-bar {
    height: 3px;
    background: var(--hub-border, #E4E0D8);
  }
  .course-progress-fill {
    height: 100%;
    background: var(--gold, #C9A84C);
    transition: width 0.3s;
  }

  /* CARD BODY */
  .course-body { padding: 1rem 1.1rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .course-title {
    font-size: 15px; font-weight: 700;
    color: var(--hub-text-primary, #1A1714);
    line-height: 1.3;
  }
  .course-meta {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: auto; padding-top: 8px;
  }
  .course-lessons {
    font-size: 12px; color: var(--hub-text-muted, #9A9488);
  }
  .course-cta {
    font-size: 12px; font-weight: 700;
    color: var(--gold, #C9A84C);
  }
  .course-progress-text {
    font-size: 11px; color: var(--hub-text-muted, #9A9488);
  }

</style>
</head>
<body>

<div id="hs-overlay"></div>
<aside id="hs-sidebar"></aside>
<div id="hs-main">
  <header id="hs-header"></header>
  <main class="hs-content">

    <div class="courses-header">
      <h2 id="courses-title">Courses &amp; Training</h2>
      <p id="courses-sub">Step-by-step programs to help you get results.</p>
    </div>

    <div class="courses-grid">

      <!-- COURSE 1 — placeholder -->
      <a href="#" class="course-card">
        <div class="course-thumb">
          <div class="course-thumb-placeholder">
            <svg width="48" height="48" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            </svg>
          </div>
          <span class="course-badge coming-soon">Coming Soon</span>
        </div>
        <div class="course-progress-bar"><div class="course-progress-fill" style="width:0%"></div></div>
        <div class="course-body">
          <div class="course-title" id="course1-title">Getting Started</div>
          <div class="course-progress-text">0 of 6 lessons complete</div>
          <div class="course-meta">
            <span class="course-lessons">6 lessons · Free</span>
            <span class="course-cta">Start →</span>
          </div>
        </div>
      </a>

      <!-- COURSE 2 — placeholder -->
      <a href="#" class="course-card">
        <div class="course-thumb">
          <div class="course-thumb-placeholder">
            <svg width="48" height="48" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="course-badge coming-soon">Coming Soon</span>
        </div>
        <div class="course-progress-bar"><div class="course-progress-fill" style="width:0%"></div></div>
        <div class="course-body">
          <div class="course-title" id="course2-title">Deep Dive Training</div>
          <div class="course-progress-text">0 of 8 lessons complete</div>
          <div class="course-meta">
            <span class="course-lessons">8 lessons · Free</span>
            <span class="course-cta">Start →</span>
          </div>
        </div>
      </a>

    </div>
  </main>
</div>

<script>
  initHubPage('courses', function(hub, slug) {
    if (hub.hubName) {
      document.getElementById('courses-title').textContent = hub.hubName + ' Courses';
      document.getElementById('courses-sub').textContent = 'Step-by-step training from ' + hub.hubName + '.';
    }
    if (hub.toolName) {
      document.getElementById('course1-title').textContent = 'Getting Started with ' + hub.toolName;
      document.getElementById('course2-title').textContent = hub.hubName ? hub.hubName + ' Deep Dive' : 'Deep Dive Training';
    }
  });
</script>
</body>
</html>

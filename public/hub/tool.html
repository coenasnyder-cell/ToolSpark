<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.12);
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --text-light: #F0EDE6;
    --text-muted: #9A9488;
    --radius: 14px;
    --radius-sm: 9px;
    /* Hub color theme — overridden dynamically by renderTool() */
    --hub-page-bg:      #0C0B09;
    --hub-chat-bg:      #141210;
    --hub-ai-bubble:    #1C1A17;
    --hub-user-bubble:  #1D1A0F;
    --hub-input-bg:     #141210;
    --hub-text-primary: #F0EDE6;
    --hub-text-muted:   #9A9488;
    --hub-border:       #2A2720;
    --hub-btn-text:     #0C0B09;
    --hub-nav-bg:       #0C0B09;
    --hub-nav-text:     #F0EDE6;
    --hub-nav-btn:      #C9A84C;
  }

  html { height: 100%; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--hub-page-bg);
    color: var(--hub-text-primary);
    -webkit-font-smoothing: antialiased;
    height: 100%;
    height: 100dvh;
  }

  /* LOADER */
  #loader { position: fixed; inset: 0; background: var(--hub-page-bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring { width: 40px; height: 40px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LAYOUT */
  #page { display: none; height: 100%; height: 100dvh; flex-direction: column; overflow: hidden; }

  /* NAV */
  .hub-nav { padding: 0.875rem 1.5rem; background: var(--hub-nav-bg); border-bottom: 1px solid var(--hub-border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
  .hub-nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .hub-logo-img { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; display: none; flex-shrink: 0; }
  .hub-logo-img.visible { display: block; }
  .hub-name-text { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; color: var(--hub-nav-text); }
  .hub-tool-pill { padding: 3px 10px; border: 1px solid var(--hub-border); border-radius: 12px; font-size: 11px; color: var(--hub-text-muted); font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-new-chat { background: none; border: 1px solid var(--hub-nav-btn); color: var(--hub-nav-btn); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; white-space: nowrap; }
  .btn-new-chat:hover { border-color: var(--gold); color: var(--gold); }
  .nav-user { display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--hub-text-muted); }
  .nav-user.visible { display: flex; }
  .nav-user-email { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-signout { background: transparent; border: 1px solid var(--hub-nav-btn); color: var(--hub-nav-btn); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-signout:hover { border-color: var(--gold); color: var(--gold); }

  /* NO KEY */
  .no-key-msg { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .no-key-inner { max-width: 360px; }
  .no-key-inner h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 0.5rem; }
  .no-key-inner p { font-size: 13px; color: var(--hub-text-muted); line-height: 1.6; }

  /* ── INTRO VIEW ── */
  #intro-view {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    min-height: 0;
    position: relative;
  }
  #intro-view.visible { display: flex; }

  .intro-bg {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.1) 0%, transparent 65%);
  }

  .intro-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    position: relative;
    z-index: 1;
  }

  .intro-logo {
    width: 64px; height: 64px;
    border-radius: 14px;
    object-fit: contain;
    margin-bottom: 1.5rem;
    border: 1px solid var(--hub-border);
    display: none;
  }
  .intro-logo.visible { display: block; }

  .intro-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 14px;
    border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
    border-radius: 20px;
    background: color-mix(in srgb, var(--gold) 8%, transparent);
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }

  .intro-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.2;
    color: var(--hub-text-primary);
    max-width: 640px;
    margin-bottom: 1rem;
  }
  .intro-headline em { font-style: italic; color: var(--gold); }

  .intro-desc {
    font-size: 15px;
    color: var(--hub-text-muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .intro-steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    row-gap: 8px;
  }
  .intro-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--hub-text-primary);
  }
  .intro-step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
    background: color-mix(in srgb, var(--gold) 8%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--gold);
    flex-shrink: 0;
  }
  .intro-step-divider {
    width: 28px; height: 1px;
    background: var(--hub-border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  .btn-start {
    padding: 15px 40px;
    background: var(--gold);
    color: var(--hub-btn-text);
    font-family: 'Lato', sans-serif;
    font-weight: 900;
    font-size: 16px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-start:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-start:active { transform: translateY(0); }

  .intro-powered {
    position: relative;
    z-index: 1;
    padding: 1rem;
    text-align: center;
    font-size: 11px;
    color: #3A3530;
    flex-shrink: 0;
  }
  .intro-powered a { color: #5A5450; text-decoration: none; }
  .intro-powered a:hover { color: var(--gold); }

  /* ── CHAT AREA ── */
  #tool-ui {
    flex: 1; display: none; flex-direction: column;
    align-items: center; overflow: hidden; min-height: 0;
    padding: 1.5rem 1rem;
  }

  .chat-card {
    width: 100%; max-width: 700px;
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
    background: var(--hub-chat-bg);
    border: 1px solid var(--hub-border);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 1.5rem 1.25rem;
    display: flex; flex-direction: column; gap: 1rem;
    scroll-behavior: smooth; min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--hub-border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 680px; width: 100%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 2px; }
  .msg-avatar img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
  .msg.assistant .msg-avatar { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); }
  .msg.user .msg-avatar { background: rgba(255,255,255,0.06); border: 1px solid var(--hub-border); color: var(--hub-text-muted); }

  .msg-bubble { padding: 0.875rem 1.125rem; border-radius: var(--radius); font-size: 14px; line-height: 1.75; max-width: calc(100% - 44px); }
  .msg.assistant .msg-bubble { background: var(--hub-ai-bubble); border: 1px solid var(--hub-border); color: var(--hub-text-primary); }
  .msg.user .msg-bubble { background: var(--hub-user-bubble); border: 1px solid rgba(201,168,76,0.2); color: var(--hub-text-primary); }
  .msg-bubble p { margin-bottom: 0.75rem; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--gold); font-weight: 700; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .msg-bubble li { margin-bottom: 0.35rem; line-height: 1.65; }
  .msg-bubble h2, .msg-bubble h3 { font-family: 'Playfair Display', serif; font-weight: 500; margin-bottom: 0.5rem; margin-top: 0.25rem; color: var(--hub-text-primary); }

  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--gold); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 0.5rem 0; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--hub-text-muted); animation: dot-pulse 1.4s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  /* INPUT AREA */
  .chat-input-area { flex-shrink: 0; border-top: 1px solid var(--hub-border); background: var(--hub-chat-bg); padding: 0.75rem 1rem 1.25rem; border-radius: 0 0 16px 16px; }

  /* GENERATE BUTTON ROW */
  .generate-row {
    margin-bottom: 0.625rem;
    display: none;
  }
  .generate-row.visible { display: block; }
  .btn-generate {
    width: 100%;
    padding: 11px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: var(--radius-sm);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-generate:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  .chat-input-wrap { display: flex; gap: 10px; align-items: flex-end; }
  .chat-input-wrap textarea {
    flex: 1; background: var(--hub-input-bg); border: 1px solid var(--hub-border); border-radius: var(--radius-sm);
    color: var(--hub-text-primary); font-family: 'Lato', sans-serif; font-size: 14px;
    padding: 11px 14px; resize: none; outline: none; line-height: 1.5;
    transition: border-color 0.15s, box-shadow 0.15s; max-height: 160px; overflow-y: auto;
  }
  .chat-input-wrap textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  .chat-input-wrap textarea::placeholder { color: #3A3530; }
  .btn-send {
    width: 44px; height: 44px; background: var(--gold); border: none; border-radius: var(--radius-sm);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-send svg { color: var(--dark); }
  .chat-input-hint { text-align: center; font-size: 11px; color: #3A3530; margin-top: 6px; }

  .error-row { padding: 0 1rem; margin-bottom: 0.5rem; }
  .error-banner { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: var(--radius-sm); padding: 0.65rem 1rem; font-size: 13px; color: #E74C3C; display: none; }
  .error-banner.visible { display: block; }

  /* ── REPORT VIEW ── */
  #report-view {
    flex: 1; display: none; flex-direction: column; overflow: hidden; min-height: 0;
    animation: fadeSlideUp 0.35s ease;
  }
  #report-view.visible { display: flex; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .report-scroll { flex: 1; overflow-y: auto; padding: 2rem 1rem 1.5rem; min-height: 0; }
  .report-scroll::-webkit-scrollbar { width: 4px; }
  .report-scroll::-webkit-scrollbar-track { background: transparent; }
  .report-scroll::-webkit-scrollbar-thumb { background: var(--hub-border); border-radius: 2px; }

  .report-inner { max-width: 720px; margin: 0 auto; }

  .report-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); border-radius: 20px;
    padding: 4px 12px; font-size: 11px; font-weight: 700; color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.5rem;
  }

  .report-body { font-size: 15px; line-height: 1.85; color: var(--hub-text-primary); }
  .report-body p { margin-bottom: 1rem; }
  .report-body p:last-child { margin-bottom: 0; }
  .report-body strong { color: var(--gold); font-weight: 700; }
  .report-body em { color: var(--hub-text-muted); font-style: italic; }
  .report-body h2 {
    font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500;
    color: var(--hub-text-primary); margin: 2rem 0 0.75rem;
    padding-bottom: 0.5rem; border-bottom: 1px solid var(--hub-border);
  }
  .report-body h2:first-child { margin-top: 0; }
  .report-body h3 {
    font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 500;
    color: var(--gold); margin: 1.5rem 0 0.5rem;
  }
  .report-body ul, .report-body ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .report-body li { margin-bottom: 0.45rem; line-height: 1.7; }

  .report-actions {
    flex-shrink: 0; border-top: 1px solid var(--hub-border); padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 10px; background: var(--dark); flex-wrap: wrap;
  }
  .btn-back-chat {
    background: none; border: 1px solid var(--hub-border); color: var(--hub-text-muted);
    font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-back-chat:hover { border-color: var(--gold); color: var(--gold); }
  .btn-new-session {
    background: var(--gold); border: none; color: var(--dark);
    font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: var(--radius-sm);
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-new-session:hover { opacity: 0.85; }
  .report-hint { font-size: 11px; color: #3A3530; margin-left: auto; }

  /* FOOTER */
  .tool-footer { flex-shrink: 0; border-top: 1px solid var(--hub-border); padding: 0.75rem 1.5rem; text-align: center; }
  .tool-footer p { font-size: 11px; color: #3A3530; }
  .tool-footer a { color: #5A5450; text-decoration: none; }
  .tool-footer a:hover { color: var(--gold); }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .hub-nav { padding: 0.75rem 1rem; }
    .hub-tool-pill { display: none; }
    .hub-name-text { font-size: 14px; max-width: 140px; }
    .nav-user-email { display: none; }
    .intro-body { padding: 2rem 1.25rem 1.5rem; }
    .intro-steps { gap: 0; }
    .intro-step-divider { width: 16px; }
    #tool-ui { padding: 0; }
    .chat-card { border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
    .chat-input-area { border-radius: 0; }
    .chat-messages { padding: 1rem 0.75rem; }
    .chat-input-area { padding: 0.625rem 0.75rem 1rem; }
    .chat-input-hint { display: none; }
    .report-scroll { padding: 1.5rem 1rem 1rem; }
    .report-body { font-size: 14px; }
    .report-body h2 { font-size: 18px; }
    .report-actions { padding: 0.875rem 1rem; gap: 8px; }
    .btn-back-chat, .btn-new-session { font-size: 12px; padding: 8px 14px; }
    .report-hint { display: none; }
  }

  @media (max-width: 380px) {
    .hub-name-text { max-width: 100px; }
    .btn-new-chat { display: none; }
  }
</style>
</head>
<body>

<div id="loader"><div class="loader-ring"></div></div>

<div id="page" style="display:none;">

  <nav class="hub-nav">
    <div class="hub-nav-left">
      <img id="nav-logo" class="hub-logo-img" src="" alt="logo">
      <span class="hub-name-text" id="nav-name"></span>
    </div>
    <div class="nav-right">
      <button class="btn-new-chat" id="new-chat-btn" onclick="newConversation()" style="display:none;">New conversation</button>
      <div class="nav-user" id="nav-user">
        <a id="nav-dashboard-link" href="#" class="btn-new-chat" style="text-decoration:none;">My Hub</a>
        <button class="btn-signout" onclick="doSignOut()">Sign out</button>
      </div>
    </div>
  </nav>

  <div id="no-key-msg" class="no-key-msg" style="display:none;">
    <div class="no-key-inner">
      <div style="font-size:40px;margin-bottom:1rem;">⚡</div>
      <h3>Tool not configured yet</h3>
      <p>The hub owner hasn't set up their API key yet. Check back soon.</p>
    </div>
  </div>

  <!-- INTRO VIEW — shown before conversation starts -->
  <div id="intro-view">
    <div class="intro-bg"></div>
    <div class="intro-body">
      <img id="intro-logo" class="intro-logo" src="" alt="logo">
      <h1 class="intro-headline" id="intro-headline"></h1>
      <p class="intro-desc" id="intro-desc"></p>

      <div class="intro-steps">
        <div class="intro-step">
          <div class="intro-step-num">1</div>
          <span id="step-1-label">Answer a few questions</span>
        </div>
        <div class="intro-step-divider"></div>
        <div class="intro-step">
          <div class="intro-step-num">2</div>
          <span>Generate your report</span>
        </div>
        <div class="intro-step-divider"></div>
        <div class="intro-step">
          <div class="intro-step-num">3</div>
          <span>Get your results</span>
        </div>
      </div>

      <button class="btn-start" id="start-btn" onclick="beginSession()">Get Started →</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="tool-ui">
    <div class="chat-card">
    <div class="chat-messages" id="chat-messages"></div>

    <div class="error-row">
      <div class="error-banner" id="error-banner"></div>
    </div>

    <div class="chat-input-area">
      <!-- Generate button — appears after enough context is gathered -->
      <div class="generate-row" id="generate-row">
        <button class="btn-generate" id="generate-btn" onclick="generateReport()">
          ⚡ Generate My Report
        </button>
      </div>
      <div class="chat-input-wrap">
        <textarea id="user-input" rows="1" placeholder="Type your message..." maxlength="3000"></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
    </div><!-- /.chat-card -->
  </div>

  <footer class="tool-footer">
    <p>Powered by <a href="https://toolspark.co" target="_blank">ToolSpark</a></p>
  </footer>

</div>

<script>
  function injectGA(id) {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag(){ window.dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', id);
  }

  var slug = window.location.pathname.split('/').filter(Boolean)[1] || '';
  var HUB = null;
  var studentDb = null;
  var studentAuth = null;
  var messages = [];
  var isGenerating = false;
  var userTurnCount = 0;

  if (!slug) { showError('Hub not found.'); }
  else {
    db.collection('hubs').doc(slug).get().then(function(snap) {
      if (!snap.exists) { showError('Hub not found.'); return; }
      HUB = snap.data();

      if (HUB.studentFirebase && HUB.studentFirebase.projectId) {
        try {
          var studentApp = firebase.initializeApp(HUB.studentFirebase, 'student');
          studentDb = studentApp.firestore();
          studentAuth = studentApp.auth();
        } catch(e) {}
      }

      if (HUB.membersOnly && studentAuth) {
        studentAuth.onAuthStateChanged(function(user) {
          if (!user) { window.location.href = '/hub/' + slug + '/login'; return; }
          var userEl = document.getElementById('nav-user');
          if (userEl) { userEl.classList.add('visible'); }
          document.getElementById('nav-dashboard-link').href = '/hub/' + slug + '/dashboard';
          renderTool(HUB);
        });
      } else {
        renderTool(HUB);
      }

    }).catch(function() { showError('Could not load hub.'); });
  }

  function doSignOut() {
    if (studentAuth) studentAuth.signOut().then(function() { window.location.href = '/hub/' + slug + '/login'; });
  }

  function renderTool(hub) {
    var color = hub.primaryColor || '#C9A84C';
    document.documentElement.style.setProperty('--gold', color);

    // Apply hub color theme
    var colorMap = {
      '--hub-page-bg':      hub.pageBgColor,
      '--hub-chat-bg':      hub.chatBgColor,
      '--hub-ai-bubble':    hub.aiBubbleColor,
      '--hub-user-bubble':  hub.userBubbleColor,
      '--hub-input-bg':     hub.inputBgColor,
      '--hub-text-primary': hub.textPrimaryColor,
      '--hub-text-muted':   hub.textMutedColor,
      '--hub-border':       hub.borderColor,
      '--hub-btn-text':     hub.btnTextColor,
      '--hub-nav-bg':       hub.navBgColor,
      '--hub-nav-text':     hub.navTextColor,
      '--hub-nav-btn':      hub.navBtnColor
    };
    Object.keys(colorMap).forEach(function(prop) {
      if (colorMap[prop]) document.documentElement.style.setProperty(prop, colorMap[prop]);
    });
    document.title = (hub.toolName || 'AI Tool') + ' — ' + (hub.hubName || 'Creator Hub');
    if (hub.gaTrackingId) injectGA(hub.gaTrackingId);

    if (hub.logoUrl) {
      var lg = document.getElementById('nav-logo'); lg.src = hub.logoUrl; lg.classList.add('visible');
      var il = document.getElementById('intro-logo'); il.src = hub.logoUrl; il.classList.add('visible');
    }
    document.getElementById('nav-name').textContent = hub.hubName || '';

    // Populate intro screen
    var headline = hub.landingHeadline || hub.toolName || 'Your AI Tool';
    document.getElementById('intro-headline').innerHTML = headline.replace(/\*(.*?)\*/g, '<em>$1</em>');

    var desc = hub.landingSubheadline || hub.toolDescription || '';
    var descEl = document.getElementById('intro-desc');
    if (desc) { descEl.textContent = desc; } else { descEl.style.display = 'none'; }

    var inputPlaceholder = hub.inputPlaceholder || 'Type your message...';
    document.getElementById('user-input').placeholder = inputPlaceholder;

    // Update generate button label
    document.getElementById('generate-btn').textContent = '⚡ Get My ' + (hub.toolName || 'Results');

    if (!hub.anthropicApiKey || hub.anthropicApiKey === 'YOUR_ANTHROPIC_API_KEY') {
      document.getElementById('no-key-msg').style.display = 'flex';
      document.getElementById('intro-view').style.display = 'none';
    } else {
      document.getElementById('intro-view').classList.add('visible');
    }

    showPage();
  }

  // ── SESSION FLOW ──

  function beginSession() {
    document.getElementById('intro-view').classList.remove('visible');
    document.getElementById('tool-ui').style.display = 'flex';
    startConversation(HUB);
    setTimeout(function() { document.getElementById('user-input').focus(); }, 100);
  }

  function startConversation(hub) {
    messages = [];
    userTurnCount = 0;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('generate-row').classList.remove('visible');

    var greeting = hub.customGreeting ||
      ('Hi! I\'m ' + (hub.toolName || 'your AI tool') + '. ' +
      (hub.toolDescription ? hub.toolDescription + ' ' : '') +
      'What would you like help with today?');
    appendMessage('assistant', greeting, false);
    document.getElementById('new-chat-btn').style.display = 'none';

    var err = document.getElementById('error-banner');
    err.className = 'error-banner';
  }

  function newConversation() {
    if (isGenerating) return;
    // Go back to intro screen
    document.getElementById('tool-ui').style.display = 'none';
    document.getElementById('intro-view').classList.add('visible');
    document.getElementById('new-chat-btn').style.display = 'none';
  }

  // ── GENERATE REPORT ──

  async function generateReport() {
    if (isGenerating) return;
    isGenerating = true;
    var btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Generating your results...';

    try {
      var triggerMsg = 'I\'ve answered all your questions. Please generate my full ' + (HUB.toolName || 'results') + ' now.';
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': HUB.anthropicApiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: HUB.toolModel || HUB.model || 'claude-haiku-4-5-20251001',
          max_tokens: 2000,
          system: HUB.systemPrompt || 'You are a helpful AI assistant.',
          messages: messages.concat([{ role: 'user', content: triggerMsg }])
        })
      });

      if (!response.ok) throw new Error('API error ' + response.status);
      var data = await response.json();
      var reportText = (data.content || []).map(function(b) { return b.type === 'text' ? b.text : ''; }).join('').trim();
      if (!reportText) throw new Error('Empty response');

      // Save to student's Firestore if connected, otherwise sessionStorage fallback
      if (studentDb) {
        var userId = (studentAuth && studentAuth.currentUser) ? studentAuth.currentUser.uid : null;

        // Extract title from first heading, fallback to tool name + date
        var titleMatch = reportText.match(/^#{1,3}\s+(.+)/m);
        var resultTitle = titleMatch
          ? titleMatch[1].trim()
          : (HUB.toolName || 'Results') + ' — ' + new Date().toLocaleDateString();

        // Summary: strip markdown, take first 150 chars
        var summaryText = reportText
          .replace(/^#{1,3}\s+.+$/gm, '')
          .replace(/\*\*(.+?)\*\*/g, '$1')
          .replace(/\*(.+?)\*/g, '$1')
          .replace(/\n+/g, ' ')
          .trim();
        var resultSummary = summaryText.length > 150
          ? summaryText.slice(0, 150).replace(/\s\S+$/, '') + '…'
          : summaryText;

        var docRef = await studentDb.collection('toolResults').add({
          hubSlug: slug,
          toolName: HUB.toolName || '',
          resultTitle: resultTitle,
          resultSummary: resultSummary,
          reportText: reportText,
          userId: userId,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.href = '/hub/' + slug + '/results?id=' + docRef.id;
      } else {
        sessionStorage.setItem('hub_result_' + slug, reportText);
        window.location.href = '/hub/' + slug + '/results';
      }

    } catch(e) {
      isGenerating = false;
      btn.disabled = false;
      btn.textContent = '⚡ Get My ' + (HUB.toolName || 'Results');
      var err = document.getElementById('error-banner');
      err.textContent = 'Something went wrong generating your results. Please try again.';
      err.className = 'error-banner visible';
    }
  }

  function showGenerateButton() {
    document.getElementById('generate-row').classList.add('visible');
  }

  // Fallback: show button after many turns in case AI never signals
  function updateGenerateButton() {
    var fallback = (HUB && HUB.minQuestionsBeforeGenerate) ? parseInt(HUB.minQuestionsBeforeGenerate) : 8;
    if (userTurnCount >= fallback) showGenerateButton();
  }

  // ── SEND MESSAGE ──

  async function sendMessage() {
    var input = document.getElementById('user-input').value.trim();
    if (!input) return;
    document.getElementById('user-input').value = '';
    autoResize(document.getElementById('user-input'));
    await sendMessageWithText(input);
  }

  async function sendMessageWithText(input) {
    if (isGenerating) return;

    var err = document.getElementById('error-banner');
    err.className = 'error-banner';

    document.getElementById('new-chat-btn').style.display = 'block';
    appendMessage('user', input, false);
    messages.push({ role: 'user', content: input });
    userTurnCount++;

    isGenerating = true;
    document.getElementById('send-btn').disabled = true;
    var generateBtn = document.getElementById('generate-btn');
    if (generateBtn) generateBtn.disabled = true;

    var typingEl = appendTyping();

    try {
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': HUB.anthropicApiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: HUB.toolModel || HUB.model || 'claude-haiku-4-5-20251001',
          max_tokens: 1500,
          stream: true,
          system: (HUB.systemPrompt || 'You are a helpful AI assistant.') +
            '\n\n---\nWhen you have asked enough questions and have all the information you need to generate the final output for this user, include the exact token [READY_TO_GENERATE] on its own line at the very end of your response. Do not include this token until you genuinely have enough context. Never mention or explain this token to the user — it is invisible to them.',
          messages: messages
        })
      });

      if (!response.ok) {
        var errData = await response.json().catch(function() { return {}; });
        throw new Error(errData.error && errData.error.message ? errData.error.message : 'API error ' + response.status);
      }

      typingEl.remove();
      var bubble = appendMessage('assistant', '', true);
      var fullText = '';

      var reader = response.body.getReader();
      var decoder = new TextDecoder();

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        var lines = decoder.decode(chunk.value, { stream: true }).split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          var data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            var parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta && parsed.delta.text) {
              fullText += parsed.delta.text;
              bubble.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
              scrollToBottom();
            }
          } catch(e) {}
        }
      }

      var readySignal = fullText.indexOf('[READY_TO_GENERATE]') !== -1;
      var cleanText = fullText.replace(/\[READY_TO_GENERATE\]\s*/g, '').trim();

      bubble.innerHTML = renderMarkdown(cleanText);
      scrollToBottom();

      if (cleanText) {
        messages.push({ role: 'assistant', content: cleanText });

        if (readySignal) {
          showGenerateButton();
        } else {
          updateGenerateButton();
        }

        if (studentDb) {
          studentDb.collection('toolUsage').add({
            hubSlug: slug,
            inputLength: input.length,
            outputLength: cleanText.length,
            model: HUB.toolModel || HUB.model || 'claude-haiku-4-5-20251001',
            turnCount: messages.length,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          }).catch(function() {});
        }
      } else {
        bubble.innerHTML = '<em style="color:var(--hub-text-muted);">(No response — check system prompt configuration)</em>';
      }

    } catch(e) {
      typingEl && typingEl.remove();
      err.textContent = e.message || 'Something went wrong. Please try again.';
      err.classList.add('visible');
    }

    isGenerating = false;
    document.getElementById('send-btn').disabled = false;
    if (generateBtn) generateBtn.disabled = false;
    document.getElementById('user-input').focus();
  }

  // ── UI HELPERS ──

  function appendMessage(role, content, streaming) {
    var container = document.getElementById('chat-messages');
    var msgEl = document.createElement('div');
    msgEl.className = 'msg ' + role;

    var avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    if (role === 'assistant' && HUB && HUB.logoUrl) {
      var logoImg = document.createElement('img');
      logoImg.src = HUB.logoUrl;
      logoImg.alt = '';
      avatarEl.appendChild(logoImg);
    } else {
      avatarEl.textContent = role === 'assistant' ? '⚡' : 'U';
    }

    var bubbleEl = document.createElement('div');
    bubbleEl.className = 'msg-bubble';
    if (streaming) {
      bubbleEl.innerHTML = '<span class="cursor"></span>';
    } else {
      bubbleEl.innerHTML = role === 'assistant' ? renderMarkdown(content) : escHtml(content);
    }

    msgEl.appendChild(avatarEl);
    msgEl.appendChild(bubbleEl);
    container.appendChild(msgEl);
    scrollToBottom();
    return bubbleEl;
  }

  function appendTyping() {
    var container = document.getElementById('chat-messages');
    var msgEl = document.createElement('div');
    msgEl.className = 'msg assistant';
    msgEl.id = 'typing-indicator';

    var avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    if (HUB && HUB.logoUrl) {
      var logoImg = document.createElement('img');
      logoImg.src = HUB.logoUrl;
      logoImg.alt = '';
      avatarEl.appendChild(logoImg);
    } else {
      avatarEl.textContent = '⚡';
    }

    var bubbleEl = document.createElement('div');
    bubbleEl.className = 'msg-bubble';
    bubbleEl.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    msgEl.appendChild(avatarEl);
    msgEl.appendChild(bubbleEl);
    container.appendChild(msgEl);
    scrollToBottom();
    return msgEl;
  }

  function scrollToBottom() {
    var el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  }

  function renderMarkdown(text) {
    if (!text) return '';
    var html = escHtml(text);
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
    html = html.replace(/((?:^- .+\n?)+)/gm, function(block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^- /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, function(block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    html = html.split(/\n\n+/).map(function(para) {
      para = para.trim();
      if (!para) return '';
      if (para.startsWith('<h') || para.startsWith('<ul') || para.startsWith('<ol')) return para;
      return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
    }).filter(Boolean).join('\n');
    return html;
  }

  function escHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function showPage() {
    document.getElementById('page').style.display = 'flex';
    var l = document.getElementById('loader');
    l.classList.add('hidden');
    setTimeout(function() { l.style.display = 'none'; }, 300);
  }

  function showError(msg) {
    document.getElementById('page').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;"><div><div style="font-size:48px;margin-bottom:1rem;">⚡</div><p style="color:#9A9488;font-size:14px;">' + msg + '</p></div></div>';
    document.getElementById('page').style.display = 'flex';
    document.getElementById('loader').style.display = 'none';
  }

  document.getElementById('user-input').addEventListener('input', function() {
    autoResize(this);
  });

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isGenerating) sendMessage();
    }
  });
</script>
</body>
</html>

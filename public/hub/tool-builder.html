<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Builder — ToolSpark</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth      = firebase.auth();
    const db        = firebase.firestore();
    const functions = firebase.functions();
    document.addEventListener('DOMContentLoaded', () => {
      firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Top bar ── */
    .builder-bar {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
    }
    .bar-logo {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }
    .bar-logo span { color: var(--yellow); }
    .bar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
    .bar-tool-name {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      border: none;
      background: transparent;
      font-family: var(--font);
      outline: none;
      cursor: text;
      min-width: 0;
    }
    .bar-tool-name::placeholder { color: var(--text3); font-weight: 400; }
    .bar-tool-name:focus { background: var(--card-alt); border-radius: 6px; padding: 4px 8px; margin: -4px -8px; }
    .bar-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Split layout ── */
    .builder-body {
      display: flex;
      height: calc(100vh - 56px);
      margin-top: 56px;
    }

    /* ── Left: chat panel ── */
    .chat-panel {
      width: 40%;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--card);
    }
    .chat-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sparky-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #000;
      flex-shrink: 0;
    }
    .chat-header-text { font-size: 14px; font-weight: 700; color: var(--text); }
    .chat-header-sub  { font-size: 12px; color: var(--text3); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #000;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-avatar { background: var(--purple); color: #fff; }

    .msg-bubble {
      max-width: 85%;
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
    }
    .msg.sparky .msg-bubble { background: rgba(107,47,179,.08); color: var(--text); border-radius: 4px 16px 16px 16px; }
    .msg.user   .msg-bubble { background: var(--yellow); color: #000; border-radius: 16px 4px 16px 16px; }

    /* Publish nudge */
    .publish-nudge {
      padding: 4px 0 0 38px;
    }

    /* Text input area */
    .chat-input-wrap {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      background: var(--card-alt);
      color: var(--text);
      max-height: 120px;
      transition: border-color .15s;
      outline: none;
    }
    .chat-input:focus { border-color: var(--purple); }
    .chat-send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--purple);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .chat-send-btn:hover { opacity: .85; }
    .chat-send-btn:disabled { opacity: .4; cursor: default; }
    .skip-btn {
      font-size: 12px;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: var(--font);
      transition: color .15s;
    }
    .skip-btn:hover { color: var(--purple); }

    /* Building state */
    .building-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }
    .building-msg.show { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Right: preview panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
    }
    .preview-bar {
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    .preview-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
    }
    .preview-toggle-group {
      display: flex;
      background: var(--card-alt);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .preview-toggle {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .preview-toggle.active { background: var(--card); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .try-mode-btn {
      margin-left: auto;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--font);
      transition: border-color .15s, color .15s;
    }
    .try-mode-btn:hover { border-color: var(--purple); color: var(--purple); }
    .try-mode-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Desktop mockup */
    .preview-desktop {
      width: 100%;
      max-width: 680px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      height: calc(100vh - 56px - 48px - 48px);
    }
    .preview-desktop iframe {
      width: 100%; height: 100%;
      border: none;
    }

    /* Mobile mockup */
    .preview-mobile {
      display: none;
      width: 375px;
      height: calc(100vh - 56px - 48px - 48px);
      max-height: 700px;
      border: 8px solid #222;
      border-radius: 44px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    .preview-mobile iframe { width: 100%; height: 100%; border: none; }

    /* Static mockup (before tool is built) */
    .preview-static {
      width: 100%;
      max-width: 560px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .preview-static-logo {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #000;
      margin: 0 auto 20px;
    }
    .preview-static-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }
    .preview-static-sub {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .preview-static-progress {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .preview-static-progress-bar {
      height: 100%;
      background: var(--purple);
      border-radius: 2px;
      transition: width .4s ease;
    }
    .preview-question-mock {
      background: var(--card-alt);
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      text-align: center;
      margin-bottom: 20px;
    }
    .preview-btn-mock {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: var(--purple);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      border: none;
      cursor: default;
    }

    /* Mobile layout */
    @media (max-width: 768px) {
      body { overflow: auto; }
      .builder-body { flex-direction: column; height: auto; }
      .chat-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); height: 60vh; }
      .preview-panel { height: 50vh; }
      .preview-content { padding: 16px; }
      .preview-desktop { height: 100%; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="builder-bar">
    <a class="bar-logo" href="/hub/admin-tools">⚡ Tool<span>Spark</span></a>
    <div class="bar-divider"></div>
    <input class="bar-tool-name" id="bar-tool-name" type="text" placeholder="Untitled Tool" maxlength="60" />
    <div class="bar-actions">
      <button class="btn-outline" id="save-draft-btn" onclick="saveDraft()">Save Draft</button>
      <button class="btn-primary" id="publish-btn" onclick="publishTool()">Publish</button>
    </div>
  </div>

  <!-- Builder body -->
  <div class="builder-body">

    <!-- Left: Sparky chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="sparky-avatar">⚡</div>
        <div>
          <div class="chat-header-text">Sparky</div>
          <div class="chat-header-sub">Refine your tool</div>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="building-msg" id="building-msg">
        <div class="spinner"></div>
        <span>Building your tool...</span>
      </div>

      <div class="chat-input-wrap" id="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="Type your answer..."
          onkeydown="handleInputKey(event)"
          oninput="autoGrow(this)"></textarea>
        <button class="chat-send-btn" id="send-btn" onclick="sendRefinement()">
          <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: preview -->
    <div class="preview-panel">
      <div class="preview-bar">
        <span class="preview-label">Preview</span>
        <div class="preview-toggle-group">
          <button class="preview-toggle active" id="toggle-desktop" onclick="setView('desktop')">Desktop</button>
          <button class="preview-toggle" id="toggle-mobile" onclick="setView('mobile')">Mobile</button>
        </div>
        <button class="try-mode-btn" id="try-mode-btn" onclick="toggleTryMode()">Try as User</button>
      </div>
      <div class="preview-content" id="preview-content">
        <!-- Static mockup shown before tool is built -->
        <div class="preview-static" id="preview-static">
          <div class="preview-static-logo" id="prev-logo">⚡</div>
          <div class="preview-static-title" id="prev-title">Your Tool Name</div>
          <div class="preview-static-sub" id="prev-sub">Powered by AI</div>
          <div class="preview-static-progress">
            <div class="preview-static-progress-bar" id="prev-progress" style="width:0%"></div>
          </div>
          <div class="preview-question-mock" id="prev-question">Answer a few questions to get your personalized results.</div>
          <button class="preview-btn-mock" id="prev-btn">Get Started →</button>
        </div>
        <!-- Live iframe shown after tool is built -->
        <div class="preview-desktop" id="preview-desktop" style="display:none;">
          <iframe id="preview-iframe" src="" title="Tool Preview"></iframe>
        </div>
        <div class="preview-mobile" id="preview-mobile">
          <iframe id="preview-mobile-iframe" src="" title="Tool Preview Mobile"></iframe>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/tool-builder.js"></script>
</body>
</html>

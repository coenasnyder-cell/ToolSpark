<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Editor — Creator Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>

    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  try { firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true); } catch(e) {}
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --border-dark: #2A2720;
    --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE; --surface: #FFFFFF; --border: #E4E0D8;
    --text: #1A1714; --text2: #6B6560; --text3: #9E9891;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
  }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; position: sticky; top: 0; z-index: 50; gap: 1rem; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: #9A9488; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
  .back-btn:hover { color: var(--gold); }
  .header-course-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #F0EDE6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-subtitle { font-size: 12px; color: var(--text3); }

  .layout { display: flex; flex: 1; min-height: 0; }

  /* LEFT: lesson list */
  .lesson-sidebar { width: 280px; background: var(--dark); border-right: 1px solid var(--border-dark); display: flex; flex-direction: column; flex-shrink: 0; }
  .lesson-sidebar-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: space-between; }
  .lesson-sidebar-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
  .btn-add-lesson { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); border-radius: 6px; color: var(--gold); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif; transition: all 0.15s; }
  .btn-add-lesson:hover { background: rgba(201,168,76,0.2); }
  .lesson-list { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
  .lesson-item { padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; display: flex; align-items: center; gap: 8px; }
  .lesson-item:hover { background: rgba(255,255,255,0.05); }
  .lesson-item.active { background: var(--gold-dim); border-color: rgba(201,168,76,0.2); }
  .lesson-num { font-size: 11px; font-weight: 700; color: var(--text3); width: 20px; flex-shrink: 0; }
  .lesson-item.active .lesson-num { color: var(--gold); }
  .lesson-item-title { font-size: 13px; color: #9A9488; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lesson-item.active .lesson-item-title { color: var(--gold); font-weight: 700; }
  .lesson-empty { padding: 1.5rem 1.25rem; font-size: 13px; color: var(--text3); text-align: center; }

  /* RIGHT: lesson editor */
  .editor-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .editor-content { flex: 1; padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem; max-width: 720px; }

  .editor-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.75rem; padding: 3rem; text-align: center; color: var(--text3); }
  .editor-placeholder .big { font-size: 2rem; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
  .form-input, .form-textarea { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 13px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; }
  .form-input:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
  .form-textarea { resize: vertical; min-height: 280px; line-height: 1.7; }
  .form-help { font-size: 11px; color: var(--text3); }

  .editor-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 1rem 2rem; background: var(--surface); border-top: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
  .editor-actions-left { display: flex; align-items: center; gap: 8px; }
  .save-status { font-size: 13px; color: var(--text3); }
  .save-status.success { color: #2A7A55; font-weight: 700; }
  .save-status.error { color: #C0392B; font-weight: 700; }

  .btn-primary, .btn-secondary, .btn-danger {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border-radius: var(--radius-sm); padding: 9px 16px;
    font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-decoration: none; white-space: nowrap; border: none;
  }
  .btn-primary { background: var(--gold); color: #1A1714; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text2); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: none; border: 1px solid rgba(220,50,50,0.2); color: #C0392B; }
  .btn-danger:hover { background: rgba(220,50,50,0.06); }

  .reorder-btns { display: flex; gap: 4px; }
  .btn-move { width: 28px; height: 28px; border: 1px solid var(--border-dark); border-radius: 4px; background: none; color: #9A9488; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 12px; }
  .btn-move:hover { border-color: var(--gold); color: var(--gold); }
  .btn-move:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 640px) {
    .lesson-sidebar { width: 100%; position: fixed; bottom: 0; left: 0; right: 0; height: 44px; overflow: hidden; transition: height 0.2s; z-index: 40; border-right: none; border-top: 1px solid var(--border-dark); }
    .lesson-sidebar.expanded { height: 60vh; }
    .layout { flex-direction: column; }
    .editor-panel { min-height: 60vh; }
    .editor-content { padding: 1rem; }
  }
</style>
</head>
<body>

<header class="top-header">
  <div class="header-left">
    <a id="back-btn" href="/hub/courses-editor" class="back-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Courses
    </a>
    <div style="width:1px;height:20px;background:var(--border-dark);flex-shrink:0;"></div>
    <div>
      <div class="header-course-title" id="header-course-title">Loading...</div>
      <div class="header-subtitle" id="header-subtitle"></div>
    </div>
  </div>
</header>

<div class="layout">

  <!-- LESSON LIST SIDEBAR -->
  <div class="lesson-sidebar" id="lesson-sidebar">
    <div class="lesson-sidebar-header">
      <span class="lesson-sidebar-title">Lessons</span>
      <button class="btn-add-lesson" onclick="addLesson()">+ Add</button>
    </div>
    <div class="lesson-list" id="lesson-list">
      <div class="lesson-empty">Loading...</div>
    </div>
  </div>

  <!-- EDITOR PANEL -->
  <div class="editor-panel" id="editor-panel">
    <div class="editor-content" id="editor-content">
      <div class="editor-placeholder" id="editor-placeholder">
        <div class="big">📝</div>
        <div style="font-size:15px;color:var(--text2);font-weight:700;">Select a lesson to edit</div>
        <div style="font-size:13px;">Or click "+ Add" to create your first lesson.</div>
      </div>
    </div>

    <div class="editor-actions" id="editor-actions" style="display:none;">
      <div class="editor-actions-left">
        <button class="btn-primary" onclick="saveLesson()" id="save-btn">Save Lesson</button>
        <span class="save-status" id="save-status"></span>
      </div>
      <button class="btn-danger" onclick="deleteLesson()">Delete Lesson</button>
    </div>
  </div>

</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var hubSlug = params.get('hubSlug') || '';
  var courseId = params.get('courseId') || '';
  var lessons = [];
  var activeLessonId = null;
  var studentApp, studentDb;

  if (!hubSlug || !courseId) {
    window.location.href = '/hub/courses-editor';
  }

  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = '/signon.html'; return; }
    db.collection('users').doc(user.uid).get().then(function(snap) {
      if (!snap.exists || snap.data().hubSlug !== hubSlug) {
        window.location.href = '/hub/courses-editor';
        return;
      }
      return db.collection('hubs').doc(hubSlug).get();
    }).then(function(hubSnap) {
      if (!hubSnap) return;
      var hub = hubSnap.exists ? hubSnap.data() : {};
      if (!hub.studentFirebase || !hub.studentFirebase.projectId) {
        window.location.href = '/hub/courses-editor';
        return;
      }
      try {
        try { studentApp = firebase.app('student-admin'); }
        catch(e) { studentApp = firebase.initializeApp(hub.studentFirebase, 'student-admin'); }
        studentDb = studentApp.firestore();
      } catch(e) {
        console.error('Could not connect to your Firebase project:', e);
        window.location.href = '/hub/courses-editor';
        return;
      }
      loadCourse();
    }).catch(function(e) { console.error(e); });
  });

  function loadCourse() {
    studentDb.collection('courses').doc(courseId).get().then(function(snap) {
      if (!snap.exists) { window.location.href = '/hub/courses-editor'; return; }
      var c = snap.data();
      document.title = (c.title || 'Course') + ' — Lesson Editor';
      document.getElementById('header-course-title').textContent = c.title || 'Untitled Course';
      loadLessons();
    });
  }

  function loadLessons() {
    studentDb.collection('courses').doc(courseId)
      .collection('lessons').orderBy('order').get().then(function(snap) {
        lessons = snap.docs.map(function(doc) {
          return Object.assign({ id: doc.id }, doc.data());
        });
        renderLessonList();
        updateSubtitle();
      }).catch(function(e) {
        console.error(e);
        document.getElementById('lesson-list').innerHTML = '<div class="lesson-empty">Could not load lessons.</div>';
      });
  }

  function updateSubtitle() {
    document.getElementById('header-subtitle').textContent = lessons.length + ' lesson' + (lessons.length === 1 ? '' : 's');
  }

  function renderLessonList() {
    var list = document.getElementById('lesson-list');
    if (!lessons.length) {
      list.innerHTML = '<div class="lesson-empty">No lessons yet.<br>Click "+ Add" to start.</div>';
      return;
    }
    list.innerHTML = lessons.map(function(l, i) {
      return '<div class="lesson-item' + (l.id === activeLessonId ? ' active' : '') + '" onclick="selectLesson(\'' + l.id + '\')">' +
        '<span class="lesson-num">' + (i + 1) + '</span>' +
        '<span class="lesson-item-title">' + esc(l.title || 'Untitled Lesson') + '</span>' +
        '<div class="reorder-btns">' +
          '<button class="btn-move" onclick="moveLesson(\'' + l.id + '\',-1,event)" ' + (i === 0 ? 'disabled' : '') + ' title="Move up">↑</button>' +
          '<button class="btn-move" onclick="moveLesson(\'' + l.id + '\',1,event)" ' + (i === lessons.length - 1 ? 'disabled' : '') + ' title="Move down">↓</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function selectLesson(lessonId) {
    activeLessonId = lessonId;
    var lesson = lessons.find(function(l) { return l.id === lessonId; });
    if (!lesson) return;
    renderLessonList();

    document.getElementById('editor-placeholder').style.display = 'none';
    document.getElementById('editor-actions').style.display = 'flex';
    document.getElementById('save-status').textContent = '';
    document.getElementById('save-status').className = 'save-status';

    var content = document.getElementById('editor-content');
    content.innerHTML =
      '<div class="form-group">' +
        '<label class="form-label">Lesson Title</label>' +
        '<input class="form-input" id="lesson-title" type="text" maxlength="120" placeholder="e.g. Welcome to the Course" value="' + esc(lesson.title || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Lesson Content</label>' +
        '<textarea class="form-textarea" id="lesson-content" placeholder="Write your lesson content here. Use plain text or markdown — it will render for members.">' + esc(lesson.content || '') + '</textarea>' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Video URL <span style="font-weight:400;text-transform:none;font-size:11px;">(optional)</span></label>' +
        '<input class="form-input" id="lesson-video" type="url" placeholder="https://youtube.com/... or Vimeo link" value="' + esc(lesson.videoUrl || '') + '">' +
        '<div class="form-help">Paste a YouTube, Vimeo, or Loom URL. It will embed for members.</div>' +
      '</div>' +
      '<div id="editor-placeholder" style="display:none;"></div>';
  }

  function saveLesson() {
    if (!activeLessonId) return;
    var titleEl   = document.getElementById('lesson-title');
    var contentEl = document.getElementById('lesson-content');
    var videoEl   = document.getElementById('lesson-video');
    if (!titleEl) return;

    var saveBtn = document.getElementById('save-btn');
    var status  = document.getElementById('save-status');
    saveBtn.disabled = true;
    status.textContent = 'Saving...';
    status.className = 'save-status';

    studentDb.collection('courses').doc(courseId)
      .collection('lessons').doc(activeLessonId).update({
        title:    titleEl.value.trim(),
        content:  contentEl ? contentEl.value : '',
        videoUrl: videoEl ? videoEl.value.trim() : '',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        var idx = lessons.findIndex(function(l) { return l.id === activeLessonId; });
        if (idx !== -1) {
          lessons[idx].title    = titleEl.value.trim();
          lessons[idx].content  = contentEl ? contentEl.value : '';
          lessons[idx].videoUrl = videoEl ? videoEl.value.trim() : '';
        }
        renderLessonList();
        status.textContent = '✓ Saved';
        status.className = 'save-status success';
        setTimeout(function() { status.textContent = ''; status.className = 'save-status'; }, 3000);
      }).catch(function(e) {
        console.error(e);
        status.textContent = 'Error saving';
        status.className = 'save-status error';
      }).finally(function() {
        saveBtn.disabled = false;
      });
  }

  function addLesson() {
    var ts = firebase.firestore.FieldValue.serverTimestamp;
    var nextOrder = lessons.length ? lessons[lessons.length - 1].order + 1 : 1;
    studentDb.collection('courses').doc(courseId)
      .collection('lessons').add({
        title:    'New Lesson',
        content:  '',
        videoUrl: '',
        order:    nextOrder,
        createdAt: ts()
      }).then(function(ref) {
        return studentDb.collection('courses').doc(courseId)
          .collection('lessons').orderBy('order').get();
      }).then(function(snap) {
        lessons = snap.docs.map(function(doc) { return Object.assign({ id: doc.id }, doc.data()); });
        var newLesson = lessons[lessons.length - 1];
        updateLessonCount();
        renderLessonList();
        updateSubtitle();
        selectLesson(newLesson.id);
        activeLessonId = newLesson.id;
        renderLessonList();
      }).catch(function(e) { console.error(e); alert('Could not add lesson.'); });
  }

  function deleteLesson() {
    if (!activeLessonId) return;
    var lesson = lessons.find(function(l) { return l.id === activeLessonId; });
    if (!confirm('Delete "' + (lesson ? lesson.title : 'this lesson') + '"?')) return;

    studentDb.collection('courses').doc(courseId)
      .collection('lessons').doc(activeLessonId).delete().then(function() {
        lessons = lessons.filter(function(l) { return l.id !== activeLessonId; });
        activeLessonId = null;
        updateLessonCount();
        renderLessonList();
        updateSubtitle();
        document.getElementById('editor-content').innerHTML = '';
        document.getElementById('editor-placeholder').style.display = 'flex';
        var ph = document.createElement('div');
        ph.className = 'editor-placeholder';
        ph.id = 'editor-placeholder';
        ph.innerHTML = '<div class="big">📝</div><div style="font-size:15px;color:var(--text2);font-weight:700;">Select a lesson to edit</div><div style="font-size:13px;">Or click "+ Add" to create your first lesson.</div>';
        document.getElementById('editor-content').appendChild(ph);
        document.getElementById('editor-actions').style.display = 'none';
      }).catch(function(e) { console.error(e); alert('Could not delete lesson.'); });
  }

  function moveLesson(lessonId, direction, event) {
    event.stopPropagation();
    var idx = lessons.findIndex(function(l) { return l.id === lessonId; });
    var swapIdx = idx + direction;
    if (swapIdx < 0 || swapIdx >= lessons.length) return;

    var batch = studentDb.batch();
    var refA = studentDb.collection('courses').doc(courseId).collection('lessons').doc(lessons[idx].id);
    var refB = studentDb.collection('courses').doc(courseId).collection('lessons').doc(lessons[swapIdx].id);
    var orderA = lessons[idx].order;
    var orderB = lessons[swapIdx].order;
    batch.update(refA, { order: orderB });
    batch.update(refB, { order: orderA });
    batch.commit().then(function() {
      lessons[idx].order   = orderB;
      lessons[swapIdx].order = orderA;
      var tmp = lessons[idx];
      lessons[idx] = lessons[swapIdx];
      lessons[swapIdx] = tmp;
      renderLessonList();
    }).catch(function(e) { console.error(e); });
  }

  function updateLessonCount() {
    studentDb.collection('courses').doc(courseId)
      .update({ lessonCount: lessons.length }).catch(function() {});
  }
</script>
</body>
</html>

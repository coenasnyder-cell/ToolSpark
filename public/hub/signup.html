<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.12);
    --dark: #0C0B09; --dark2: #141210; --dark3: #1C1A17; --border-dark: #2A2720;
    --text-light: #F0EDE6; --text-muted: #9A9488; --radius: 16px; --radius-sm: 10px;
  }
  html, body { height: 100%; }
  body { font-family: 'Lato', sans-serif; background: var(--dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

  #loader { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NAV */
  .hub-nav { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; gap: 10px; }
  .hub-logo-img { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; display: none; }
  .hub-logo-img.visible { display: block; }
  .hub-name-text { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; }

  /* MAIN */
  .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .auth-card { width: 100%; max-width: 420px; background: var(--dark2); border: 1px solid var(--border-dark); border-radius: var(--radius); padding: 2.25rem; }
  .auth-heading { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 0.35rem; }
  .auth-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.75rem; line-height: 1.5; }

  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1rem; }
  label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  input[type=text], input[type=email], input[type=password] {
    width: 100%; padding: 12px 14px; background: var(--dark3); border: 1px solid var(--border-dark);
    border-radius: var(--radius-sm); color: var(--text-light); font-family: 'Lato', sans-serif;
    font-size: 15px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  input::placeholder { color: #3A3530; }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; }
  .pw-toggle:hover { color: var(--text-light); }

  .error-msg { font-size: 13px; color: #E74C3C; min-height: 18px; margin-bottom: 0.75rem; }

  .btn-primary { width: 100%; padding: 14px; background: var(--gold); color: var(--dark); font-weight: 900; font-size: 15px; border: none; border-radius: var(--radius-sm); cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-spinner { width: 16px; height: 16px; border: 2px solid rgba(12,11,9,0.3); border-top-color: var(--dark); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .btn-primary.loading .btn-spinner { display: block; }

  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 13px; color: var(--text-muted); }
  .auth-footer a { color: var(--gold); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }

  .hub-footer { border-top: 1px solid var(--border-dark); padding: 1rem; text-align: center; }
  .hub-footer p { font-size: 11px; color: #3A3530; }
  .hub-footer a { color: #5A5450; text-decoration: none; }
</style>
</head>
<body>

<div id="loader"><div class="loader-ring"></div></div>

<div id="page" style="display:none;flex-direction:column;min-height:100vh;">
  <nav class="hub-nav">
    <img id="nav-logo" class="hub-logo-img" src="" alt="">
    <span class="hub-name-text" id="nav-name"></span>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-heading">Create your account</h1>
      <p class="auth-sub" id="auth-sub">Join to get access to the tool.</p>

      <div class="field">
        <label for="name-input">Your name</label>
        <input type="text" id="name-input" placeholder="Sarah Smith" autocomplete="name">
      </div>
      <div class="field">
        <label for="email-input">Email</label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="pw-input">Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-input" placeholder="At least 6 characters" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('pw-input',this)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button class="btn-primary" id="submit-btn" onclick="doSignup()">
        <div class="btn-spinner"></div>
        <span id="btn-label">Create Account</span>
      </button>

      <div class="auth-footer">
        Already have an account? <a id="login-link" href="#">Sign in</a>
      </div>
    </div>
  </div>

  <footer class="hub-footer">
    <p>Powered by <a href="https://toolspark.co" target="_blank">ToolSpark</a></p>
  </footer>
</div>

<script>
  function injectGA(id) {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag(){ window.dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', id);
  }

  var slug = window.location.pathname.split('/').filter(Boolean)[1] || '';
  var studentAuth = null;
  var studentDb = null;

  // Pre-fill email from query param (passed from landing page email capture)
  var params = new URLSearchParams(window.location.search);
  if (params.get('email')) document.getElementById('email-input').value = params.get('email');

  if (!slug) { showError('Hub not found.'); }
  else {
    db.collection('hubs').doc(slug).get().then(function(snap) {
      if (!snap.exists) { showError('Hub not found.'); return; }
      var hub = snap.data();

      if (!hub.studentFirebase || !hub.studentFirebase.projectId) {
        showError('Member accounts are not configured for this hub yet.');
        return;
      }

      // Init student Firebase
      try {
        var studentApp = firebase.initializeApp(hub.studentFirebase, 'student');
        studentAuth = studentApp.auth();
        studentDb = studentApp.firestore();
      } catch(e) {
        showError('Could not connect to this hub.');
        return;
      }

      // Already logged in → send to dashboard
      studentAuth.onAuthStateChanged(function(user) {
        if (user) { window.location.href = '/hub/' + slug + '/dashboard'; return; }

        renderPage(hub);
      });

    }).catch(function() { showError('Could not load hub.'); });
  }

  function renderPage(hub) {
    var color = hub.primaryColor || '#C9A84C';
    document.documentElement.style.setProperty('--gold', color);
    document.title = 'Create Account — ' + (hub.hubName || 'Creator Hub');
    if (hub.gaTrackingId) injectGA(hub.gaTrackingId);

    if (hub.logoUrl) { var lg = document.getElementById('nav-logo'); lg.src = hub.logoUrl; lg.classList.add('visible'); }
    document.getElementById('nav-name').textContent = hub.hubName || '';
    if (hub.toolName) document.getElementById('auth-sub').textContent = 'Join to get access to ' + hub.toolName + '.';
    document.getElementById('login-link').href = '/hub/' + slug + '/login';

    showPage();
  }

  function doSignup() {
    var name = document.getElementById('name-input').value.trim();
    var email = document.getElementById('email-input').value.trim();
    var password = document.getElementById('pw-input').value;
    var errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!name) { errEl.textContent = 'Please enter your name.'; return; }
    if (!email) { errEl.textContent = 'Please enter your email.'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

    setLoading(true);

    studentAuth.createUserWithEmailAndPassword(email, password)
      .then(function(cred) {
        var user = cred.user;
        var updates = { displayName: name };
        return Promise.all([
          user.updateProfile(updates),
          studentDb.collection('users').doc(user.uid).set({
            name: name, email: email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            source: 'hub-signup'
          })
        ]);
      })
      .then(function() {
        window.location.href = '/hub/' + slug + '/dashboard';
      })
      .catch(function(e) {
        setLoading(false);
        errEl.textContent = friendlyError(e.code);
      });
  }

  function friendlyError(code) {
    var map = {
      'auth/email-already-in-use': 'An account with this email already exists. Sign in instead.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/network-request-failed': 'Network error. Please check your connection.'
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  function togglePw(id, btn) {
    var input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.style.color = input.type === 'text' ? 'var(--gold)' : 'var(--text-muted)';
  }

  function setLoading(on) {
    var btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
    document.getElementById('btn-label').textContent = on ? 'Creating account...' : 'Create Account';
  }

  function showPage() {
    var page = document.getElementById('page');
    page.style.display = 'flex';
    var l = document.getElementById('loader');
    l.classList.add('hidden');
    setTimeout(function() { l.style.display = 'none'; }, 300);
  }

  function showError(msg) {
    document.getElementById('page').innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;"><div><div style="font-size:48px;margin-bottom:1rem;">⚡</div><p style="color:#9A9488;font-size:14px;">' + msg + '</p></div></div>';
    document.getElementById('page').style.display = 'flex';
    document.getElementById('loader').style.display = 'none';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSignup();
  });
</script>
</body>
</html>

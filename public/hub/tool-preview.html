<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/creatorhub.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
      authDomain:        "toolspark-2d62d.firebaseapp.com",
      projectId:         "toolspark-2d62d",
      storageBucket:     "toolspark-2d62d.firebasestorage.app",
      messagingSenderId: "82966513396",
      appId:             "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth      = firebase.auth();
    const db        = firebase.firestore();
    const functions = firebase.functions();
    document.addEventListener('DOMContentLoaded', () => {
      firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* Loading / error screens */
    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .screen.active { display: flex; }
    .screen-icon  { font-size: 36px; margin-bottom: 16px; }
    .screen-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .screen-sub   { font-size: 14px; color: var(--text2); line-height: 1.5; max-width: 340px; }

    /* Tool UI */
    .tool-wrap {
      display: none;
      flex: 1;
      flex-direction: column;
      max-width: 620px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .tool-wrap.active { display: flex; }

    .tool-header {
      margin-bottom: 28px;
    }
    .tool-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .tool-powered {
      font-size: 12px;
      color: var(--text3);
    }
    .tool-powered a {
      color: var(--text3);
      text-decoration: none;
    }
    .tool-powered a:hover { text-decoration: underline; }

    /* Progress bar */
    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--purple);
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* Messages */
    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 6px; }
    .bubble-wrap.user { align-items: flex-end; }

    .bubble-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      padding: 0 4px;
    }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bubble.ai   { background: var(--card); box-shadow: var(--shadow); border-radius: 4px 16px 16px 16px; }
    .bubble.user { background: var(--purple); color: #fff; border-radius: 16px 4px 16px 16px; }

    .bubble ul, .bubble ol { margin: 8px 0 0 16px; padding: 0; }
    .bubble li   { margin-bottom: 4px; }
    .bubble strong { font-weight: 700; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      gap: 4px;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
      box-shadow: var(--shadow);
    }
    .typing-indicator.show { display: flex; }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      animation: bounce .8s ease infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* Input bar */
    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .tool-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      background: var(--card);
      color: var(--text);
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }
    .tool-input:focus { border-color: var(--purple); }
    .tool-input:disabled { opacity: .5; cursor: not-allowed; }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--purple);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .send-btn:hover   { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* Restart */
    .restart-wrap {
      display: none;
      justify-content: center;
      margin-top: 12px;
    }
    .restart-wrap.show { display: flex; }
    .restart-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 6px 10px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .restart-btn:hover { color: var(--purple); background: rgba(107,47,179,.07); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="screen active" id="screen-loading">
    <div class="screen-icon">⚡</div>
    <div class="screen-title">Loading tool...</div>
  </div>

  <!-- Access denied -->
  <div class="screen" id="screen-denied">
    <div class="screen-icon">🔒</div>
    <div class="screen-title">Members only</div>
    <div class="screen-sub">Join this hub to access this tool.</div>
  </div>

  <!-- Not found -->
  <div class="screen" id="screen-notfound">
    <div class="screen-icon">🔍</div>
    <div class="screen-title">Tool not found</div>
    <div class="screen-sub">This tool may have been removed or isn't published yet.</div>
  </div>

  <!-- Error -->
  <div class="screen" id="screen-error">
    <div class="screen-icon">⚠️</div>
    <div class="screen-title">Something went wrong</div>
    <div class="screen-sub" id="error-msg">Please try again later.</div>
  </div>

  <!-- Tool UI -->
  <div class="tool-wrap" id="tool-wrap">
    <div class="tool-header">
      <div class="tool-name" id="tool-name">AI Tool</div>
      <div class="tool-powered">Powered by <a href="/">ToolSpark</a></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:5%;"></div>
    </div>
    <div class="messages" id="messages">
      <div class="typing-indicator" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
    <div class="input-wrap">
      <textarea class="tool-input" id="tool-input" rows="1"
        placeholder="Type your answer..."
        onkeydown="handleKey(event)"
        oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="restart-wrap" id="restart-wrap">
      <button class="restart-btn" onclick="restartTool()">↺ Start over</button>
    </div>
  </div>

  <script>
    const params    = new URLSearchParams(window.location.search);
    const toolId    = params.get('toolId')    || '';
    const creatorId = params.get('creatorId') || '';
    const isDraft   = params.get('draft')     === 'true';

    let conversationHistory = [];
    let isComplete          = false;
    let currentToolName     = 'AI Tool';

    function showScreen(id) {
      ['screen-loading','screen-denied','screen-notfound','screen-error','tool-wrap']
        .forEach(s => {
          const el = document.getElementById(s);
          el.classList.remove('active');
          if (el.classList.contains('screen') && s !== 'tool-wrap') el.classList.remove('active');
        });
      const target = document.getElementById(id);
      target.classList.add('active');
    }

    // ── Auth + access check ──────────────────────────────────────────────────────

    auth.onAuthStateChanged(user => {
      if (!user) {
        // Not logged in — for member tools redirect to join; for draft show denied
        if (isDraft) {
          showScreen('screen-denied');
        } else {
          window.location.href = '/hub/join?redirect=' + encodeURIComponent(window.location.href);
        }
        return;
      }
      checkAccessAndLoad(user);
    });

    function checkAccessAndLoad(user) {
      if (!toolId || !creatorId) {
        showScreen('screen-notfound');
        return;
      }

      // Check: owner (draft mode) OR active member
      const creatorRef = db.collection('creators').doc(creatorId);

      creatorRef.get().then(creatorDoc => {
        if (!creatorDoc.exists) { showScreen('screen-notfound'); return; }

        const isOwner = creatorDoc.data().ownerId === user.uid;

        if (isOwner) {
          // Owner can always see draft or published tools
          loadTool(creatorDoc.data().branding);
          return;
        }

        // Non-owner must be an active member
        creatorRef.collection('members').doc(user.uid).get().then(memberDoc => {
          if (!memberDoc.exists || memberDoc.data().status !== 'active') {
            showScreen('screen-denied');
            return;
          }
          // Inject hub branding for members too
          loadTool(creatorDoc.data().branding);
        });
      }).catch(() => showScreen('screen-error'));
    }

    function loadTool(branding) {
      injectBranding(branding);

      db.collection('creators').doc(creatorId).collection('tools').doc(toolId).get()
        .then(toolDoc => {
          if (!toolDoc.exists) { showScreen('screen-notfound'); return; }
          const tool = toolDoc.data();
          if (!isDraft && !tool.isPublished) { showScreen('screen-notfound'); return; }

          currentToolName = tool.toolName || 'AI Tool';
          document.getElementById('tool-name').textContent = currentToolName;
          document.title = currentToolName;

          showScreen('tool-wrap');
          startConversation();
        })
        .catch(err => {
          document.getElementById('error-msg').textContent = err.message;
          showScreen('screen-error');
        });
    }

    function injectBranding(branding) {
      if (!branding) return;
      const overrides = [];
      if (branding.primaryColor) overrides.push('--yellow: ' + branding.primaryColor + ';');
      if (branding.accentColor)  overrides.push('--purple: ' + branding.accentColor  + ';');
      if (branding.bgColor)      overrides.push('--bg: '     + branding.bgColor      + ';');
      if (!overrides.length) return;
      const style = document.createElement('style');
      style.textContent = ':root { ' + overrides.join(' ') + ' }';
      document.head.appendChild(style);
    }

    // ── Conversation ─────────────────────────────────────────────────────────────

    function startConversation() {
      conversationHistory = [];
      isComplete          = false;
      document.getElementById('messages').innerHTML = `
        <div class="typing-indicator show" id="typing">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      document.getElementById('progress-bar').style.width = '5%';
      document.getElementById('restart-wrap').classList.remove('show');
      setInputEnabled(false);

      // Send empty first message to get Sparky's opening question
      callTool('').then(text => {
        removeTyping();
        addBubble('ai', text);
        setInputEnabled(true);
        focusInput();
      }).catch(handleCallError);
    }

    function sendMessage() {
      const inp  = document.getElementById('tool-input');
      const text = inp.value.trim();
      if (!text || isComplete) return;

      inp.value = '';
      inp.style.height = '';
      addBubble('user', escHtml(text));
      conversationHistory.push({ role: 'user', content: text });
      setInputEnabled(false);
      showTyping();

      callTool(text).then(reply => {
        conversationHistory.push({ role: 'assistant', content: reply });
        removeTyping();
        addBubble('ai', formatMarkdown(reply));
        updateProgress();

        // Detect completion (AI wraps up)
        if (looksComplete(reply)) {
          isComplete = true;
          setInputEnabled(false);
          document.getElementById('restart-wrap').classList.add('show');
          document.getElementById('progress-bar').style.width = '100%';
        } else {
          setInputEnabled(true);
          focusInput();
        }
      }).catch(handleCallError);
    }

    function callTool(userMessage) {
      const msgs = userMessage
        ? [...conversationHistory, { role: 'user', content: userMessage }]
        : [{ role: 'user', content: 'Hello, let\'s get started.' }];

      const fn = functions.httpsCallable('callCreatorTool');
      return fn({ creatorId, toolId, messages: msgs, draft: isDraft })
        .then(r => r.data.text);
    }

    function handleCallError(err) {
      removeTyping();
      let msg = err.message || 'Something went wrong.';
      if (msg.includes('permission-denied') || msg.includes('unauthenticated')) {
        showScreen('screen-denied');
        return;
      }
      addBubble('ai', 'Oops — something went wrong. Please try again.');
      setInputEnabled(true);
    }

    // ── UI helpers ────────────────────────────────────────────────────────────────

    function addBubble(role, html) {
      const msgs  = document.getElementById('messages');
      const label = role === 'ai' ? currentToolName : 'You';
      const div   = document.createElement('div');
      div.className = 'bubble-wrap' + (role === 'user' ? ' user' : '');
      div.innerHTML = `
        <div class="bubble-label">${escHtml(label)}</div>
        <div class="bubble ${role}">${html}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const t    = document.createElement('div');
      t.className = 'typing-indicator show';
      t.id        = 'typing';
      t.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      msgs.appendChild(t);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function setInputEnabled(enabled) {
      document.getElementById('tool-input').disabled = !enabled;
      document.getElementById('send-btn').disabled   = !enabled;
    }

    function focusInput() {
      setTimeout(() => document.getElementById('tool-input').focus(), 100);
    }

    function autoGrow(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function updateProgress() {
      const turns = conversationHistory.filter(m => m.role === 'assistant').length;
      const pct   = Math.min(10 + turns * 18, 90);
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function looksComplete(text) {
      const lower = text.toLowerCase();
      return lower.includes('here are your results') ||
             lower.includes('here\'s your') ||
             lower.includes('your personalized') ||
             lower.includes('based on your answers') ||
             lower.includes('recommendation for you') ||
             (conversationHistory.filter(m => m.role === 'assistant').length >= 8);
    }

    function restartTool() {
      startConversation();
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    function formatMarkdown(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
        .replace(/^- (.+)$/gm, '• $1')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/hub/hub-shell.js"></script>
<style>
  .cv-wrap { display: flex; height: calc(100vh - 60px); overflow: hidden; }

  .cv-sidebar { width: 272px; min-width: 272px; border-right: 1px solid var(--hub-border, #E4E0D8); overflow-y: auto; background: var(--hub-bg, #F7F5F1); display: flex; flex-direction: column; }
  .cv-back { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--hub-text-muted, #6B6560); text-decoration: none; padding: 1.1rem 1.25rem; border-bottom: 1px solid var(--hub-border, #E4E0D8); flex-shrink: 0; }
  .cv-back:hover { color: var(--hub-text-primary, #1A1714); }
  .cv-course-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--hub-text-muted, #9A9488); padding: 1rem 1.25rem 0.4rem; }
  .cv-course-name { font-size: 14px; font-weight: 700; color: var(--hub-text-primary, #1A1714); padding: 0 1.25rem 0.75rem; line-height: 1.35; border-bottom: 1px solid var(--hub-border, #E4E0D8); margin-bottom: 0.5rem; }

  .cv-lesson-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 1.25rem; cursor: pointer; border-left: 3px solid transparent; transition: background 0.12s; }
  .cv-lesson-item:hover { background: var(--hub-chat-bg, #fff); }
  .cv-lesson-item.active { background: var(--hub-chat-bg, #fff); border-left-color: var(--gold, #C9A84C); }
  .cv-lesson-num { font-size: 11px; font-weight: 700; color: var(--hub-text-muted, #9A9488); min-width: 18px; padding-top: 2px; flex-shrink: 0; }
  .cv-lesson-name { font-size: 13px; color: var(--hub-text-primary, #1A1714); line-height: 1.4; }
  .cv-lesson-item.active .cv-lesson-name { font-weight: 700; }

  .cv-main { flex: 1; overflow-y: auto; padding: 2.5rem 2.5rem 3rem; }

  .cv-lesson-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold, #C9A84C); margin-bottom: 8px; }
  .cv-lesson-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 400; color: var(--hub-text-primary, #1A1714); line-height: 1.3; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--hub-border, #E4E0D8); }

  .cv-video { margin-bottom: 2rem; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; background: #000; max-width: 680px; }
  .cv-video iframe { width: 100%; height: 100%; border: 0; display: block; }

  .cv-body { font-size: 15px; color: var(--hub-text-primary, #1A1714); line-height: 1.8; max-width: 680px; }
  .cv-body p { margin: 0 0 1rem; }
  .cv-body strong { font-weight: 700; }
  .cv-body em { font-style: italic; }
  .cv-body h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; margin: 1.75rem 0 0.6rem; color: var(--hub-text-primary, #1A1714); }
  .cv-body h3 { font-size: 15px; font-weight: 700; margin: 1.25rem 0 0.4rem; }
  .cv-body ul, .cv-body ol { padding-left: 1.4rem; margin: 0 0 1rem; }
  .cv-body li { margin-bottom: 0.35rem; }

  .cv-nav { display: flex; gap: 10px; margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--hub-border, #E4E0D8); max-width: 680px; }
  .cv-nav-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--hub-border, #E4E0D8); background: var(--hub-chat-bg, #fff); font-size: 13px; font-weight: 700; color: var(--hub-text-primary, #1A1714); cursor: pointer; font-family: 'Lato', sans-serif; transition: border-color 0.15s, color 0.15s; }
  .cv-nav-btn:hover:not(:disabled) { border-color: var(--gold, #C9A84C); color: var(--gold, #C9A84C); }
  .cv-nav-btn.primary { background: var(--gold, #C9A84C); border-color: var(--gold, #C9A84C); color: #fff; }
  .cv-nav-btn.primary:hover:not(:disabled) { opacity: 0.9; color: #fff; }
  .cv-nav-btn:disabled { opacity: 0.35; cursor: default; }

  .cv-placeholder { text-align: center; padding: 4rem 1rem; color: var(--hub-text-muted, #9A9488); font-size: 14px; }

  @media (max-width: 720px) {
    .cv-wrap { flex-direction: column; height: auto; overflow: visible; }
    .cv-sidebar { width: 100%; min-width: unset; max-height: 240px; border-right: none; border-bottom: 1px solid var(--hub-border, #E4E0D8); }
    .cv-main { padding: 1.5rem 1rem 2rem; }
    .cv-lesson-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="hs-overlay"></div>
<aside id="hs-sidebar"></aside>
<div id="hs-main">
  <header id="hs-header"></header>
  <main class="hs-content" style="padding:0;overflow:hidden">
    <div class="cv-wrap">
      <div class="cv-sidebar" id="cv-sidebar">
        <div class="cv-placeholder">Loading...</div>
      </div>
      <div class="cv-main" id="cv-main">
        <div class="cv-placeholder">Loading course...</div>
      </div>
    </div>
  </main>
</div>

<script>
  var lessons = [];
  var currentIndex = -1;

  initHubPage('courses', function(hub, slug, studentAuth, studentDb) {
    var params = new URLSearchParams(location.search);
    var courseId = params.get('id');
    if (!courseId) { window.location.href = '/hub/' + slug + '/courses'; return; }

    if (!studentDb) {
      document.getElementById('cv-main').innerHTML = '<div class="cv-placeholder">Course content not available yet.</div>';
      return;
    }

    studentDb.collection('courses').doc(courseId).get()
      .then(function(courseDoc) {
        if (!courseDoc.exists) {
          document.getElementById('cv-main').innerHTML = '<div class="cv-placeholder">Course not found.</div>';
          return;
        }
        var course = courseDoc.data();
        document.title = (course.title || 'Course') + ' — ' + (hub.hubName || 'Hub');

        return studentDb.collection('courses').doc(courseId)
          .collection('lessons').orderBy('order').get()
          .then(function(snap) {
            lessons = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
            renderSidebar(course, slug);
            if (lessons.length > 0) {
              selectLesson(0);
            } else {
              document.getElementById('cv-main').innerHTML = '<div class="cv-placeholder">No lessons have been added yet.</div>';
            }
          });
      })
      .catch(function(e) {
        console.error(e);
        document.getElementById('cv-main').innerHTML = '<div class="cv-placeholder">Could not load this course. Please try again.</div>';
      });
  });

  function renderSidebar(course, slug) {
    document.getElementById('cv-sidebar').innerHTML =
      '<a href="/hub/' + esc(slug) + '/courses" class="cv-back">← All Courses</a>' +
      '<div class="cv-course-label">Current Course</div>' +
      '<div class="cv-course-name">' + esc(course.title || 'Untitled Course') + '</div>' +
      lessons.map(function(l, i) {
        return '<div class="cv-lesson-item" id="li-' + i + '" onclick="selectLesson(' + i + ')">' +
          '<span class="cv-lesson-num">' + (i + 1) + '</span>' +
          '<span class="cv-lesson-name">' + esc(l.title || 'Lesson ' + (i + 1)) + '</span>' +
        '</div>';
      }).join('');
  }

  function selectLesson(index) {
    currentIndex = index;
    var l = lessons[index];

    document.querySelectorAll('.cv-lesson-item').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.getElementById('li-' + index);
    if (activeEl) { activeEl.classList.add('active'); activeEl.scrollIntoView({ block: 'nearest' }); }

    var videoHtml = '';
    if (l.videoUrl) {
      var embed = toEmbedUrl(l.videoUrl);
      if (embed) videoHtml = '<div class="cv-video"><iframe src="' + esc(embed) + '" allowfullscreen></iframe></div>';
    }

    var prev = index > 0
      ? '<button class="cv-nav-btn" onclick="selectLesson(' + (index - 1) + ')">← Previous</button>'
      : '<button class="cv-nav-btn" disabled>← Previous</button>';
    var next = index < lessons.length - 1
      ? '<button class="cv-nav-btn primary" onclick="selectLesson(' + (index + 1) + ')">Next Lesson →</button>'
      : '<button class="cv-nav-btn primary" disabled>Course Complete ✓</button>';

    document.getElementById('cv-main').innerHTML =
      '<div class="cv-lesson-label">Lesson ' + (index + 1) + ' of ' + lessons.length + '</div>' +
      '<h1 class="cv-lesson-title">' + esc(l.title || 'Lesson ' + (index + 1)) + '</h1>' +
      videoHtml +
      (l.content ? '<div class="cv-body">' + renderMd(l.content) + '</div>' : '') +
      '<div class="cv-nav">' + prev + next + '</div>';
  }

  function renderMd(text) {
    var s = String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
    var paras = s.split(/\n\n+/);
    return paras.map(function(p) {
      p = p.trim();
      if (!p) return '';
      if (/^<h[23]>/.test(p)) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }

  function toEmbedUrl(url) {
    var yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return 'https://www.youtube.com/embed/' + yt[1];
    var vi = url.match(/vimeo\.com\/(\d+)/);
    if (vi) return 'https://player.vimeo.com/video/' + vi[1];
    var lo = url.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
    if (lo) return 'https://www.loom.com/embed/' + lo[1];
    return null;
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</body>
</html>

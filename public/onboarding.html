<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  const auth = firebase.auth();

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; max-width: 100%; }

  :root {
    --bg: #0C0B09;
    --surface: #141210;
    --surface2: #1C1A17;
    --border: #2A2720;
    --text: #F0EDE6;
    --text2: #9A9488;
    --text3: #4A4840;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 3rem;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse at top, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap { width: 100%; max-width: 480px; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text); }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  /* ── WELCOME STEP ── */
  .welcome-wrap { padding: 2rem; }
  .step { display: none; }
  .step.visible { display: block; animation: fadeUp 0.3s ease; }

  .welcome-icon { font-size: 36px; margin-bottom: 1rem; text-align: center; }
  .welcome-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--text); line-height: 1.3; margin-bottom: 0.75rem; text-align: center; }
  .welcome-sub { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 1.75rem; text-align: center; }
  .welcome-steps { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.75rem; }
  .welcome-step-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .welcome-step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: var(--gold); flex-shrink: 0; }
  .welcome-step-label { font-size: 14px; font-weight: 700; color: var(--text2); }

  .next-btn {
    width: 100%; padding: 13px; background: var(--gold); color: #0C0B09; border: none;
    border-radius: var(--radius-sm); font-family: 'Lato', sans-serif; font-size: 15px;
    font-weight: 900; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .next-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .skip-link { display: block; text-align: center; margin-top: 1rem; font-size: 12px; color: var(--text3); cursor: pointer; transition: color 0.15s; text-decoration: none; }
  .skip-link:hover { color: var(--text2); }

  /* ── CHAT STEP ── */
  #step-chat { display: none; flex-direction: column; }
  #step-chat.visible { display: flex; animation: fadeUp 0.3s ease; }

  .chat-messages {
    height: 400px;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.sparky { align-self: flex-start; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

  .sparky-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #C9A84C 0%, #8B6914 100%);
    border: 1px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 0 10px rgba(201,168,76,0.2);
  }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
  .msg-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); padding: 0 4px; }
  .msg-row.user .msg-label { text-align: right; }
  .msg-bubble { padding: 12px 16px; font-size: 15px; line-height: 1.7; }
  .msg-row.sparky .msg-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 14px 14px 14px 4px; }
  .msg-row.user .msg-bubble { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); color: var(--text); border-radius: 14px 14px 4px 14px; }

  .typing-wrap { align-self: flex-start; display: flex; align-items: flex-end; gap: 8px; }
  .typing-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: typingPulse 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingPulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  .chat-input-area { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
  .chat-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-family: 'Lato', sans-serif; font-size: 15px; color: var(--text);
    outline: none; resize: none; max-height: 100px; min-height: 44px;
    transition: border-color 0.15s; line-height: 1.5;
  }
  .chat-input::placeholder { color: var(--text3); }
  .chat-input:focus { border-color: rgba(201,168,76,0.4); }
  .chat-send-btn {
    width: 42px; height: 42px; border-radius: 50%; background: var(--gold);
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .chat-send-btn:hover:not(:disabled) { background: var(--gold-light); transform: scale(1.05); }
  .chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .chat-cta { padding: 1rem; border-top: 1px solid var(--border); display: none; }
  .chat-cta.visible { display: block; animation: fadeUp 0.3s ease; }
  .chat-cta-btn {
    width: 100%; padding: 13px; background: var(--gold); color: #0C0B09; border: none;
    border-radius: var(--radius-sm); font-family: 'Lato', sans-serif; font-size: 15px;
    font-weight: 900; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .chat-cta-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-text">Tool<span>Spark</span></div>
  </div>

  <div class="card" id="main-card">

    <!-- Step 0: Welcome -->
    <div class="step visible" id="step-0">
      <div class="welcome-wrap">
        <div class="welcome-icon">&#9889;</div>
        <div class="welcome-title">Welcome to the ToolSpark Challenge</div>
        <div class="welcome-sub">You're in. Here's what happens next — takes less than 5 minutes.</div>
        <div class="welcome-steps">
          <div class="welcome-step-row">
            <div class="welcome-step-num">1</div>
            <div class="welcome-step-label">Quick chat with Sparky to get you set up</div>
          </div>
          <div class="welcome-step-row">
            <div class="welcome-step-num">2</div>
            <div class="welcome-step-label">Watch the Start Here video</div>
          </div>
          <div class="welcome-step-row">
            <div class="welcome-step-num">3</div>
            <div class="welcome-step-label">Unlock your challenge &amp; get building</div>
          </div>
        </div>
        <button class="next-btn" onclick="goFromWelcome()">Let's go &#8594;</button>
        <a class="skip-link" onclick="skipAll()">Skip setup for now</a>
      </div>
    </div>

    <!-- Step chat: Sparky onboarding -->
    <div class="step" id="step-chat">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area" id="chat-input-area">
        <textarea
          class="chat-input"
          id="chat-input"
          placeholder="Type your reply..."
          rows="1"
          disabled
        ></textarea>
        <button class="chat-send-btn" id="chat-send-btn" onclick="handleSend()" disabled title="Send">
          <svg width="18" height="18" fill="none" stroke="#0C0B09" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-cta" id="chat-cta">
        <button class="chat-cta-btn" onclick="goToVideo()">Watch the Start Here Video &#8594;</button>
      </div>
    </div>

  </div>
</div>

<script>
let currentUser = null;
let firstName = '';
let chatBusy = false;
let chatDone = false;
let pendingIntake = null;

const START_HERE_URL = 'course.html?courseId=JQYsP0RQUPWZ0twQtiQg&lessonId=XQW5SV09fR0fuvkaHT50';
const FUNCTION_URL   = 'https://analyze-e6qya4oddq-uc.a.run.app';
const MODEL          = 'claude-sonnet-4-6';

const chatHistory = [];

// ── AUTH HEADERS ──
async function authHeaders() {
  const user = firebase.auth().currentUser;
  if (!user) return { 'Content-Type': 'application/json' };
  const token = await user.getIdToken();
  let acToken = '';
  try {
    const t = await Promise.race([
      firebase.appCheck().getToken(false),
      new Promise((_, r) => setTimeout(() => r(), 3000))
    ]);
    acToken = t?.token || '';
  } catch(e) {}
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, 'X-Firebase-AppCheck': acToken };
}

// ── API CALL ──
async function callAI(userMsg) {
  chatHistory.push({ role: 'user', content: userMsg });
  const resp = await fetch(FUNCTION_URL, {
    method: 'POST',
    headers: await authHeaders(),
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 300,
      messages: chatHistory,
      _meta: { tool: 'onboarding-chat' }
    })
  });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const data = await resp.json();
  if (!Array.isArray(data.content)) throw new Error('Unexpected response');
  const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
  chatHistory.push({ role: 'assistant', content: text });
  return text;
}

// ── CHAT UI HELPERS ──
var SPARKY_AVATAR = '<div class="sparky-avatar"><svg width="14" height="18" viewBox="0 0 14 18" fill="none"><path d="M8 1L1 10h6l-1 7 6-9H6l2-7z" fill="#0C0B09" stroke="#0C0B09" stroke-width="0.5" stroke-linejoin="round"/></svg></div>';

function addMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg';
  msgDiv.innerHTML =
    '<div class="msg-label">' + (role === 'sparky' ? 'Sparky' : 'You') + '</div>' +
    '<div class="msg-bubble">' + escapeHtml(role === 'sparky' ? stripMd(text) : text) + '</div>';
  if (role === 'sparky') {
    row.appendChild(document.createRange().createContextualFragment(SPARKY_AVATAR));
    row.appendChild(msgDiv);
  } else {
    row.appendChild(msgDiv);
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function stripMd(str) {
  return String(str || '').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/__(.+?)__/g,'$1').replace(/_(.+?)_/g,'$1').replace(/`(.+?)`/g,'$1').replace(/\*+/g,'').trim();
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'typing-wrap';
  div.id = 'typing-indicator';
  div.innerHTML = SPARKY_AVATAR + '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function enableInput() {
  document.getElementById('chat-input').disabled = false;
  document.getElementById('chat-input').focus();
}

function disableInput() {
  document.getElementById('chat-input').disabled = true;
  document.getElementById('chat-send-btn').disabled = true;
}

// ── DETECT COMPLETION MARKER ──
function parseCompletion(text) {
  const markerLine = text.split('\n').find(l => l.trim().startsWith('ONBOARDING_COMPLETE'));
  if (!markerLine) return null;
  const clean = text.replace(/\n?ONBOARDING_COMPLETE[^\n]*/g, '').trim();
  const parts = markerLine.split('|');
  const get = (key) => {
    const part = parts.find(p => p.startsWith(key + ':'));
    return part ? part.replace(key + ':', '').trim() : '';
  };
  return {
    visibleText: clean,
    motivation: get('motivation'),
    dream: get('dream')
  };
}

// ── HANDLE AI REPLY ──
async function processReply(rawReply) {
  const completion = parseCompletion(rawReply);
  if (completion) {
    if (completion.visibleText) addMessage('sparky', completion.visibleText);
    pendingIntake = {
      motivation:  completion.motivation,
      dreamOutcome: completion.dream,
      completedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await saveIntake();
    document.getElementById('chat-input-area').style.display = 'none';
    document.getElementById('chat-cta').classList.add('visible');
    chatDone = true;
  } else {
    addMessage('sparky', rawReply);
    enableInput();
  }
}

// ── SEND MESSAGE ──
async function handleSend() {
  if (chatBusy || chatDone) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  disableInput();
  addMessage('user', text);
  chatBusy = true;
  showTyping();

  try {
    const reply = await callAI(text);
    hideTyping();
    await processReply(reply);
  } catch(e) {
    hideTyping();
    addMessage('sparky', "Something went sideways — try sending that again.");
    enableInput();
  }

  chatBusy = false;
  document.getElementById('chat-send-btn').disabled = false;
}

// ── INIT CHAT ──
function buildSystemPrompt() {
  return `You are Sparky — the ToolSpark mascot and guide. ${firstName ? firstName : 'Someone'} just joined the ToolSpark Challenge. This is their very first moment inside the platform.

Your mission: make them feel genuinely welcomed and excited, then ask exactly 2 questions across the conversation:
1. Why did they want to join the challenge? (their motivation, their story, what brought them here)
2. In a perfect world, what is the one thing they would solve in their business or personal journey?

Rules:
- Be warm, energetic, and genuinely encouraging. This is a celebration — they just made a real decision.
- Keep every message SHORT: 2-3 sentences max. No long paragraphs.
- Ask ONE question at a time. Never stack two questions in one message.
- React to their answers with genuine warmth before moving to the next question — make them feel heard.
- Never make them feel judged, behind, or lacking for any answer they give.
- Never use the 👀 emoji — it reads as watchful or sarcastic.
- After you have both answers, write 2 sentences of genuine, specific encouragement that directly reflects what they shared. Reference their actual words. Then tell them their very first step is the Start Here video.
- End your final message with this exact line on its own as the very last line — it is hidden from the user and processed by the system:
ONBOARDING_COMPLETE|motivation:[5-10 word summary of why they joined]|dream:[5-10 word summary of what they want to solve]`;
}

async function initChat() {
  document.getElementById('step-0').classList.remove('visible');
  document.getElementById('step-chat').classList.add('visible');
  chatBusy = true;
  showTyping();

  const systemPrompt = buildSystemPrompt();
  const openingMsg = firstName
    ? `Welcome ${firstName} — they just landed on the platform for the first time. Greet them by name. Be warm and energetic. Tell them you're Sparky and you're here to get them set up. Then ask your first question: what do they want to build or accomplish with this challenge?`
    : `Welcome this new member — they just landed on the platform for the first time. Be warm and energetic. Tell them you're Sparky and you're here to get them set up. Then ask your first question: what do they want to build or accomplish with this challenge?`;

  chatHistory.push({ role: 'user', content: systemPrompt + '\n\n' + openingMsg });

  try {
    const resp = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: await authHeaders(),
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 300,
        messages: chatHistory,
        _meta: { tool: 'onboarding-chat' }
      })
    });
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
    chatHistory.push({ role: 'assistant', content: text });
    hideTyping();
    addMessage('sparky', text);
    enableInput();
  } catch(e) {
    hideTyping();
    addMessage('sparky', "Hey, welcome! ⚡ I'm Sparky — super glad you're here. What are you looking to build with this challenge?");
    enableInput();
  }

  chatBusy = false;
  document.getElementById('chat-send-btn').disabled = false;
}

function goFromWelcome() {
  initChat();
}

// ── SAVE INTAKE ──
async function saveIntake() {
  try {
    if (currentUser && pendingIntake) {
      await db.collection('users').doc(currentUser.uid).update({
        intake: pendingIntake,
        firstVisit: true,
        onboardingComplete: false
      });
    }
  } catch(e) {
    console.error('Intake save error:', e);
  }
}

// ── REDIRECT TO VIDEO ──
async function goToVideo() {
  try {
    if (currentUser) {
      await db.collection('users').doc(currentUser.uid).update({ onboardingComplete: true });
    }
  } catch(e) {}
  window.location.href = START_HERE_URL;
}

// ── SKIP ──
async function skipAll() {
  try {
    if (currentUser) {
      await db.collection('users').doc(currentUser.uid).update({
        'intake.skipped': true,
        'intake.skippedAt': firebase.firestore.FieldValue.serverTimestamp(),
        firstVisit: true,
        onboardingComplete: false
      });
    }
  } catch(e) {}
  window.location.href = START_HERE_URL;
}

// ── TEXTAREA AUTO-RESIZE + ENTER TO SEND ──
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  document.getElementById('chat-send-btn').disabled = !this.value.trim() || chatBusy;
});
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── AUTH ──
auth.onAuthStateChanged(async function(user) {
  if (!user) { window.location.href = 'signon.html'; return; }
  currentUser = user;

  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if (snap.exists) {
      const data = snap.data();
      firstName = data.firstName || data.displayName?.split(' ')[0] || '';
      if (data.userRole === 'admin' || data.onboardingComplete) {
        window.location.href = 'community.html';
        return;
      }
      const intake = data.intake;
      if (intake && (intake.completedAt || intake.skipped)) {
        window.location.href = START_HERE_URL;
        return;
      }
    }
  } catch(e) {}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --green-light: #3D8A65;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); transition: transform 0.3s ease; }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: space-between; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }
  .sidebar-close-btn { display: none; background: none; border: none; color: #9A9488; cursor: pointer; padding: 4px; border-radius: 6px; }
  .sidebar-close-btn:hover { color: #F0EDE6; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  /* MAIN */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 50; gap: 1rem; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hamburger-btn { display: none; background: none; border: none; color: #F0EDE6; cursor: pointer; padding: 6px; border-radius: 6px; }
  .hamburger-btn:hover { background: rgba(255,255,255,0.08); }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: #F0EDE6; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .notif-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--dark3); border: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #9A9488; transition: all 0.15s; position: relative; text-decoration: none; }
  .notif-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--gold); }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; border: 1px solid var(--dark2); display: none; }

  /* PAGE */
  .page-content { flex: 1; padding: 1.75rem 2rem; max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 3rem; }

  /* PROFILE CARD */
  .profile-card { background: var(--surface); border: 1px solid var(--gold); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
  .profile-top { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.25rem; }
  .profile-avatar-wrap { position: relative; flex-shrink: 0; }
  .profile-avatar { width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; }
  .profile-avatar-fallback { width: 68px; height: 68px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: var(--dark); }
  .level-badge { position: absolute; bottom: -4px; right: -4px; width: 22px; height: 22px; border-radius: 50%; background: var(--gold); border: 2px solid var(--dark2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--dark); }
  .profile-info { flex: 1; }
  .profile-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .profile-level { font-size: 13px; color: var(--gold); font-weight: 600; margin-bottom: 3px; }
  .profile-next { font-size: 12px; color: var(--text3); }

  /* LEVEL GRID */
  .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  .level-row { display: flex; align-items: center; gap: 6px; }
  .level-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .level-num.unlocked { background: var(--gold); color: var(--dark); }
  .level-num.locked { background: var(--border); color: var(--text3); }
  .level-name { font-size: 11px; color: var(--text2); }
  .level-name.locked { color: var(--text3); }

  /* TABS */
  .tabs { display: flex; background: var(--border); border-radius: var(--radius-sm); padding: 3px; gap: 3px; }
  .tab { flex: 1; padding: 8px; text-align: center; border-radius: calc(var(--radius-sm) - 2px); font-size: 13px; font-weight: 700; color: var(--text3); cursor: pointer; transition: all 0.15s; border: none; background: none; font-family: 'Lato', sans-serif; }
  .tab.active { background: var(--dark); color: var(--gold); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* LEADERBOARD */
  .leaderboard-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .lb-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 1.25rem; border-bottom: 1px solid var(--border); background: var(--bg); }
  .lb-header-rank { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .lb-header-points { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

  .lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 1.25rem; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: #FAFAF8; }
  .lb-row.me { background: var(--gold-dim); border-left: 3px solid var(--gold); }
  .lb-rank { width: 32px; text-align: center; flex-shrink: 0; font-size: 20px; }
  .lb-rank-num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text3); margin: 0 auto; }
  .lb-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; flex-shrink: 0; }
  .lb-avatar-fallback { width: 38px; height: 38px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--dark); flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
  .lb-points { font-size: 14px; font-weight: 700; color: var(--text3); }
  .lb-points.top { color: var(--gold); }

  .lb-loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }
  .lb-empty { text-align: center; padding: 3rem; }
  .lb-empty-icon { font-size: 40px; margin-bottom: 1rem; }
  .lb-empty-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .lb-empty-sub { font-size: 13px; color: var(--text3); }

  /* MOBILE BOTTOM NAV */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--dark); border-top: 1px solid var(--border-dark); z-index: 200; align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .mobile-nav-item.active, .mobile-nav-item:hover { color: var(--gold); }

  /* RESPONSIVE */
  @media (max-width: 1023px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
  }
  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-close-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
    .sidebar-overlay { display: block; }
    .hamburger-btn { display: flex; }
    .main-wrap { margin-left: 0; }
    .top-header { padding: 0 1rem; height: 54px; }
    .page-content { padding: 1rem 1rem 80px; gap: 1rem; }
    .level-grid { grid-template-columns: 1fr; }
    .mobile-bottom-nav { display: flex; }
  }
  @media (max-width: 480px) {
    .page-content { padding: 0.875rem 0.875rem 80px; }
  }
</style>
</head>

    Dashboard
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  try { firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true); } catch(e) {}
  const auth = firebase.auth();
  const db = firebase.firestore();

  const LEVELS = [
    { level: 1, name: 'Beginner',             min: 0 },
    { level: 2, name: 'Action Taker',          min: 100 },
    { level: 3, name: 'Creative Contributor',  min: 300 },
    { level: 4, name: 'Community Builder',     min: 600 },
    { level: 5, name: 'Community Expert',      min: 1000 },
    { level: 6, name: 'Community Pro',         min: 2000 },
    { level: 7, name: 'Community Leader',      min: 4000 },
    { level: 8, name: 'Top Performer',         min: 7000 },
    { level: 9, name: 'LEGENDARY',             min: 10000 },
  ];

  function getUserLevel(points) {
    let current = LEVELS[0];
    for (const lvl of LEVELS) {
      if (points >= lvl.min) current = lvl;
      else break;
    }
    return current;
  }

  let currentUser = null;
  let currentUserData = null;
  let activeTab = 'all';
  let allEntries = [];
  let weekEntries = [];
  let monthEntries = [];

  auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'signon.html'; return; }
    currentUser = user;

    const name = user.displayName || user.email || 'Builder';
    const first = name.split(' ')[0];
    document.getElementById('sidebar-name').textContent = name;

    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      av.innerHTML = '<img src="' + user.photoURL + '" alt="avatar">';
    } else {
      av.textContent = first.charAt(0).toUpperCase();
    }

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists) {
        currentUserData = snap.data();
        if (currentUserData.userRole === 'admin') {
          document.getElementById('admin-nav-link').style.display = 'flex';
          document.getElementById('sidebar-role').textContent = 'Admin';
        }
        renderProfileCard(currentUserData);
      }
    } catch(e) {}

    // Notifications
    try {
      const notifSnap = await db.collection('notifications')
        .where('userId', '==', user.uid)
        .where('read', '==', false)
        .limit(1).get();
      if (!notifSnap.empty) document.getElementById('notif-dot').style.display = 'block';
    } catch(e) {}

    setActiveTab('all');
    loadAllTime();
  });

  function renderProfileCard(data) {
    const points = data.points || 0;
    const level = getUserLevel(points);
    const nextLevel = LEVELS.find(l => l.level === level.level + 1);
    const pointsToNext = nextLevel ? nextLevel.min - points : 0;

    document.getElementById('profile-card').style.display = 'block';
    document.getElementById('profile-name').textContent = data.displayName || 'Member';
    document.getElementById('profile-level').textContent = 'Level ' + level.level + ' — ' + level.name;
    document.getElementById('profile-next').textContent = nextLevel
      ? pointsToNext.toLocaleString() + ' points to level up'
      : 'Max level reached 🏆';
    document.getElementById('level-badge').textContent = level.level;

    // Avatar
    const wrap = document.getElementById('profile-avatar-wrap');
    if (data.photoURL) {
      wrap.innerHTML = '<img class="profile-avatar" src="' + escHtml(data.photoURL) + '" alt="avatar">';
    } else {
      const initial = (data.displayName || 'M').charAt(0).toUpperCase();
      wrap.innerHTML = '<div class="profile-avatar-fallback">' + initial + '</div>';
    }

    // Level grid
    document.getElementById('level-grid').innerHTML = LEVELS.map(function(lvl) {
      const unlocked = points >= lvl.min;
      return '<div class="level-row">' +
        '<div class="level-num ' + (unlocked ? 'unlocked' : 'locked') + '">' +
        (unlocked ? lvl.level : '🔒') +
        '</div>' +
        '<div class="level-name ' + (unlocked ? '' : 'locked') + '">Level ' + lvl.level + ' — ' + lvl.name + '</div>' +
        '</div>';
    }).join('');
  }

  async function loadAllTime() {
    document.getElementById('lb-body').innerHTML = '<div class="lb-loading">Loading...</div>';
    try {
      const snap = await db.collection('users')
        .orderBy('points', 'desc')
        .limit(50)
        .get();

      allEntries = snap.docs.map(function(doc) {
        const d = doc.data();
        return {
          userId: doc.id,
          displayName: d.displayName || 'Member',
          photoURL: d.photoURL || '',
          points: d.points || 0,
          streak: d.streak || 0,
        };
      });

      renderLeaderboard(allEntries, false);
    } catch(e) {
      document.getElementById('lb-body').innerHTML = '<div class="lb-loading">Could not load leaderboard.</div>';
    }
  }

  async function loadTimeBased(days) {
    document.getElementById('lb-body').innerHTML = '<div class="lb-loading">Loading...</div>';
    try {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - days);
      const cutoffTs = firebase.firestore.Timestamp.fromDate(cutoff);

      const usersSnap = await db.collection('users')
        .orderBy('points', 'desc')
        .limit(50)
        .get();

      const results = await Promise.all(usersSnap.docs.map(async function(userDoc) {
        const raw = userDoc.data();
        try {
          const txSnap = await db.collection('pointsHistory')
            .doc(userDoc.id)
            .collection('transactions')
            .where('createdAt', '>=', cutoffTs)
            .get();
          const periodPoints = txSnap.docs.reduce(function(sum, tx) {
            return sum + (tx.data().points || 0);
          }, 0);
          return {
            userId: userDoc.id,
            displayName: raw.displayName || 'Member',
            photoURL: raw.photoURL || '',
            points: periodPoints,
            streak: raw.streak || 0,
          };
        } catch(e) {
          return { userId: userDoc.id, displayName: raw.displayName || 'Member', photoURL: raw.photoURL || '', points: 0, streak: 0 };
        }
      }));

      const filtered = results.filter(r => r.points > 0).sort((a, b) => b.points - a.points);

      if (days === 7) weekEntries = filtered;
      else monthEntries = filtered;

      renderLeaderboard(filtered, true);
    } catch(e) {
      document.getElementById('lb-body').innerHTML = '<div class="lb-loading">Could not load leaderboard.</div>';
    }
  }

  function renderLeaderboard(entries, isPeriod) {
    document.getElementById('points-label').textContent = isPeriod ? 'Points Earned' : 'Points';

    if (entries.length === 0) {
      document.getElementById('lb-body').innerHTML =
        '<div class="lb-empty"><div class="lb-empty-icon">🏆</div><div class="lb-empty-title">No rankings yet</div><div class="lb-empty-sub">' +
        (isPeriod ? 'No activity in this period yet' : 'Start engaging to earn points') +
        '</div></div>';
      return;
    }

    const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };

    document.getElementById('lb-body').innerHTML = entries.map(function(entry, i) {
      const rank = i + 1;
      const isMe = currentUser && entry.userId === currentUser.uid;
      const pointsLabel = isPeriod
        ? '+' + entry.points.toLocaleString()
        : entry.points.toLocaleString();

      const rankHtml = medals[rank]
        ? '<span style="font-size:20px;">' + medals[rank] + '</span>'
        : '<div class="lb-rank-num">' + rank + '</div>';

      const avatarHtml = entry.photoURL
        ? '<img class="lb-avatar" src="' + escHtml(entry.photoURL) + '" alt="avatar">'
        : '<div class="lb-avatar-fallback">' + (entry.displayName.charAt(0).toUpperCase()) + '</div>';

      const streakHtml = (entry.streak || 0) >= 3 ? ' 🔥' : '';

      return '<div class="lb-row' + (isMe ? ' me' : '') + '">' +
        '<div class="lb-rank">' + rankHtml + '</div>' +
        avatarHtml +
        '<div class="lb-name">' + escHtml(entry.displayName) + streakHtml + (isMe ? ' <span style="font-size:11px;color:var(--gold);font-weight:700;">(you)</span>' : '') + '</div>' +
        '<div class="lb-points' + (rank <= 3 ? ' top' : '') + '">' + pointsLabel + '</div>' +
        '</div>';
    }).join('');
  }

  function setActiveTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
  }

  function switchTab(tab) {
    setActiveTab(tab);
    if (tab === 'all') {
      if (allEntries.length > 0) renderLeaderboard(allEntries, false);
      else loadAllTime();
    } else if (tab === '7d') {
      if (weekEntries.length > 0) renderLeaderboard(weekEntries, true);
      else loadTimeBased(7);
    } else if (tab === '30d') {
      if (monthEntries.length > 0) renderLeaderboard(monthEntries, true);
      else loadTimeBased(30);
    }
  }

  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Mobile sidebar
  document.getElementById('hamburger-btn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
  window.addEventListener('resize', function() { if (window.innerWidth > 767) closeSidebar(); });
</script>
</body>
</html>

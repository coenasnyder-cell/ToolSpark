<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --dark3: #1C1A17; --border-dark: #2A2720;
    --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dim: rgba(201,168,76,0.12);

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); transition: transform 0.3s ease; }

  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }

  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; }

  .map-box.empty-tool { opacity: 0.6; }
  .box-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); }
  .box-label.gold { color: var(--gold); }
  .box-name { font-size: 13px; font-weight: 900; color: var(--text); line-height: 1.3; }
  .box-desc { font-size: 11px; color: var(--text2); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .box-price { display: inline-flex; align-items: center; padding: 3px 8px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); border-radius: 100px; font-size: 10px; font-weight: 700; color: var(--gold); margin-top: auto; align-self: flex-start; }
  .marketplace-callout { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 13px; color: var(--text2); line-height: 1.55; margin-top: 1rem; }

  /* FUNNEL PLACEHOLDER */
  .funnel-placeholder { padding: 1.5rem; text-align: center; }
  .funnel-placeholder h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; color: var(--text); margin-bottom: 6px; }

  .btn-grey { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--bg); color: var(--text3); font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: not-allowed; text-decoration: none; opacity: 0.7; }

  /* MOBILE */
  @media (max-width: 1023px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-item span, .logo-tag, .user-info { display: none; }

  }

<script>
  var TOTAL_SECTIONS = 3; // Funnel Generator not counted until built

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(str, max) {
    if (!str) return '';
    return str.length > max ? str.slice(0, max).trimEnd() + '...' : str;
  }

  // ── OFFER SORT OUTPUT PARSER (mirrors offer-sort.html) ──
  function stripMd(str) {
    return String(str || '').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/__(.+?)__/g,'$1').replace(/_(.+?)_/g,'$1').replace(/`(.+?)`/g,'$1').trim();
  }

  function parseItems(block) {
    if (!block) return [];
    if (/nothing from your list/i.test(block) || /offer is already clean/i.test(block) || /nothing to sort/i.test(block)) {
      return [{ name: null, reason: stripMd(block.trim()) }];
    }
    var items = [];
    var lines = block.split('\n').filter(function(l) { return l.trim(); });
    lines.forEach(function(line) {
      var clean = line.replace(/^\d+\.\s*/, '').trim();
      var dashIdx = clean.search(/\s[—–]\s|\s-\s/);
      if (dashIdx > -1) {
        var name = stripMd(clean.slice(0, dashIdx).trim());
        var reason = stripMd(clean.slice(dashIdx).replace(/^[\s—–-]+/, '').trim());
        if (name && reason) items.push({ name: name, reason: reason });
      } else if (clean.length > 0) {
        items.push({ name: null, reason: stripMd(clean) });
      }
    });
    return items;
  }

  function parseOfferSortOutput(text) {
    var keepMatch = text.match(/✅\s*KEEP\s*([\s\S]*?)(?=❌\s*CUT|$)/i);
    var cutMatch  = text.match(/❌\s*CUT\s*([\s\S]*?)$/i);
    return {
      keep: keepMatch ? parseItems(keepMatch[1].trim()) : [],
      cut:  cutMatch  ? parseItems(cutMatch[1].trim())  : []
    };
  }

  // ── COPY HELPER ──
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); btn.textContent = btn.dataset.label || 'Copy'; }, 2500);
    }).catch(function() {
      var el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); btn.textContent = btn.dataset.label || 'Copy'; }, 2500);
    });
  }
  window.copyJust = function(btn) {
    var text = document.getElementById('just-text').textContent;
    copyText(text, btn);
  };
  window.copyCutReason = function(btn, text) { copyText(text, btn); };
  window.toggleCutList = function(btn) {
    var list = document.getElementById('cut-list-inner');
    var arrow = document.getElementById('cut-arrow');
    if (!list) return;
    var isOpen = list.classList.toggle('open');
    if (arrow) arrow.classList.toggle('open', isOpen);
  };

  // ── RENDERERS ──

  function renderOfferSort(data) {
    var parsed = data.rawOutput ? parseOfferSortOutput(data.rawOutput) : { keep: [], cut: [] };

    var stackHtml = '';
    // Core delivery + obstacle remover always first
    if (data.coreDelivery) {
      stackHtml += '<div class="stack-item core"><span class="stack-icon">✅</span><div><div class="stack-name">' + esc(data.coreDelivery) + '</div><div class="stack-reason">Core delivery</div></div></div>';
    }
    if (data.obstacleRemover) {
      stackHtml += '<div class="stack-item core"><span class="stack-icon">✅</span><div><div class="stack-name">' + esc(data.obstacleRemover) + '</div><div class="stack-reason">Obstacle remover</div></div></div>';
    }
    parsed.keep.forEach(function(item) {
      if (!item.name) return;
      stackHtml += '<div class="stack-item keep"><span class="stack-icon">✅</span><div><div class="stack-name">' + esc(item.name) + '</div><div class="stack-reason">' + esc(item.reason) + '</div></div></div>';
    });

    var cutHtml = '';
    parsed.cut.forEach(function(item) {
      if (!item.name && !item.reason) return;
      var reason = item.reason || '';
      cutHtml += '<div class="cut-item">' +
        '<span class="stack-icon">❌</span>' +
        '<div class="cut-item-text">' +
          (item.name ? '<div class="cut-item-name">' + esc(item.name) + '</div>' : '') +
          '<div class="cut-item-reason">' + esc(reason) + '</div>' +
        '</div>' +
        (reason ? '<button class="btn-copy-sm" data-label="Copy" onclick="copyCutReason(this,' + JSON.stringify(reason) + ')">Copy</button>' : '') +
      '</div>';
    });

    return '<div class="offer-stack">' + (stackHtml || '<div style="font-size:13px;color:var(--text3);">No items parsed.</div>') + '</div>' +
      (cutHtml ? (
        '<button class="cut-toggle" onclick="toggleCutList(this)">' +
          '<span class="cut-toggle-arrow" id="cut-arrow">›</span>' +
          'Cut List — Your Marketing Copy' +
        '</button>' +
        '<div class="cut-list-inner" id="cut-list-inner">' +
          '<div class="cut-list-label">These didn\'t make the offer — but they make great content and bonuses.</div>' +
          cutHtml +
        '</div>'
      ) : '');
  }

  function renderOfferBuilder(data) {
    return '<div class="price-badges">' +
        '<div class="price-badge"><div class="badge-label">🟡 Accessible</div><div class="badge-amount">' + esc(data.accessiblePrice || '—') + '</div></div>' +
        '<div class="price-badge confident"><div class="badge-label">⚡ Confident</div><div class="badge-amount">' + esc(data.confidentPrice || '—') + '</div></div>' +
        '<div class="price-badge"><div class="badge-label">🏅 Premium</div><div class="badge-amount">' + esc(data.premiumPrice || '—') + '</div></div>' +
      '</div>' +
      (data.format ? '<div class="format-line"><strong>Format:</strong> ' + esc(data.format) + '</div>' : '') +
      (data.justification ? (
        '<div class="just-block">' +
          '<div class="just-label">The sentence that justifies your price</div>' +
          '<div class="just-quote" id="just-text">' + esc(data.justification) + '</div>' +
          '<button class="btn-copy-just" data-label="Copy" onclick="copyJust(this)">Copy</button>' +
        '</div>'
      ) : '');
  }

  function renderJourneyMap(data) {
    var boxes = [
      { cls: 'discovery', label: 'How they find you', name: data.discovery || '—', desc: '', price: null },
      { cls: 'entry',     label: 'Entry Offer',       name: data.box2 && data.box2.toolName ? data.box2.toolName : 'To be decided', desc: data.box2 && data.box2.toolDescription ? data.box2.toolDescription : '', price: data.box2 && data.box2.price ? data.box2.price : null, empty: !data.box2 || !data.box2.toolName },
      { cls: 'core',      label: 'Core Offer',        name: data.box3 && data.box3.toolName ? data.box3.toolName : 'To be decided', desc: data.box3 && data.box3.toolDescription ? data.box3.toolDescription : '', price: data.box3 && data.box3.price ? data.box3.price : null, empty: !data.box3 || !data.box3.toolName },
      { cls: 'next',      label: 'Next Step',         name: data.box4 && data.box4.toolName ? data.box4.toolName : 'To be decided', desc: data.box4 && data.box4.toolDescription ? data.box4.toolDescription : '', price: data.box4 && data.box4.price ? data.box4.price : null, empty: !data.box4 || !data.box4.toolName }
    ];

    var html = '<div class="journey-map">';
    boxes.forEach(function(box, i) {
      html += '<div class="map-box ' + box.cls + (box.empty ? ' empty-tool' : '') + '">' +
        '<div class="box-label' + (box.cls !== 'discovery' ? ' gold' : '') + '">' + esc(box.label) + '</div>' +
        '<div class="box-name">' + esc(box.name) + '</div>' +
        (box.desc ? '<div class="box-desc">' + esc(truncate(box.desc, 80)) + '</div>' : '') +
        (box.price ? '<div class="box-price">' + esc(box.price) + '</div>' : '') +
      '</div>';
      if (i < boxes.length - 1) html += '<div class="map-arrow">→</div>';
    });
    html += '</div>';

    var isMarketplace = data.discovery === 'ToolSpark Marketplace';
    if (isMarketplace) {
      html += '<div class="marketplace-callout">⚡ <strong>Your Marketplace listing is your Box 1.</strong> Make sure it\'s live and complete before you drive traffic to your funnel.</div>';
    }
    return html;
  }

  function sectionCard(number, title, isComplete, isPlaceholder, bodyHtml, editHref) {
    var cls = isPlaceholder ? 'placeholder' : (isComplete ? 'complete' : 'incomplete');
    return '<div class="section-card ' + cls + '">' +
      '<div class="section-head">' +
        '<div class="section-head-left">' +
          '<div class="section-status-dot"></div>' +
          '<div>' +
            '<div class="section-number">' + number + '</div>' +
            '<div class="section-title">' + title + '</div>' +
          '</div>' +
        '</div>' +
        (editHref ? '<a class="btn-edit-link" href="' + editHref + '">Edit</a>' : '') +
      '</div>' +
      '<div class="section-body">' + bodyHtml + '</div>' +
    '</div>';
  }

  // ── MAIN RENDER ──
  function renderPage(offerSort, offerBuilder, journeyMap) {
    var completed = 0;
    var sections = '';

    // 1 — Offer Sort
    if (offerSort) {
      completed++;
      sections += sectionCard('01', 'Offer Sort', true, false, renderOfferSort(offerSort), 'offer-sort.html');
    } else {
      sections += sectionCard('01', 'Offer Sort', false, false,
        '<p class="incomplete-msg">You haven\'t packaged your offer yet.</p><a class="btn-go" href="offer-sort.html">Go to Offer Sort →</a>',
        null);
    }

    // 2 — Offer Builder
    if (offerBuilder) {
      completed++;
      sections += sectionCard('02', 'Offer Builder', true, false, renderOfferBuilder(offerBuilder), 'offer-builder.html');
    } else {
      sections += sectionCard('02', 'Offer Builder', false, false,
        '<p class="incomplete-msg">You haven\'t set your pricing yet.</p><a class="btn-go" href="offer-builder.html">Go to Offer Builder →</a>',
        null);
    }

    // 3 — Journey Map
    if (journeyMap) {
      completed++;
      sections += sectionCard('03', 'Journey Map', true, false, renderJourneyMap(journeyMap), 'journey-map.html');
    } else {
      sections += sectionCard('03', 'Journey Map', false, false,
        '<p class="incomplete-msg">You haven\'t mapped your customer journey yet.</p><a class="btn-go" href="journey-map.html">Go to Journey Map →</a>',
        null);
    }

    // 4 — Funnel Generator (placeholder)
    sections += sectionCard('04', 'Funnel Generator', false, true,
      '<div class="funnel-placeholder">' +
        '<h3>Your Funnel</h3>' +
        '<p>Coming next — build your lead page, sales page, and thank you page.</p>' +
        '<span class="btn-grey">Build Your Funnel →</span>' +
      '</div>',
      null);

    var fillPct = Math.round((completed / TOTAL_SECTIONS) * 100);

    var html =
      '<div class="page-header">' +
        '<div class="page-title">Your Launch Map</div>' +
        '<div class="page-sub">Everything you\'ve built, in one place. Use this to launch, share, and grow.</div>' +
        '<div class="completion-bar-wrap">' +
          '<div class="completion-track"><div class="completion-fill" style="width:' + fillPct + '%"></div></div>' +
          '<div class="completion-text">' + completed + ' of ' + TOTAL_SECTIONS + ' complete</div>' +
        '</div>' +
      '</div>' +
      sections;

    document.getElementById('page-content').innerHTML = html;
  }

  // ── AUTH + LOAD ──
  auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'signon.html?redirect=launch-map'; return; }

    var avatarEl = document.getElementById('sidebar-avatar');
    var nameEl = document.getElementById('sidebar-name');
    if (avatarEl) avatarEl.textContent = (user.displayName || user.email || '?').charAt(0).toUpperCase();
    if (nameEl) nameEl.textContent = user.displayName || user.email || 'Builder';

    try {
      var results = await Promise.allSettled([
        db.collection('offer_sort_results').doc(user.uid).get(),
        db.collection('offer_results').doc(user.uid).get(),
        db.collection('journey_maps').doc(user.uid).get()
      ]);

      var offerSort    = (results[0].status === 'fulfilled' && results[0].value.exists) ? results[0].value.data() : null;
      var offerBuilder = (results[1].status === 'fulfilled' && results[1].value.exists) ? results[1].value.data() : null;
      var journeyMap   = (results[2].status === 'fulfilled' && results[2].value.exists) ? results[2].value.data() : null;

      renderPage(offerSort, offerBuilder, journeyMap);
    } catch(e) {
      document.getElementById('page-content').innerHTML =
        '<div style="padding:2rem;font-size:14px;color:var(--text2);">Something went wrong loading your launch assets. Please refresh and try again.</div>';
    }
  });

  initNav('launch-map', 'Launch Map');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>31-Day Post Planner — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  try { firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true); } catch(e) {}
  const db = firebase.firestore();
  const storage = firebase.storage();
</script>
<script src="js/auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --border-dark: #2A2720;
    --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE; --surface: #FFFFFF; --border: #E4E0D8;
    --text: #1A1714; --text2: #6B6560; --text3: #9E9891;
    --green: #2A5C45; --green-light: #3D8A65;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --sidebar-width: 220px;
    --header-height: 64px;
  }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }

  /* ── MAIN WRAP ── */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }

  /* ── TOP BAR ── */
  .top-bar {
    background: var(--dark2); border-bottom: 1px solid var(--border-dark);
    height: 60px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; position: sticky; top: 0; z-index: 50; flex-shrink: 0;
  }
  .top-bar-left { display: flex; align-items: center; gap: 12px; }
  .hamburger-btn { background: none; border: none; color: #9A9488; cursor: pointer; padding: 6px; border-radius: 6px; display: flex; }
  .hamburger-btn:hover { color: #F0EDE6; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #F0EDE6; }
  .save-status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .save-status.saving .save-dot { background: var(--gold); animation: pulse 1s infinite; }
  .save-status.saved .save-dot { background: var(--green-light); }
  .save-status.error .save-dot { background: #C4622D; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .save-btn { background: var(--gold); color: #0C0B09; border: none; border-radius: var(--radius-sm); padding: 7px 16px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.85; }

  /* ── TABS ── */
  .tab-bar {
    background: var(--dark); border-bottom: 1px solid var(--border-dark);
    display: flex; gap: 0; padding: 0 1.5rem; flex-shrink: 0;
  }
  .tab-btn {
    padding: 14px 20px; background: none; border: none; border-bottom: 3px solid transparent;
    color: #9A9488; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; margin-bottom: -1px;
  }
  .tab-btn:hover { color: #F0EDE6; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── CONTENT AREA (grid + topic panel) ── */
  .content-area { flex: 1; display: flex; min-height: 0; overflow: hidden; }
  .grid-scroll { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .day-row { display: flex; gap: 12px; margin-bottom: 12px; }

  /* ── TOPIC PANEL ── */
  .topic-panel {
    width: 220px; flex-shrink: 0; overflow-y: auto;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .topic-panel-head {
    padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
    font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text);
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .topic-panel-sub { font-size: 11px; color: var(--text3); font-family: 'Lato', sans-serif; margin-top: 2px; }
  .topic-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
  .topic-day-row { display: flex; flex-direction: column; gap: 4px; }
  .topic-day-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); }
  .topic-day-input {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: 'Lato', sans-serif;
    font-size: 13px; color: var(--text); background: var(--bg);
    outline: none; transition: border-color 0.15s;
  }
  .topic-day-input:focus { border-color: var(--gold); }
  .topic-day-input::placeholder { color: var(--text3); }

  @media (max-width: 1100px) { .topic-panel { width: 180px; } }
  @media (max-width: 900px) {
    .main-wrap { margin-left: 60px; }
    .content-area { flex-direction: column; }
    .topic-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    .topic-list { flex-direction: row; flex-wrap: wrap; }
    .topic-day-row { width: calc(50% - 5px); }
    .day-row { flex-wrap: wrap; }
    .day-cell { min-width: calc(50% - 6px); flex: none; }
  }
  @media (max-width: 560px) {
    .main-wrap { margin-left: 0; }
    .day-cell { min-width: 100%; }
    .tab-btn { padding: 12px 14px; font-size: 12px; }
    .topic-day-row { width: 100%; }
  }

  /* ── DAY CELL ── */
  .day-cell {
    flex: 1; min-width: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column; overflow: hidden;
    transition: border-color 0.15s;
  }
  .day-cell.is-posted { border-color: rgba(42,92,69,0.4); }

  .cell-header {
    padding: 7px 10px; background: var(--bg); border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 900; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.12em;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cell-header-day { color: var(--text2); }

  /* Image zone */
  .cell-image-zone {
    width: 100%; height: 130px; position: relative;
    background: var(--bg); cursor: pointer; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .cell-image-zone.has-image { height: auto; overflow: hidden; }
  .cell-image-zone:hover { background: rgba(201,168,76,0.06); }
  .cell-image-zone.uploading { opacity: 0.6; cursor: wait; }
  .cell-image-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; width: 100%; height: 100%; min-height: 130px; }
  .cell-image-zone.uploading input[type=file],
  .cell-image-zone.has-image input[type=file] { pointer-events: none; }
  .cell-img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; }
  .cell-img-placeholder svg { opacity: 0.3; }
  .cell-img-placeholder span { font-size: 10px; color: var(--text3); font-weight: 700; }
  .cell-img-preview { width: 100%; height: auto; object-fit: contain; display: none; position: relative; }
  .cell-img-preview.visible { display: block; }
  .cell-img-spinner { font-size: 20px; animation: spin 1s linear infinite; position: absolute; pointer-events: none; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .cell-remove-img {
    position: absolute; top: 5px; right: 5px; z-index: 3;
    background: rgba(12,11,9,0.65); color: #fff; border: none;
    border-radius: 50%; width: 20px; height: 20px; font-size: 10px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    line-height: 1;
  }
  .cell-image-zone.has-image .cell-remove-img { display: flex; }
  .cell-image-zone.has-image .cell-img-placeholder { display: none; }

  /* Caption */
  .cell-caption {
    padding: 6px 8px; border-bottom: 1px solid var(--border);
  }
  .cell-caption textarea {
    width: 100%; resize: none; border: none; outline: none;
    font-family: 'Lato', sans-serif; font-size: 12px; color: var(--text);
    background: transparent; line-height: 1.5;
    min-height: 48px;
  }
  .cell-caption textarea::placeholder { color: var(--text3); }

  /* Posted toggle */
  .cell-footer { padding: 6px 8px; display: flex; align-items: center; justify-content: space-between; }
  .posted-toggle {
    padding: 4px 10px; border-radius: 100px; font-family: 'Lato', sans-serif;
    font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border); background: var(--bg); color: var(--text3);
  }
  .posted-toggle.posted {
    background: rgba(42,92,69,0.1); border-color: rgba(42,92,69,0.3); color: var(--green-light);
  }
  .cell-chars { font-size: 10px; color: var(--text3); }
  .cell-chars.over { color: #C4622D; }

</style>
</head>
<body>

<div class="main-wrap">

  <div class="top-bar">
    <div class="top-bar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title">30-Day Post Planner</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="save-status" id="saveStatus"><div class="save-dot"></div><span id="saveText">—</span></div>
      <button class="save-btn" onclick="saveAllData()">Save</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="morning" onclick="switchTab('morning')">☀️ Morning Motivations</button>
    <button class="tab-btn" data-tab="midday" onclick="switchTab('midday')">💬 Midday Questions</button>
    <button class="tab-btn" data-tab="drama" onclick="switchTab('drama')">⚡ ToolSpark Drama</button>
  </div>

  <div class="content-area">

    <div class="grid-scroll" id="grid-scroll">
      <!-- built by JS -->
    </div>

    <aside class="topic-panel" id="topic-panel">
      <div class="topic-panel-head">
        Weekly Topics
        <div class="topic-panel-sub" id="topic-panel-sub">Morning Motivations</div>
      </div>
      <div class="topic-list" id="topic-list">
        <!-- built by JS -->
      </div>
    </aside>

  </div>

</div>

<script>
  const DAYS = 30;
  const TABS = ['morning', 'midday', 'drama'];

  let uid = null;
  let allData = {};
  let activeTab = 'morning';
  let saveTimer = null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  window.addEventListener('tsUserReady', async function() {
    const user = firebase.auth().currentUser;
    if (!user) return;
    uid = user.uid;
    await loadAllData();
    renderGrid(activeTab);
    renderTopics(activeTab);
  });

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    if (sidebar) sidebar.classList.toggle('open');
    if (overlay) overlay.classList.toggle('open');
    document.body.style.overflow = sidebar && sidebar.classList.contains('open') ? 'hidden' : '';
  }

  // ── Firestore ────────────────────────────────────────────────────────────
  async function loadAllData() {
    try {
      const snap = await db.collection('social_scheduler').doc(uid).get();
      allData = snap.exists ? (snap.data() || {}) : {};
      delete allData.updatedAt;
    } catch(e) { allData = {}; }
  }

  function scheduleSave() {
    setSaveStatus('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveAllData, 900);
  }

  async function saveAllData() {
    try {
      const payload = { ...allData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      await db.collection('social_scheduler').doc(uid).set(payload, { merge: true });
      setSaveStatus('saved');
    } catch(e) { setSaveStatus('error'); }
  }

  function setSaveStatus(state) {
    const el = document.getElementById('saveStatus');
    const txt = document.getElementById('saveText');
    el.className = 'save-status ' + state;
    txt.textContent = state === 'saving' ? 'Saving…' : state === 'saved' ? 'All saved' : 'Save error';
  }

  function dataKey(tab, day) { return `${tab}_d${day}`; }

  function getEntry(tab, day) {
    return allData[dataKey(tab, day)] || { caption: '', imageUrl: '', imagePath: '', posted: false };
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderTopics(tab);
    renderGrid(tab);
  }

  // ── Topic Panel ───────────────────────────────────────────────────────────
  const DAYS_OF_WEEK = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const TAB_LABELS   = { morning: 'Morning Motivations', midday: 'Midday Questions', drama: 'ToolSpark Drama' };

  function topicKey(tab, day) { return `${tab}_topic_${day.toLowerCase().slice(0,3)}`; }

  function renderTopics(tab) {
    document.getElementById('topic-panel-sub').textContent = TAB_LABELS[tab];
    const list = document.getElementById('topic-list');
    list.innerHTML = '';
    DAYS_OF_WEEK.forEach(day => {
      const k = topicKey(tab, day);
      const val = allData[k] || '';
      const row = document.createElement('div');
      row.className = 'topic-day-row';
      row.innerHTML = `
        <div class="topic-day-label">${day}</div>
        <input class="topic-day-input" id="${k}" type="text" placeholder="Topic…" value="${escHtml(val)}">
      `;
      row.querySelector('input').addEventListener('input', e => {
        allData[k] = e.target.value;
        scheduleSave();
      });
      list.appendChild(row);
    });
  }

  // ── Grid ──────────────────────────────────────────────────────────────────
  function buildRows() {
    const rows = [];
    let day = 1;
    let rowIndex = 0;
    while (day <= DAYS) {
      const count = rowIndex % 2 === 0 ? 4 : 3;
      const row = [];
      for (let i = 0; i < count && day <= DAYS; i++) row.push(day++);
      rows.push(row);
      rowIndex++;
    }
    return rows;
  }

  function renderGrid(tab) {
    const scroll = document.getElementById('grid-scroll');
    scroll.innerHTML = '';
    const rows = buildRows();
    rows.forEach(days => {
      const rowEl = document.createElement('div');
      rowEl.className = 'day-row';
      days.forEach(day => rowEl.appendChild(buildCell(tab, day)));
      scroll.appendChild(rowEl);
    });
  }

  function buildCell(tab, day) {
    const k = dataKey(tab, day);
    const entry = getEntry(tab, day);
    const hasImage = !!entry.imageUrl;
    const isPosted = !!entry.posted;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isPosted ? ' is-posted' : '');
    cell.id = 'cell-' + k;

    cell.innerHTML = `
      <div class="cell-header">
        <span class="cell-header-day">Day ${day}</span>
      </div>
      <div class="cell-image-zone${hasImage ? ' has-image' : ''}" id="zone-${k}">
        <input type="file" accept="image/*" title="Upload image for Day ${day}">
        <div class="cell-img-placeholder">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Upload image</span>
        </div>
        <span class="cell-img-spinner" id="spinner-${k}" style="display:none;">⏳</span>
        <img class="cell-img-preview${hasImage ? ' visible' : ''}" id="preview-${k}" src="${entry.imageUrl || ''}" alt="">
        <button class="cell-remove-img" id="removeBtn-${k}" onclick="removeImage(event,'${tab}',${day})">✕</button>
      </div>
      <div class="cell-caption">
        <textarea id="caption-${k}" placeholder="Caption…" rows="3">${escHtml(entry.caption || '')}</textarea>
      </div>
      <div class="cell-footer">
        <button class="posted-toggle${isPosted ? ' posted' : ''}" id="toggle-${k}" onclick="togglePosted('${tab}',${day})">
          ${isPosted ? '✓ Posted' : 'Not Posted'}
        </button>
        <span class="cell-chars${(entry.caption || '').length > 2200 ? ' over' : ''}" id="chars-${k}">${(entry.caption || '').length > 0 ? (entry.caption.length + ' ch') : ''}</span>
      </div>
    `;

    // File input
    cell.querySelector('input[type=file]').addEventListener('change', e => handleImageUpload(e, tab, day));

    // Caption
    cell.querySelector(`#caption-${k}`).addEventListener('input', e => {
      const val = e.target.value;
      if (!allData[k]) allData[k] = {};
      allData[k].caption = val;
      const chars = document.getElementById('chars-' + k);
      chars.textContent = val.length > 0 ? val.length + ' ch' : '';
      chars.className = 'cell-chars' + (val.length > 2200 ? ' over' : '');
      scheduleSave();
    });

    return cell;
  }

  // ── Posted toggle ─────────────────────────────────────────────────────────
  function togglePosted(tab, day) {
    const k = dataKey(tab, day);
    if (!allData[k]) allData[k] = {};
    allData[k].posted = !allData[k].posted;
    const isPosted = allData[k].posted;
    const btn = document.getElementById('toggle-' + k);
    btn.className = 'posted-toggle' + (isPosted ? ' posted' : '');
    btn.textContent = isPosted ? '✓ Posted' : 'Not Posted';
    const cell = document.getElementById('cell-' + k);
    cell.classList.toggle('is-posted', isPosted);
    scheduleSave();
  }

  // ── Image upload ──────────────────────────────────────────────────────────
  async function handleImageUpload(event, tab, day) {
    const file = event.target.files[0];
    if (!file) return;
    const k = dataKey(tab, day);
    const zone = document.getElementById('zone-' + k);
    const spinner = document.getElementById('spinner-' + k);

    zone.classList.add('uploading');
    spinner.style.display = 'block';

    try {
      const path = `social-scheduler/${uid}/${k}`;
      const ref = storage.ref(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();

      if (!allData[k]) allData[k] = {};
      allData[k].imageUrl = url;
      allData[k].imagePath = path;

      const preview = document.getElementById('preview-' + k);
      preview.src = url;
      preview.classList.add('visible');
      zone.classList.remove('uploading');
      zone.classList.add('has-image');
      spinner.style.display = 'none';

      await saveAllData();
    } catch(e) {
      zone.classList.remove('uploading');
      spinner.style.display = 'none';
      setSaveStatus('error');
    }
  }

  async function removeImage(event, tab, day) {
    event.stopPropagation();
    const k = dataKey(tab, day);
    const entry = allData[k] || {};

    if (entry.imagePath) {
      try { await storage.ref(entry.imagePath).delete(); } catch(e) {}
    }

    if (allData[k]) { allData[k].imageUrl = ''; allData[k].imagePath = ''; }

    const preview = document.getElementById('preview-' + k);
    preview.src = '';
    preview.classList.remove('visible');
    const zone = document.getElementById('zone-' + k);
    zone.classList.remove('has-image');

    await saveAllData();
  }

  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
<script src="js/nav.js"></script>
<script>initNav('tools', '31-Day Post Planner');</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --green: #2A5C45;
    --green-light: #3D8A65;
    --purple: #4B3F8A;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0;
    z-index: 100;
    border-right: 1px solid var(--border-dark);
    transition: transform 0.3s ease;
  }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: space-between; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }
  .sidebar-close-btn { display: none; background: none; border: none; color: #9A9488; cursor: pointer; padding: 4px; border-radius: 6px; }
  .sidebar-close-btn:hover { color: #F0EDE6; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  /* ── MAIN ── */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── PAGE CONTENT ── */
  .page-content { flex: 1; padding: 1.75rem 2rem; max-width: 960px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 3rem; }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: var(--text3); }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-chip { padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; font-weight: 700; color: var(--text2); background: var(--surface); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
  .filter-chip.active { background: var(--dark); border-color: var(--dark); color: var(--gold-light); }

  /* ── COURSES GRID ── */
  .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }

  /* ── COURSE CARD ── */
  .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; display: flex; flex-direction: column; }
  .course-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .course-card.locked { cursor: default; opacity: 0.7; }
  .course-card.locked:hover { box-shadow: var(--shadow); transform: none; }

  .course-body { padding: 14px 14px 10px; display: flex; flex-direction: column; }
  .course-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 10px; }

  .course-thumb-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 8px; margin-bottom: 10px; }
  .course-thumb-wrap img { width: 100%; height: 100%; object-fit: contain; background: #000; }
  .course-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .course-thumb-1 { background: linear-gradient(135deg, #1a1410, #2d1f0a); }
  .course-thumb-2 { background: linear-gradient(135deg, #0d1a14, #0a2018); }
  .course-thumb-3 { background: linear-gradient(135deg, #12101a, #1a1030); }
  .course-thumb-4 { background: linear-gradient(135deg, #0a1520, #0d2535); }
  .course-thumb-5 { background: linear-gradient(135deg, #1a100a, #2d1505); }

  .thumb-status { position: absolute; top: 8px; right: 8px; }
  .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; border-radius: 8px; }
  .locked-icon { font-size: 24px; }

  .free-badge { font-size: 10px; font-weight: 700; color: var(--green-light); background: rgba(42,92,69,0.1); border: 1px solid rgba(42,92,69,0.2); border-radius: 100px; padding: 1px 7px; }
  .complete-badge { font-size: 10px; font-weight: 700; color: white; background: var(--green-light); border-radius: 100px; padding: 2px 8px; }
  .in-progress-badge { font-size: 10px; font-weight: 700; color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); border-radius: 100px; padding: 2px 8px; }

  .course-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); margin-top: auto; }
  .course-meta { font-size: 11px; color: var(--text3); }
  .course-cta { font-size: 11px; font-weight: 700; color: var(--gold); }
  .locked-label { font-size: 11px; color: var(--text3); }

  .progress-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 10px; color: var(--text3); margin-bottom: 8px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; }

  /* ── MOBILE BOTTOM NAV ── */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--dark); border-top: 1px solid var(--border-dark); z-index: 200; align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .mobile-nav-item.active, .mobile-nav-item:hover { color: var(--gold); }

  /* ── RESPONSIVE ── */
  @media (max-width: 1023px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
    .courses-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-close-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
    .sidebar-overlay { display: block; }
    .main-wrap { margin-left: 0; }
    .page-content { padding: 1rem 1rem 80px; gap: 1rem; }
    .courses-grid { grid-template-columns: 1fr; }
    .filter-bar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .mobile-bottom-nav { display: flex; }
  }

  @media (max-width: 480px) {
    .page-content { padding: 0.875rem 0.875rem 80px; }
  }
</style>
</head>
<body>

 <nav class="sidebar-nav" id="sidebar-nav"></nav>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  try { firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true); } catch(e) {}
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let allCourses = [];
  let activeFilter = 'All';

  auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'signon.html'; return; }
    currentUser = user;

    const name = user.displayName || user.email || 'Builder';
    const first = name.split(' ')[0];
    document.getElementById('sidebar-name').textContent = name;

    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      av.innerHTML = '<img src="' + user.photoURL + '" alt="avatar">';
    } else {
      av.textContent = first.charAt(0).toUpperCase();
    }

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists) {
        const data = snap.data();
        if (data.userRole === 'admin') {
          document.getElementById('sidebar-role').textContent = 'Admin';
        }
      }
    } catch(e) {}

    // Check notifications
    try {
      const notifSnap = await db.collection('notifications')
        .where('userId', '==', user.uid)
        .where('read', '==', false)
        .limit(1).get();
      if (!notifSnap.empty) {
        document.getElementById('notif-dot').style.display = 'block';
      }
    } catch(e) {}

    loadCourses(user.uid);
  });

  async function loadCourses(uid) {
    const grid = document.getElementById('courses-grid');
    try {
      // Load courses
      const snap = await db.collection('courses')
        .where('isPublished', '==', true)
        .orderBy('order', 'asc')
        .get();

      if (snap.empty) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📚</div><div class="empty-title">No courses yet</div><div class="empty-sub">Check back soon — courses are coming</div></div>';
        return;
      }

      // Load progress for each course
      const progressPromises = snap.docs.map(function(doc) {
        return db.collection('userProgress').doc(uid + '_' + doc.id).get().catch(function() { return null; });
      });
      const progressDocs = await Promise.all(progressPromises);

      // Build courses array
      allCourses = snap.docs.map(function(doc, i) {
        const c = doc.data();
        const p = progressDocs[i] && progressDocs[i].exists ? progressDocs[i].data() : null;
        const total = c.totallessons || 0;
        const completed = p ? (p.completedLessons || []).length : 0;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        return {
          id: doc.id,
          title: c.title || 'Untitled',
          description: c.description || '',
          category: c.category || 'Foundations',
          isFree: c.isFree || false,
          thumbnail: c.thumbnail || '',
          totallessons: total,
          completed,
          pct,
          locked: false,
          isComplete: completed >= total && total > 0,
          isStarted: completed > 0,
          lastLessonId: p ? (p.lastLessonId || '') : '',
        };
      });

      renderCourses();
      buildFilterChips();

    } catch(e) {
      console.error(e);
      grid.innerHTML = '<div style="color:var(--text3);font-size:13px;grid-column:1/-1;">Could not load courses. Please refresh.</div>';
    }
  }

  function buildFilterChips() {
    const categories = [...new Set(allCourses.map(c => c.category))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = '<div class="filter-chip active" data-filter="All">All</div>' +
      categories.map(cat => '<div class="filter-chip" data-filter="' + escHtml(cat) + '">' + escHtml(cat) + '</div>').join('');

    bar.querySelectorAll('.filter-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderCourses();
      });
    });
  }

  function renderCourses() {
    const grid = document.getElementById('courses-grid');
    const filtered = activeFilter === 'All'
      ? allCourses
      : allCourses.filter(c => c.category === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📚</div><div class="empty-title">No courses in this category</div></div>';
      return;
    }

    const gradients = ['course-thumb-1','course-thumb-2','course-thumb-3','course-thumb-4','course-thumb-5'];

    grid.innerHTML = filtered.map(function(course, i) {
      const gradClass = gradients[i % gradients.length];
      const url = 'course.html?courseId=' + course.id + (course.lastLessonId ? '&lessonId=' + course.lastLessonId : '');

      let statusBadge = '';
      if (course.isComplete) statusBadge = '<span class="complete-badge">✓ Complete</span>';
      else if (course.isStarted) statusBadge = '<span class="in-progress-badge">In Progress</span>';
      else if (course.isFree) statusBadge = '<span class="free-badge">Free</span>';

      let ctaText = 'Start course →';
      if (course.isComplete) ctaText = 'Review →';
      else if (course.isStarted) ctaText = 'Continue →';

      const thumbInner = course.thumbnail
        ? '<img src="' + escHtml(course.thumbnail) + '" alt="' + escHtml(course.title) + '">'
        : '<div class="course-thumb-placeholder ' + gradClass + '"><svg width="36" height="36" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 17A2.5 2.5 0 014 14.5V5a2 2 0 012-2h14v14"/></svg></div>';

      const progressHtml = course.pct > 0
        ? '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + course.pct + '%"></div></div><div class="progress-label">' + course.completed + ' of ' + course.totallessons + ' lessons complete</div>'
        : '';

      if (course.locked) {
        return '<div class="course-card locked">' +
          '<div class="course-body">' +
          '<div class="course-title">' + escHtml(course.title) + '</div>' +
          '<div class="course-thumb-wrap"><div class="locked-overlay"><div class="locked-icon">🔒</div></div>' + thumbInner + '</div>' +
          '<div class="course-footer"><span class="course-meta">' + course.totallessons + ' lessons</span><span class="locked-label">🔒 Locked</span></div>' +
          '</div></div>';
      }

      return '<div class="course-card" onclick="window.location.href=\'' + url + '\'">' +
        '<div class="course-body">' +
        '<div class="course-title">' + escHtml(course.title) + '</div>' +
        '<div class="course-thumb-wrap">' + thumbInner + (statusBadge ? '<div class="thumb-status">' + statusBadge + '</div>' : '') + '</div>' +
        progressHtml +
        '<div class="course-footer"><span class="course-meta">' + course.totallessons + ' lessons · ' + (course.isFree ? 'Free' : 'Members') + '</span><span class="course-cta">' + ctaText + '</span></div>' +
        '</div></div>';
    }).join('');
  }

  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

</script>
<script src="js/nav.js"></script>
<script>initNav('courses', 'Courses');</script>
</body>
</html>

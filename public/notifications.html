<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); transition: transform 0.3s ease; }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: space-between; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }
  .sidebar-close-btn { display: none; background: none; border: none; color: #9A9488; cursor: pointer; padding: 4px; border-radius: 6px; }
  .sidebar-close-btn:hover { color: #F0EDE6; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  /* MAIN */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 50; gap: 1rem; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hamburger-btn { display: none; background: none; border: none; color: #F0EDE6; cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.15s; }
  .hamburger-btn:hover { background: rgba(255,255,255,0.08); }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: #F0EDE6; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* PAGE */
  .page-content { flex: 1; padding: 1.75rem 2rem; max-width: 680px; width: 100%; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 3rem; }

  /* TOOLBAR */
  .notif-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem; }
  .notif-heading { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; }
  .mark-all-btn { font-size: 12px; font-weight: 700; color: var(--gold); background: none; border: none; cursor: pointer; font-family: 'Lato', sans-serif; padding: 6px 12px; border-radius: var(--radius-sm); transition: background 0.15s; }
  .mark-all-btn:hover { background: var(--gold-dim); }
  .mark-all-btn:disabled { opacity: 0.4; cursor: default; }

  /* NOTIFICATION ITEMS */
  .notif-list { display: flex; flex-direction: column; gap: 2px; }
  .notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: background 0.15s; cursor: default; }
  .notif-item.unread { background: #FFFDF5; border-color: rgba(201,168,76,0.3); }
  .notif-item.clickable { cursor: pointer; }
  .notif-item.clickable:hover { background: #FDFBF4; }
  .notif-item.unread.clickable:hover { background: #FFF9E6; }
  .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .notif-icon.type-comment { background: rgba(75,63,138,0.1); color: #7B6FD0; }
  .notif-icon.type-like { background: rgba(196,98,45,0.1); color: #C4622D; }
  .notif-icon.type-announcement { background: var(--gold-dim); color: var(--gold); }
  .notif-icon.type-default { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
  .notif-body { flex: 1; min-width: 0; }
  .notif-message { font-size: 14px; color: var(--text); line-height: 1.5; }
  .notif-item.unread .notif-message { font-weight: 700; }
  .notif-time { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 6px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; color: var(--gold); margin: 0 auto 1.25rem; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* MOBILE BOTTOM NAV */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--dark); border-top: 1px solid var(--border-dark); z-index: 200; align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .mobile-nav-item.active, .mobile-nav-item:hover { color: var(--gold); }

  /* RESPONSIVE */
  @media (max-width: 1023px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
  }
  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-close-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
    .sidebar-overlay { display: block; }
    .hamburger-btn { display: flex; }
    .main-wrap { margin-left: 0; }
    .top-header { padding: 0 1rem; height: 54px; }
    .page-content { padding: 1rem 1rem 80px; }
    .mobile-bottom-nav { display: flex; }
  }
  @media (max-width: 480px) {
    .page-content { padding: 0.875rem 0.875rem 80px; }
  }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  try { firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true); } catch(e) {}
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let notifications = [];

  auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'signon.html'; return; }
    currentUser = user;

    const name = user.displayName || user.email || 'Builder';
    document.getElementById('sidebar-name').textContent = name;
    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      av.innerHTML = '<img src="' + esc(user.photoURL) + '" alt="avatar">';
    } else {
      av.textContent = name.charAt(0).toUpperCase();
    }

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists && snap.data().userRole === 'admin') {
        document.getElementById('admin-nav-link').style.display = 'flex';
        document.getElementById('sidebar-role').textContent = 'Admin';
      }
    } catch(e) {}

    loadNotifications();
  });

  async function loadNotifications() {
    const list = document.getElementById('notif-list');
    try {
      const snap = await db.collection('notifications')
        .where('userId', '==', currentUser.uid)
        .orderBy('createdAt', 'desc')
        .limit(50)
        .get();

      if (snap.empty) {
        list.innerHTML = renderEmpty();
        return;
      }

      notifications = snap.docs.map(function(doc) {
        return Object.assign({ id: doc.id }, doc.data());
      });

      const hasUnread = notifications.some(function(n) { return !n.read; });
      document.getElementById('mark-all-btn').disabled = !hasUnread;

      list.innerHTML = notifications.map(renderNotif).join('');

    } catch(e) {
      console.error(e);
      list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:1rem 0;">Could not load notifications.</div>';
    }
  }

  function renderNotif(n) {
    const isUnread = !n.read;
    const hasLink = !!n.link;
    const time = n.createdAt ? timeAgo(n.createdAt) : '';

    const iconHtml = typeIcon(n.type);

    return '<div class="notif-item' +
      (isUnread ? ' unread' : '') +
      (hasLink ? ' clickable' : '') +
      '"' +
      (hasLink ? ' onclick="handleClick(\'' + esc(n.id) + '\',\'' + esc(n.link) + '\')"' : ' onclick="markRead(\'' + esc(n.id) + '\')"') +
      '>' +
      '<div class="notif-icon type-' + esc(n.type || 'default') + '">' + iconHtml + '</div>' +
      '<div class="notif-body">' +
      '<div class="notif-message">' + esc(n.message || 'New notification') + '</div>' +
      (time ? '<div class="notif-time">' + time + '</div>' : '') +
      '</div>' +
      (isUnread ? '<div class="unread-dot"></div>' : '') +
      '</div>';
  }

  function typeIcon(type) {
    if (type === 'comment') {
      return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>';
    }
    if (type === 'like') {
      return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>';
    }
    if (type === 'announcement') {
      return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3L2 10l7 4 3 7 3.27-6.54L22 3z"/></svg>';
    }
    return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>';
  }

  function renderEmpty() {
    return '<div class="empty-state">' +
      '<div class="empty-icon"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></div>' +
      '<div class="empty-title">All caught up</div>' +
      '<div class="empty-sub">No notifications yet — check back after some activity.</div>' +
      '</div>';
  }

  async function markRead(id) {
    if (!id) return;
    const n = notifications.find(function(x) { return x.id === id; });
    if (!n || n.read) return;
    try {
      await db.collection('notifications').doc(id).update({ read: true });
      n.read = true;
      document.getElementById('notif-list').innerHTML = notifications.map(renderNotif).join('');
      const hasUnread = notifications.some(function(x) { return !x.read; });
      document.getElementById('mark-all-btn').disabled = !hasUnread;
    } catch(e) { console.error(e); }
  }

  async function handleClick(id, link) {
    await markRead(id);
    if (link) window.location.href = link;
  }

  async function markAllRead() {
    const btn = document.getElementById('mark-all-btn');
    btn.disabled = true;
    const batch = db.batch();
    notifications.forEach(function(n) {
      if (!n.read) {
        batch.update(db.collection('notifications').doc(n.id), { read: true });
        n.read = true;
      }
    });
    try {
      await batch.commit();
      document.getElementById('notif-list').innerHTML = notifications.map(renderNotif).join('');
    } catch(e) {
      console.error(e);
      btn.disabled = false;
    }
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    const days = Math.floor(diff / 86400);
    if (days === 1) return 'Yesterday';
    if (days < 7) return days + 'd ago';
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Mobile sidebar
  document.getElementById('hamburger-btn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
  window.addEventListener('resize', function() { if (window.innerWidth > 767) closeSidebar(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0;
    z-index: 100;
    border-right: 1px solid var(--border-dark);
  }
 .sidebar-close-btn {
  display: none;
  background: none;
  border: none;
  color: #9A9488;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
}
  .sidebar-logo {
    padding: 1.5rem 1.25rem 1.25rem;
    border-bottom: 1px solid var(--border-dark);
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; letter-spacing: 0.01em; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; font-weight: 400;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; }
  .sidebar-user:hover { background: rgba(255,255,255,0.05); }
  .logout-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 12px; margin-top: 4px;
    background: none; border: none; border-radius: var(--radius-sm);
    color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif;
    cursor: pointer; transition: background 0.15s, color 0.15s; text-align: left;
  }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  /* ── MAIN LAYOUT ── */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }


  /* ── PAGE GRID ── */
  .page-content {
    flex: 1; display: flex; flex-direction: column; gap: 1.5rem;
    padding: 1.75rem 2rem 3rem; max-width: 860px; width: 100%;
  }
  .main-col { display: flex; flex-direction: column; gap: 1.25rem; }
  .member-since-row { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text3); margin-top:10px; }

  /* ── CARD BASE ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

  /* ── CARD TITLE ── */
  .card-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px;
  }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── PROFILE HERO ── */
  .profile-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .profile-banner {
    height: 96px;
    background: linear-gradient(120deg, var(--dark) 0%, #2A2218 60%, #3A2E1A 100%);
    position: relative;
  }
  .profile-banner::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(201,168,76,0.04) 18px, rgba(201,168,76,0.04) 19px);
  }
  .profile-body { padding: 0 1.75rem 1.75rem; }
  .profile-photo-wrap { margin-top: -44px; margin-bottom: 1rem; position: relative; display: inline-block; }
  .profile-photo {
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid var(--surface); background: var(--dark3);
    object-fit: cover; display: block;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .profile-photo-initials {
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid var(--surface); background: var(--dark3);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900; color: var(--gold);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2); letter-spacing: -1px;
  }
  .photo-upload-btn { display:none; position:absolute; inset:0; border-radius:50%; background:rgba(0,0,0,0.45); border:none; cursor:pointer; align-items:center; justify-content:center; color:#fff; transition:background 0.15s; }
  .photo-upload-btn:hover { background:rgba(0,0,0,0.6); }
  .photo-upload-btn svg { pointer-events:none; }
  .edit-open .photo-upload-btn { display:flex; }
  .profile-photo-wrap { position:relative; display:inline-block; }
  .profile-top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .profile-name-block { flex: 1; min-width: 0; }
  .profile-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: 5px; }
  .profile-email { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
  .badge-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  }
  .badge-admin { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .badge-builder { background: rgba(59,130,246,0.1); color: #3B82F6; border: 1px solid rgba(59,130,246,0.25); }
  .badge-member { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
  .badge-certified { background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(232,213,163,0.1)); color: #B8922E; border: 1px solid rgba(201,168,76,0.45); }
  .badge-since { font-size: 11px; color: var(--text3); font-weight: 400; text-transform: none; letter-spacing: 0; padding: 0; border: none; background: none; display: inline-flex; align-items: center; gap: 4px; }
  @media (min-width: 901px) { .badge-since { display: none; } }
  .edit-profile-btn {
    background: none; border: 1px solid var(--border); border-radius: 100px;
    padding: 7px 18px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .edit-profile-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .edit-profile-btn.cancel { color: var(--text3); }
  .profile-bio { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: 14px; color: var(--text2); line-height: 1.7; }
  .profile-bio.empty { color: var(--text3); font-style: italic; }

  /* ── SPARK STATEMENT ── */
  .spark-statement { margin-top: 1rem; font-size: 15px; font-style: italic; color: var(--gold); font-family: 'Playfair Display', serif; line-height: 1.5; }
  .spark-statement.hidden { display: none; }

  /* ── SOCIAL LINKS ── */
  .social-links-row { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
  .social-link-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: 100px; font-size: 12px; font-weight: 700;
    text-decoration: none; border: 1px solid var(--border); color: var(--text2);
    background: var(--bg); transition: all 0.15s;
  }
  .social-link-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .social-links-row.hidden { display: none; }

  /* ── MY TOOL CARD ── */
  .my-tool-card {
    margin-top: 1.25rem; padding: 1rem 1.25rem;
    background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-sm); display: flex; align-items: center; gap: 12px;
  }
  .my-tool-card.hidden { display: none; }
  .my-tool-icon { font-size: 22px; flex-shrink: 0; }
  .my-tool-info { flex: 1; min-width: 0; }
  .my-tool-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 2px; }
  .my-tool-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .my-tool-link { display: inline-flex; align-items: center; gap: 5px; margin-top: 4px; font-size: 12px; color: var(--gold); font-weight: 700; text-decoration: none; }
  .my-tool-link:hover { color: var(--gold-light); }

  /* ── EDIT FORM ── */
  .edit-form { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); flex-direction: column; gap: 1rem; }
  .edit-form.open { display: flex; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
  .form-input, .form-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .form-actions { display: flex; align-items: center; gap: 10px; }
  .save-btn {
    background: var(--gold); color: #0C0B09; border: none; border-radius: 100px;
    padding: 9px 24px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .save-btn:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.25); }
  .save-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .success-msg { display: none; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: #3D8A65; }
  .success-msg.show { display: flex; }

  /* ── STATS CARD ── */
  .stats-card { padding: 1.5rem 1.75rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); font-weight: 400; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }

  /* ── CLARITY CARD ── */
  .clarity-card { padding: 1.5rem 1.75rem; }
  .clarity-found { display: none; flex-direction: column; gap: 0.75rem; }
  .clarity-empty { display: none; flex-direction: column; gap: 1rem; align-items: flex-start; }
  .clarity-business { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; color: var(--text); }
  .clarity-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); }
  .clarity-summary { font-size: 13px; color: var(--text2); line-height: 1.7; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.875rem 1rem; }
  .clarity-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .clarity-cta-text { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .clarity-cta-text strong { color: var(--text); }
  .cta-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gold); color: #0C0B09; border: none; border-radius: 100px;
    padding: 9px 20px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    text-decoration: none; cursor: pointer; transition: all 0.2s;
  }
  .cta-link:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.25); }

  /* ── RIGHT COLUMN CARDS ── */
  .since-card { padding: 1.25rem 1.5rem; }
  .since-date { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 3px; }

  /* ── MARKETPLACE SECTION ── */
  .marketplace-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .marketplace-section-header { padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .marketplace-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; }
  .marketplace-section-link { font-size: 12px; color: var(--gold); font-weight: 700; text-decoration: none; }
  .marketplace-section-link:hover { color: var(--gold-light); }
  .tool-list { display: flex; flex-direction: column; }
  .tool-row { display: flex; align-items: flex-start; gap: 1rem; padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); text-decoration: none; transition: background 0.15s; }
  .tool-row:last-child { border-bottom: none; }
  .tool-row:hover { background: var(--bg); }
  .tool-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--gold); }
  .tool-info { flex: 1; min-width: 0; }
  .tool-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .tool-desc { font-size: 13px; color: var(--text3); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
  .tool-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .tool-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 2px 8px; }
  .tool-uses { font-size: 12px; color: var(--text3); }
  .marketplace-empty { padding: 2.5rem 1.75rem; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.7; }
  .marketplace-empty-icon { font-size: 32px; margin-bottom: 10px; }
  .marketplace-empty-link { color: var(--gold); font-weight: 700; text-decoration: none; }
  .marketplace-empty-link:hover { color: var(--gold-light); }
  .since-sub { font-size: 12px; color: var(--text3); }
  .links-card { padding: 1.25rem 1.5rem; }
  .quick-link {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border); text-decoration: none;
    color: var(--text2); font-size: 13px; font-weight: 700; transition: color 0.15s;
  }
  .quick-link:last-child { border-bottom: none; padding-bottom: 0; }
  .quick-link:hover { color: var(--gold); }
  .quick-link svg { opacity: 0.5; flex-shrink: 0; }
  .quick-link:hover svg { opacity: 1; }

  /* ── GETTING STARTED CHECKLIST ── */
  .checklist-card { overflow: hidden; }
  .checklist-header { padding: 1rem 1.25rem 0.875rem; border-bottom: 1px solid var(--border); }
  .checklist-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .checklist-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .checklist-count { font-size: 11px; color: var(--text3); }
  .checklist-bar { height: 3px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .checklist-fill { height: 100%; background: var(--gold); border-radius: 10px; transition: width 0.4s ease; }
  .checklist-steps { display: flex; flex-direction: column; }
  .cl-step {
    display: flex; align-items: center; gap: 10px;
    padding: 0.8rem 1.25rem;
    border-bottom: 1px solid var(--border);
    text-decoration: none; color: inherit;
    transition: background 0.12s; cursor: pointer;
  }
  .cl-step:last-child { border-bottom: none; }
  .cl-step:not(.cl-done):hover { background: #FAFAF8; }
  .cl-step.cl-done { cursor: default; }
  .cl-step.cl-featured { background: rgba(201,168,76,0.05); }
  .cl-step.cl-featured:not(.cl-done):hover { background: rgba(201,168,76,0.09); }
  .cl-check {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text3);
  }
  .cl-check.cl-check-done { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .cl-check.cl-check-featured { border-color: var(--gold); color: var(--gold); }
  .cl-body { flex: 1; }
  .cl-label { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .cl-label.cl-done-text { color: var(--text3); text-decoration: line-through; }
  .cl-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .cl-arrow { color: var(--text3); font-size: 14px; }

  /* ── MOBILE BOTTOM NAV ── */
  .mobile-bottom-nav { display: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .sidebar { width: 60px; }
    .sidebar-logo, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
    .nav-icon { opacity: 0.7; }
    .nav-item.active .nav-icon { opacity: 1; }
    .sidebar-user { justify-content: center; padding: 8px; }
    .user-avatar { margin: 0; }
  }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .main-wrap { margin-left: 0; }
    .page-content { padding: 0.875rem 0.875rem 80px; gap: 0.875rem; }
    .profile-body { padding: 0 1.25rem 1.25rem; }
    .profile-name { font-size: 19px; }
    .stats-card, .clarity-card { padding: 1.25rem; }
   .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .mobile-bottom-nav {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px; background: var(--dark); border-top: 1px solid var(--border-dark);
      z-index: 200; align-items: stretch;
      padding: 0 env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
   .sidebar-close-btn { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    width: 32px; 
    height: 32px; 
  }
       }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-nav-item svg { flex-shrink: 0; }
    .mobile-nav-item:hover, .mobile-nav-item.active { color: var(--gold); }
    .mobile-nav-item.active svg { stroke: var(--gold); }
  }
@media (max-width: 767px) {
  .sidebar-close-btn {

  }

  /* ── Toggle edit form ── */
  function toggleEdit() {
    editOpen = !editOpen;

    const photoWrap = document.getElementById('profile-photo-wrap');
    if (editOpen) {

  let pendingPhotoURL = null;

  async function handlePhotoSelect(input) {
    const file = input.files[0];
    if (!file || !currentUser) return;
    const MAX_MB = 5;
    if (file.size > MAX_MB * 1024 * 1024) {
      alert('Image must be under 5 MB.');
      input.value = '';
      return;
    }
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    try {
      const ref = storage.ref('profile-images/' + currentUser.uid + '/photo');
      await ref.put(file);
      const url = await ref.getDownloadURL();
      pendingPhotoURL = url;
      // Preview immediately
      const photoEl = document.getElementById('profile-photo-el');
      photoEl.outerHTML = '<img id="profile-photo-el" class="profile-photo" src="' + url + '" alt="avatar">';
      const sidebarAv = document.getElementById('sidebar-avatar');
      if (sidebarAv) sidebarAv.innerHTML = '<img src="' + url + '" alt="avatar">';
    } catch(err) {
      console.error('Photo upload failed', err);
      alert('Could not upload photo. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
      input.value = '';
    }
  }

  /* ── Save profile ── */
  async function saveProfile() {
    if (!currentUser) return;
    const nameVal = document.getElementById('edit-name').value.trim();
    const bioVal = document.getElementById('edit-bio').value.trim();
    const sparkVal = document.getElementById('edit-spark').value.trim();
    const youtubeVal = document.getElementById('edit-youtube').value.trim();
    const facebookVal = document.getElementById('edit-facebook').value.trim();
    const toolNameVal = document.getElementById('edit-tool-name').value.trim();
    const toolUrlVal = document.getElementById('edit-tool-url').value.trim();
    if (!nameVal) {
      document.getElementById('edit-name').focus();
      return;
    }
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const update = {
        displayName: nameVal, bio: bioVal,
        sparkStatement: sparkVal, youtubeUrl: youtubeVal,
        facebookUrl: facebookVal, myToolName: toolNameVal, myToolUrl: toolUrlVal
      };
      if (pendingPhotoURL) update.photoURL = pendingPhotoURL;
      await currentUser.updateProfile({ displayName: nameVal, ...(pendingPhotoURL && { photoURL: pendingPhotoURL }) });
      await db.collection('users').doc(currentUser.uid).update(update);
      pendingPhotoURL = null;

      // Update read views
      document.getElementById('profile-name').textContent = nameVal;
      document.getElementById('sidebar-name').textContent = nameVal;
      const bioView = document.getElementById('profile-bio-view');
      if (bioVal) { bioView.textContent = bioVal; bioView.classList.remove('empty'); }
      else { bioView.textContent = 'No bio yet — add one by clicking Edit Profile.'; bioView.classList.add('empty'); }
      const sparkView = document.getElementById('profile-spark-view');
      if (sparkVal) { sparkView.textContent = '"' + sparkVal + '"'; sparkView.classList.remove('hidden'); }
      else { sparkView.classList.add('hidden'); }
      const ytLink = document.getElementById('profile-youtube-link');
      const fbLink = document.getElementById('profile-facebook-link');
      const socialRow = document.getElementById('profile-social-row');
      if (youtubeVal) { ytLink.href = youtubeVal; ytLink.classList.remove('hidden'); } else { ytLink.classList.add('hidden'); }

      alert('Could not save changes. Please try again.');
    } finally {

      console.error('Failed to load user doc', err);
    }

    const displayName = data.displayName || user.displayName || user.email || 'Builder';
    const bio = data.bio || '';
    const sparkStatement = data.sparkStatement || '';
    const youtubeUrl = data.youtubeUrl || '';
    const facebookUrl = data.facebookUrl || '';
    const myToolName = data.myToolName || '';
    const myToolUrl = data.myToolUrl || '';
    const role = data.userRole || 'member';
    const createdAt = data.createdAt || null;
    const photoURL = data.photoURL || user.photoURL || '';

    // Admin nav
    if (role === 'admin') {
      const sidebarRole = document.getElementById('sidebar-role');
      if (sidebarRole) sidebarRole.textContent = 'Admin';
    }

    // Profile photo
    const photoEl = document.getElementById('profile-photo-el');
    if (photoURL) {
      const img = document.createElement('img');
      img.src = photoURL;
      img.alt = 'Profile photo';
      img.className = 'profile-photo';
      img.id = 'profile-photo-el';
      photoEl.replaceWith(img);
    } else {
      photoEl.textContent = initials(displayName);
    }


    // Name + badges
    document.getElementById('profile-name').textContent = displayName;
    let badgeHTML = roleBadgeHTML(role);
    if (data.certified) {
      badgeHTML += ' <span class="badge badge-certified">🎓 ToolSpark Certified</span>';
    }
    if (createdAt) {
      badgeHTML += ' <span class="badge badge-since"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Since ' + formatDate(createdAt) + '</span>';
    }
    document.getElementById('badge-row').innerHTML = badgeHTML;

    // Bio view
    const bioView = document.getElementById('profile-bio-view');
    if (bio) {
      bioView.textContent = bio;
      bioView.classList.remove('empty');
    } else {
      bioView.textContent = 'No bio yet — add one by clicking Edit Profile.';
      bioView.classList.add('empty');
    }

    // Spark Statement view
    const sparkView = document.getElementById('profile-spark-view');
    if (sparkStatement) {
      sparkView.textContent = '"' + sparkStatement + '"';
      sparkView.classList.remove('hidden');
    }

    // Social links view
    const ytLink = document.getElementById('profile-youtube-link');
    const fbLink = document.getElementById('profile-facebook-link');
    const socialRow = document.getElementById('profile-social-row');
    if (youtubeUrl) { ytLink.href = youtubeUrl; ytLink.classList.remove('hidden'); }
    if (facebookUrl) { fbLink.href = facebookUrl; fbLink.classList.remove('hidden'); }
    if (youtubeUrl || facebookUrl) socialRow.classList.remove('hidden');

    // My Tool view
    if (myToolName) {
      document.getElementById('profile-tool-name').textContent = myToolName;
      document.getElementById('profile-tool-card').classList.remove('hidden');
      if (myToolUrl) {
        const toolLink = document.getElementById('profile-tool-link');
        toolLink.href = myToolUrl;
        toolLink.classList.remove('hidden');
      }
    }

    // Pre-fill edit inputs
    document.getElementById('edit-name').value = displayName;
    document.getElementById('edit-bio').value = bio;
    document.getElementById('edit-spark').value = sparkStatement;
    document.getElementById('edit-youtube').value = youtubeUrl;
    document.getElementById('edit-facebook').value = facebookUrl;
    document.getElementById('edit-tool-name').value = myToolName;
    document.getElementById('edit-tool-url').value = myToolUrl;

    // Stats
    document.getElementById('stat-days').textContent = daysActive(createdAt);
    document.getElementById('since-date').textContent = formatDate(createdAt);
    const sinceRow = document.getElementById('member-since-row');
    if (sinceRow) sinceRow.style.display = 'flex';
  // Points, streak and badges
    document.getElementById('stat-points').textContent = data.points || 0;
    document.getElementById('stat-streak').textContent = (data.streak || 0) + ((data.streak || 0) >= 3 ? ' 🔥' : '');
    renderBadges(data.badges || []);

    // Threads count
    try {
      const tSnap = await db.collection('threads').where('authorId', '==', targetUid).get();
      document.getElementById('stat-threads').textContent = String(tSnap.size);
    } catch {
      document.getElementById('stat-threads').textContent = '0';
    }

    // Clarity session — only shown on own profile
    const clarityCard = document.querySelector('.clarity-card');
    if (!isOwnProfile) {
      if (clarityCard) clarityCard.style.display = 'none';
    } else try {
      const cSnap = await db.collection('clarity_sessions')
        .where('clientEmail', '==', user.email)
        .orderBy('createdAt', 'desc')
        .limit(1)
        .get();

      if (!cSnap.empty) {
        const cData = cSnap.docs[0].data();
        document.getElementById('clarity-business').textContent = cData.businessName || 'Your Business';
        document.getElementById('clarity-summary').textContent = cData.clientSummary || 'No summary recorded.';
        if (cData.createdAt) {
          document.getElementById('clarity-meta').innerHTML =
            '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Completed ' + formatDate(cData.createdAt);
        }
        document.getElementById('clarity-found').style.display = 'flex';
      } else {
        document.getElementById('clarity-empty').style.display = 'flex';
      }
    } catch (err) {
      console.error('Clarity session query error', err);
      document.getElementById('clarity-empty').style.display = 'flex';
    }

    // Getting Started checklist — own profile only
    if (isOwnProfile) {
      renderChecklist(user.uid, data);
    }

    // Marketplace tools
    loadMarketplaceTools(targetUid, isOwnProfile);
  });

  async function loadMarketplaceTools(uid, isOwn) {
    const list = document.getElementById('marketplace-list');
    try {
      const snap = await db.collection('marketplace_listings')
        .where('builderUserId', '==', uid)
        .where('status', '==', 'active')
        .get();

      if (snap.empty) {
        list.innerHTML = '<div class="marketplace-empty">' +
          '<div class="marketplace-empty-icon">🛠️</div>' +
          (isOwn
            ? 'You haven\'t listed any tools yet. <br><a href="marketplace.html" class="marketplace-empty-link">Submit your first tool →</a>'
            : 'No tools listed on the marketplace yet.') +
          '</div>';
        return;
      }

      list.innerHTML = snap.docs.map(function(doc) {
        const d = doc.data();
        const uses = d.useCount > 0 ? '<span class="tool-uses">' + d.useCount + ' uses</span>' : '';
        const tag = d.category ? '<span class="tool-tag">' + d.category + '</span>' : '';
        return '<a href="marketplace.html" class="tool-row">' +
          '<div class="tool-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></div>' +
          '<div class="tool-info">' +
            '<div class="tool-name">' + (d.toolName || 'Untitled Tool') + '</div>' +
            '<div class="tool-desc">' + (d.description || '') + '</div>' +
            '<div class="tool-meta">' + tag + uses + '</div>' +
          '</div>' +
          '</a>';
      }).join('');
    } catch(e) {
      list.innerHTML = '<div class="marketplace-empty">Could not load tools.</div>';
    }
  }

  async function markStep(uid, key, href) {
    try {
      const update = {};
      update['onboarding.steps.' + key] = true;
      await db.collection('users').doc(uid).update(update);
    } catch(e) {}
    if (href && href !== '#') window.location.href = href;
  }

  function renderChecklist(uid, data) {
    const steps = data.onboarding?.steps || {};

    // Auto-detect profile completion
    const profileDone = steps.profileComplete ||
      data.profileComplete ||
      !!(data.bio && (data.photoURL || (data.displayName && data.displayName !== data.email)));

    const allSteps = [
      {
        key:      'profileComplete',
        label:    'Update your profile',
        desc:     'Add your photo, bio, and what you build',
        href:     '#profile-edit',
        featured: true,
        done:     profileDone,
      },
      {
        key:   'welcomePost',
        label: 'Introduce yourself',
        desc:  'Post in the welcome thread',
        href:  'community.html',
        done:  !!steps.welcomePost,
      },
      {
        key:   'welcomeCourse',
        label: 'Welcome to ToolSpark! Lesson',
        desc:  'Start here before anything else',
        href:  'courses.html',
        done:  !!steps.welcomeCourse,
      },
      {
        key:   'visitRoadmap',
        label: 'Visit your Build Roadmap',
        desc:  'See your full build path — that\'s where everything starts',
        href:  'roadmap.html',
        done:  !!steps.visitRoadmap,
      },
    ];

    const completed = allSteps.filter(s => s.done).length;
    if (completed === allSteps.length) return; // all done — hide

    document.getElementById('getting-started-card').style.display = 'block';
    document.getElementById('cl-count').textContent = completed + ' of ' + allSteps.length + ' complete';
    const pct = Math.round((completed / allSteps.length) * 100);
    document.getElementById('cl-fill').style.width = pct + '%';

    document.getElementById('cl-steps').innerHTML = allSteps.map((s, i) => {
      const checkClass = s.done ? 'cl-check-done' : s.featured ? 'cl-check-featured' : '';
      const checkInner = s.done
        ? '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>'
        : (i + 1);
      return `<a class="cl-step${s.done ? ' cl-done' : ''}${s.featured ? ' cl-featured' : ''}"
          href="${s.done ? '#' : s.href}"
          ${!s.done && s.key !== 'profileComplete' ? `onclick="event.preventDefault();markStep('${uid}','${s.key}','${s.href}')"` : ''}
        >
        <div class="cl-check ${checkClass}">${checkInner}</div>
        <div class="cl-body">
          <div class="cl-label${s.done ? ' cl-done-text' : ''}">${s.label}</div>
          <div class="cl-desc">${s.desc}</div>
        </div>
        ${s.done ? '' : '<span class="cl-arrow">›</span>'}
      </a>`;
    }).join('');
  }

</script>
<script src="js/nav.js"></script>

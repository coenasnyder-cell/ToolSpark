<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe - ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    background: radial-gradient(circle at top, #FBF7EE 0%, #F4F2EE 46%, #ECE7DE 100%);
    color: #1A1714;
    font-family: 'Lato', sans-serif;
  }
  .card {
    width: min(560px, 100%);
    background: rgba(255,255,255,0.96);
    border: 1px solid #E4E0D8;
    border-radius: 26px;
    box-shadow: 0 24px 70px rgba(12,11,9,0.1);
    overflow: hidden;
  }
  .top {
    padding: 1.25rem 1.4rem;
    background: linear-gradient(135deg, #0C0B09 0%, #171410 100%);
    color: #F4F1E8;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 25px;
  }
  .logo span { color: #C9A84C; }
  .body {
    padding: 1.5rem 1.4rem 1.55rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    line-height: 1.05;
  }
  p {
    margin: 0;
    color: #6B6560;
    line-height: 1.7;
  }
  .field {
    width: 100%;
    border: 1px solid #E4E0D8;
    border-radius: 14px;
    background: #FBF8F1;
    padding: 12px 14px;
    color: #1A1714;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .field:focus {
    border-color: rgba(201,168,76,0.55);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.08);
  }
  .btn {
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #C9A84C 0%, #DEBF68 100%);
    color: #0C0B09;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    width: fit-content;
  }
  .status {
    padding: 0.95rem 1rem;
    border-radius: 16px;
    font-size: 13px;
    border: 1px solid transparent;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: rgba(47,108,87,0.08); color: #2F6C57; border-color: rgba(47,108,87,0.16); }
  .status.error { background: rgba(160,90,74,0.08); color: #A05A4A; border-color: rgba(160,90,74,0.16); }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo">Tool<span>Spark</span></div>
    </div>
    <div class="body">
      <h1>Unsubscribe from marketing emails</h1>
      <p>You will still receive essential account emails when needed, but we will stop sending CRM campaign and nurture emails to this address.</p>
      <input id="email-input" class="field" type="email" placeholder="you@example.com">
      <div id="status" class="status"></div>
      <button id="unsubscribe-btn" class="btn">Unsubscribe</button>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const emailFromQuery = params.get("email") || "";
  const projectId = "toolspark-2d62d";
  const endpoint = `https://us-central1-${projectId}.cloudfunctions.net/crmPublicUnsubscribe`;

  const emailInput = document.getElementById("email-input");
  const statusEl = document.getElementById("status");
  const button = document.getElementById("unsubscribe-btn");
  emailInput.value = emailFromQuery;

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = `status show ${type}`;
  }

  async function unsubscribe() {
    const email = emailInput.value.trim();
    if (!email || !email.includes("@")) {
      setStatus("Add a valid email address first.", "error");
      return;
    }
    button.disabled = true;
    button.textContent = "Working...";
    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "Unable to unsubscribe right now.");
      setStatus("You are unsubscribed from ToolSpark marketing emails.", "success");
    } catch (err) {
      setStatus(err.message || "Unable to unsubscribe right now.", "error");
    } finally {
      button.disabled = false;
      button.textContent = "Unsubscribe";
    }
  }

  button.addEventListener("click", unsubscribe);
  emailInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") unsubscribe();
  });
</script>
</body>
</html>

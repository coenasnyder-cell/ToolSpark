<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolSpark Certificate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  });
  const auth = firebase.auth();
  const db   = firebase.firestore();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1714;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: 'Lato', sans-serif;
  }

  .certificate-wrap {
    width: 100%;
    max-width: 900px;
  }

  .certificate {
    background: #0C0B09;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }

  /* Corner decorations */
  .certificate::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .corner-tl { top: 10px; left: 10px; border-top: 2px solid #C9A84C; border-left: 2px solid #C9A84C; }
  .corner-tr { top: 10px; right: 10px; border-top: 2px solid #C9A84C; border-right: 2px solid #C9A84C; }
  .corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid #C9A84C; border-left: 2px solid #C9A84C; }
  .corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid #C9A84C; border-right: 2px solid #C9A84C; }

  .cert-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .cert-logo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 6px;
  }

  .cert-logo span {
    color: #FFFFFF;
  }

  .cert-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 16px 0;
  }

  .cert-divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5));
  }

  .cert-divider-line.right {
    background: linear-gradient(90deg, rgba(201,168,76,0.5), transparent);
  }

  .cert-divider-dot {
    width: 5px;
    height: 5px;
    background: #C9A84C;
    border-radius: 50%;
  }

  .cert-presents {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
  }

  .cert-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.5);
    margin: 32px 0 16px;
  }

  .cert-this-certifies {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 400;
    color: rgba(240,237,230,0.6);
    font-style: italic;
    margin-bottom: 8px;
  }

  .cert-name {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 600;
    color: #F0EDE6;
    line-height: 1.1;
    margin: 8px 0 24px;
  }

  .cert-body {
    text-align: center;
    padding: 0 40px;
  }

  .cert-has-completed {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.5);
    margin-bottom: 8px;
  }

  .cert-designation {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #C9A84C;
    letter-spacing: 0.05em;
    margin-bottom: 32px;
    line-height: 1.3;
  }

  .cert-tool-section {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    padding: 20px 32px;
    margin: 0 auto 40px;
    max-width: 500px;
  }

  .cert-tool-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    margin-bottom: 6px;
  }

  .cert-tool-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: #F0EDE6;
    font-style: italic;
  }

  .cert-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .cert-sig-block {
    text-align: center;
  }

  .cert-sig {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: #C9A84C;
    margin-bottom: 6px;
  }

  .cert-sig-line {
    width: 140px;
    height: 1px;
    background: rgba(201,168,76,0.3);
    margin: 0 auto 6px;
  }

  .cert-sig-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.4);
  }

  .cert-seal {
    width: 80px;
    height: 80px;
    border: 2px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cert-seal::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 50%;
  }

  .cert-seal-inner {
    text-align: center;
  }

  .cert-seal-icon {
    font-size: 20px;
    display: block;
    margin-bottom: 2px;
  }

  .cert-seal-text {
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C9A84C;
    line-height: 1.3;
  }

  .cert-date-block {
    text-align: center;
  }

  .cert-date-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.4);
    margin-bottom: 6px;
  }

  .cert-date-line {
    width: 140px;
    height: 1px;
    background: rgba(201,168,76,0.3);
    margin: 0 auto 6px;
  }

  .cert-date-value {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: #F0EDE6;
    font-style: italic;
  }

  /* Download button */
  .download-btn {
    display: block;
    margin: 32px auto 0;
    background: #C9A84C;
    color: #0C0B09;
    border: none;
    padding: 14px 40px;
    border-radius: 4px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .download-btn:hover {
    background: #E8D5A3;
    transform: translateY(-1px);
  }

  @media print {
    body { background: white; padding: 0; }
    .download-btn { display: none; }
    .certificate { border-color: #C9A84C; }
  }
</style>
</head>
<body>

<div class="certificate-wrap">
  <div class="certificate">

    <!-- Corner decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Header -->
    <div class="cert-header">
      <div class="cert-logo"><span>Tool</span>Spark</div>
      <div class="cert-divider">
        <div class="cert-divider-line"></div>
        <div class="cert-divider-dot"></div>
        <div class="cert-divider-line right"></div>
      </div>
      <div class="cert-presents">Builder Certification Program</div>
    </div>

    <!-- Body -->
    <div class="cert-body">
      <div class="cert-title">Certificate of Achievement</div>
      <div class="cert-this-certifies">This certifies that</div>
      <div class="cert-name" id="cert-name">Coena Snyder</div>
      <div class="cert-has-completed">has successfully completed the requirements for</div>
      <div class="cert-designation">ToolSpark Certified Builder</div>

      <div class="cert-tool-section">
        <div class="cert-tool-label">Certified Tool</div>
        <div class="cert-tool-name" id="cert-tool">The Clarity Compass</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="cert-footer">
      <div class="cert-sig-block">
        <div class="cert-sig">Coena Snyder</div>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-label">Founder, ToolSpark</div>
      </div>

      <div class="cert-seal">
        <div class="cert-seal-inner">
          <span class="cert-seal-icon">⚡</span>
          <div class="cert-seal-text">Certified<br>Builder</div>
        </div>
      </div>

      <div class="cert-date-block">
        <div class="cert-date-label">Date Certified</div>
        <div class="cert-date-line"></div>
        <div class="cert-date-value" id="cert-date">May 26, 2026</div>
      </div>
    </div>

  </div>

  <button class="download-btn" onclick="window.print()">
    Download Certificate
  </button>
</div>

<script>
  function formatDate(ts) {
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'signon.html'; return; }

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (!snap.exists || !snap.data().certified) {
        window.location.href = 'dashboard.html';
        return;
      }
      const data = snap.data();
      const name     = data.displayName || data.firstName || 'Builder';
      const toolName = data.toolName    || 'ToolSpark Tool';
      const date     = data.certifiedDate ? formatDate(data.certifiedDate) : formatDate(new Date());

      document.getElementById('cert-name').textContent = name;
      document.getElementById('cert-tool').textContent = toolName;
      document.getElementById('cert-date').textContent = date;
      document.title = `Certificate — ${name}`;
    } catch (e) {
      console.error(e);
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox â€” ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    touch-action: pan-y;
  }

  /* â”€â”€ SIDEBAR â”€â”€ */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0;
    z-index: 100;
    border-right: 1px solid var(--border-dark);
    transition: transform 0.3s ease;
  }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; letter-spacing: 0.01em; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; font-weight: 400; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; }
  .sidebar-user:hover { background: rgba(255,255,255,0.05); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: background 0.15s, color 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  /* â”€â”€ MAIN WRAP â”€â”€ */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }

  /* â”€â”€ TOP HEADER â”€â”€ */
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; z-index: 50; gap: 1.5rem; flex-shrink: 0; }
  .new-msg-btn { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); border-radius: 100px; padding: 7px 16px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; color: var(--gold); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .new-msg-btn:hover { background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.5); }
  .sidebar-close-btn { display: none; align-items: center; justify-content: center; width: 36px; height: 36px; background: none; border: none; color: #9A9488; cursor: pointer; border-radius: 50%; flex-shrink: 0; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .sidebar-close-btn:hover { background: rgba(255,255,255,0.08); color: #F0EDE6; }

  /* â”€â”€ INBOX LAYOUT â”€â”€ */
  .inbox-wrap { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  /* â”€â”€ CONVERSATION PANEL â”€â”€ */
  .conv-panel { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
  .conv-panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .conv-panel-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; }
  .conv-panel-new-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; }
  .conv-panel-new-btn:hover { background: rgba(201,168,76,0.2); }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .conv-empty { padding: 2rem 1.5rem; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.8; }
  .conv-empty span { display: block; font-size: 12px; }
  .conv-loading { padding: 1.5rem; color: var(--text3); font-size: 13px; text-align: center; }

  .conv-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; -webkit-tap-highlight-color: transparent; }
  .conv-item:hover { background: var(--bg); }
  .conv-item.active { background: var(--gold-dim); }
  .conv-item:last-child { border-bottom: none; }
  .conv-av { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2A2720, #1C1A17); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
  .conv-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-time { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .conv-preview-row { display: flex; align-items: center; gap: 6px; }
  .conv-preview { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .conv-preview.unread-preview { color: var(--text2); font-weight: 700; }
  .conv-badge { background: var(--gold); color: var(--dark); font-size: 10px; font-weight: 900; border-radius: 100px; padding: 1px 6px; flex-shrink: 0; min-width: 18px; text-align: center; }

  /* â”€â”€ CHAT PANEL â”€â”€ */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg); }
  .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); }
  .chat-empty-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; }
  .chat-empty p { font-size: 14px; }
  .chat-empty small { font-size: 12px; }
  .chat-active-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Chat header */
  .chat-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: var(--shadow); }
  .chat-back-btn { display: none; background: none; border: none; color: var(--gold); cursor: pointer; padding: 6px 4px; font-size: 14px; font-weight: 700; -webkit-tap-highlight-color: transparent; align-items: center; gap: 4px; }
  .chat-header-av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #2A2720, #1C1A17); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .chat-header-name { font-size: 15px; font-weight: 700; color: var(--text); }

  /* Messages */
  .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg-loading { text-align: center; color: var(--text3); font-size: 13px; padding: 2rem 0; }
  .msg-empty { text-align: center; color: var(--text3); font-size: 13px; padding: 3rem 0; }
  .msg-date-sep { text-align: center; font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin: 1rem 0 0.5rem; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 2px; }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #2A2720, #1C1A17); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .msg-group { display: flex; flex-direction: column; gap: 2px; max-width: 65%; }
  .mine .msg-group { align-items: flex-end; }
  .theirs .msg-group { align-items: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .mine .msg-bubble { background: var(--gold); color: var(--dark); border-bottom-right-radius: 4px; }
  .theirs .msg-bubble { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .msg-bubble.img-msg { padding: 4px; background: transparent; border: none; box-shadow: none; }
  .mine .msg-bubble.img-msg { background: transparent; }
  .msg-bubble.img-msg img { max-width: 240px; max-height: 300px; border-radius: 12px; display: block; cursor: pointer; }
  .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }

  /* Input */
  .chat-input-wrap { background: var(--surface); border-top: 1px solid var(--border); padding: 0.875rem 1.5rem; flex-shrink: 0; }
  .msg-img-preview-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .msg-img-preview-wrap img { height: 60px; width: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .remove-img-btn { width: 24px; height: 24px; border-radius: 50%; background: var(--border); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text2); transition: background 0.15s; }
  .remove-img-btn:hover { background: #ddd; }
  .chat-input-row { display: flex; align-items: flex-end; gap: 10px; }
  .img-btn { width: 40px; height: 40px; border-radius: 50%; background: none; border: 1px solid var(--border); color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .img-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); outline: none; resize: none; min-height: 40px; max-height: 120px; line-height: 1.5; overflow-y: auto; transition: border-color 0.15s; }
  .msg-input::placeholder { color: var(--text3); }
  .msg-input:focus { border-color: rgba(201,168,76,0.4); }
  .send-btn { height: 40px; padding: 0 18px; background: var(--gold); border: none; border-radius: 20px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; color: var(--dark); cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* â”€â”€ NEW CONVERSATION MODAL â”€â”€ */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 90%; max-width: 440px; background: var(--surface); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,0.18); z-index: 500; display: none; flex-direction: column; max-height: 80vh; overflow: hidden; transition: transform 0.2s ease; }
  .modal.open { display: flex; transform: translate(-50%, -50%); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .modal-close-btn { width: 32px; height: 32px; border-radius: 50%; background: none; border: none; font-size: 22px; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; }
  .modal-close-btn:hover { background: var(--bg); color: var(--text); }
  .modal-search-wrap { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 10px 18px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .modal-search-input::placeholder { color: var(--text3); }
  .modal-search-input:focus { border-color: rgba(201,168,76,0.4); }
  .modal-results { flex: 1; overflow-y: auto; min-height: 100px; }
  .modal-results::-webkit-scrollbar { width: 4px; }
  .modal-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .search-state { padding: 1.5rem; text-align: center; color: var(--text3); font-size: 13px; }
  .member-result { display: flex; align-items: center; gap: 12px; padding: 12px 1.5rem; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; -webkit-tap-highlight-color: transparent; }
  .member-result:hover { background: var(--bg); }
  .member-result:last-child { border-bottom: none; }
  .member-av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #2A2720, #1C1A17); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .member-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .member-email { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* â”€â”€ SIDEBAR OVERLAY â”€â”€ */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 250; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  /* â”€â”€ MOBILE BOTTOM NAV â”€â”€ */
  .mobile-bottom-nav { display: none; }

  /* â”€â”€ RESPONSIVE â€” tablet â”€â”€ */
  @media (max-width: 1068px) {
    .sidebar { width: 60px; }
    .sidebar-logo, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
    .nav-item.active .nav-icon { opacity: 1; }
    .sidebar-user { justify-content: center; padding: 8px; }
    .user-avatar { margin: 0; }
  }

  /* â”€â”€ RESPONSIVE â€” mobile â”€â”€ */
  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; display: flex; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo { display: flex; align-items: center; justify-content: space-between; }
    .nav-section-label { display: block; }
    .nav-item span { display: inline; }
    .logo-tag { display: block; }
    .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-user { justify-content: flex-start; padding: 8px 10px; }
    .sidebar-close-btn { display: flex; }
    .sidebar-overlay { display: block; }
    .main-wrap { margin-left: 0; height: calc(100vh - 60px); }
    .top-header { padding: 0 1rem; height: 54px; }

    /* Mobile panel switching */
    .inbox-wrap { position: relative; overflow: hidden; }
    .conv-panel { width: 100%; flex-shrink: 0; }
    .chat-panel { position: absolute; inset: 0; background: var(--bg); transform: translateX(100%); transition: transform 0.3s ease; z-index: 10; }
    .inbox-wrap.chat-active .chat-panel { transform: translateX(0); }
    .chat-back-btn { display: flex; }
    .chat-header { padding: 0 1rem; height: 54px; }
    .chat-messages { padding: 1rem; }
    .chat-input-wrap { padding: 0.75rem 1rem; }
    .msg-group { max-width: 78%; }
    .msg-bubble.img-msg img { max-width: 200px; }

    .mobile-bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: var(--dark);
      border-top: 1px solid var(--border-dark);
      z-index: 200;
      align-items: stretch;
      padding: 0 env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-nav-item svg { flex-shrink: 0; }
    .mobile-nav-item:hover, .mobile-nav-item.active { color: var(--gold); }
    .mobile-nav-item.active svg { stroke: var(--gold); }
  }

  @media (max-width: 480px) {
    .top-header { padding: 0 0.875rem; }
    .conv-panel-header { padding: 0.75rem 1rem; }
    .conv-item { padding: 12px 1rem; }
    .chat-input-wrap { padding: 0.625rem 0.875rem; }
    .msg-group { max-width: 85%; }
  }
</style>
</head>
<body>

<!-- â”€â”€ SIDEBAR OVERLAY â”€â”€ -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- â”€â”€ SIDEBAR â”€â”€ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div>
      <div class="logo-text">Tool<span>Spark</span></div>
      <div class="logo-tag">Builder Platform</div>
    </div>
    <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close navigation">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-role" id="sidebar-role">Member</div>
      </div>
    </div>
    <button class="logout-btn" onclick="auth.signOut().then(() => window.location.href='signon.html')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<!-- â”€â”€ MAIN WRAP â”€â”€ -->
<div class="main-wrap">

  <!-- TOP HEADER -->
  <header class="top-header"></header>

  <!-- INBOX TWO-PANEL -->
  <div class="inbox-wrap" id="inbox-wrap">

    <!-- LEFT: CONVERSATION LIST -->
    <div class="conv-panel">
      <div class="conv-panel-header">
        <div class="conv-panel-title">Messages</div>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="conv-loading">Loading...</div>
      </div>
    </div>

    <!-- RIGHT: CHAT PANEL -->
    <div class="chat-panel" id="chat-panel">

      <!-- Empty state -->
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">
          <svg width="26" height="26" fill="none" stroke="#C4BEB8" stroke-width="1.6" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <p>Select a conversation</p>
        <small>or start a new message above</small>
      </div>

      <!-- Active chat view (hidden until a conversation is opened) -->
      <div class="chat-active-view" id="chat-active-view" style="display:none;">

        <!-- Chat header -->
        <div class="chat-header">
          <button class="chat-back-btn" onclick="closeChatMobile()">

          </button>

        <!-- Input -->
        <div class="chat-input-wrap">

            <button class="remove-img-btn" onclick="removeMsgImage()">&times;</button>
          </div>
          <div class="chat-input-row">
            <button class="img-btn" onclick="document.getElementById('msg-image-input').click()" title="Attach image">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="msg-image-input" accept="image/*" style="display:none;" onchange="handleMsgImageSelect(event)">
            <textarea class="msg-input" id="msg-input" placeholder="Write a messageâ€¦" rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
          </div>
        </div>

      </div>
    </div>
  </div>

<div class="modal-overlay" id="modal-overlay" onclick="closeNewConvModal()"></div>
<div class="modal" id="new-conv-modal" role="dialog" aria-modal="true">
  <div class="modal-header">
    <div class="modal-title">New Message</div>
    <button class="modal-close-btn" onclick="closeNewConvModal()">&times;</button>

<!-- â”€â”€ FIREBASE SDK â”€â”€ -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>

<script>
  // â”€â”€ FIREBASE INIT â”€â”€
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  const appCheck = firebase.appCheck();
  appCheck.activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // â”€â”€ STATE â”€â”€
  let currentUser = null;
  let currentUserRole = '';
  let currentConvId = null;
  let currentOtherUid = null;
  let messagesUnsub = null;
  let convsUnsub = null;
  let userCache = {};
  let selectedMsgImage = null;
  let isSending = false;
  let searchTimeout = null;

  // â”€â”€ AUTH â”€â”€
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'signon.html'; return; }
    currentUser = user;

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists) currentUserRole = snap.data().userRole || '';
    } catch(e) {}

    const name = user.displayName || user.email || 'Builder';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-role').textContent = currentUserRole === 'admin' ? 'Admin' : 'Member';

    const sidebarAv = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      sidebarAv.innerHTML = '<img src="' + escHtml(user.photoURL) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">';
    } else {
      sidebarAv.textContent = name.charAt(0).toUpperCase();
    }

    userCache[user.uid] = { displayName: user.displayName || name, photoURL: user.photoURL || '' };
    startConvsListener();
  });

  // â”€â”€ CONVERSATIONS LISTENER â”€â”€
  function startConvsListener() {
    if (convsUnsub) convsUnsub();
    convsUnsub = db.collection('conversations')
      .where('participants', 'array-contains', currentUser.uid)
      .orderBy('lastMessageAt', 'desc')
      .onSnapshot(async snap => {
        await renderConvList(snap.docs);
      }, err => {
        document.getElementById('conv-list').innerHTML = '<div class="conv-empty">Could not load messages.</div>';
        console.error(err);
      });
  }

  // â”€â”€ USER PROFILE CACHE â”€â”€
  async function getUser(uid) {
    if (userCache[uid]) return userCache[uid];
    try {
      const snap = await db.collection('users').doc(uid).get();
      userCache[uid] = snap.exists ? snap.data() : { displayName: 'Member', photoURL: '' };
    } catch(e) {
      userCache[uid] = { displayName: 'Member', photoURL: '' };
    }
    return userCache[uid];
  }

  // â”€â”€ RENDER CONVERSATION LIST â”€â”€
  async function renderConvList(docs) {
    const list = document.getElementById('conv-list');
    if (!docs.length) {
      list.innerHTML = '<div class="conv-empty">No messages yet.<span>Use New Message to start a conversation.</span></div>';
      return;
    }
    const toLoad = [];
    docs.forEach(doc => {
      const other = (doc.data().participants || []).find(u => u !== currentUser.uid);
      if (other && !userCache[other]) toLoad.push(getUser(other));
    });
    if (toLoad.length) await Promise.all(toLoad);
    list.innerHTML = docs.map(doc => buildConvItem(doc)).join('');
  }

  function buildConvItem(doc) {
    const d = doc.data();
    const otherUid = (d.participants || []).find(u => u !== currentUser.uid) || '';
    const other = userCache[otherUid] || { displayName: 'Member', photoURL: '' };
    const unread = d['unreadCount' + currentUser.uid] || 0;
    const isActive = doc.id === currentConvId;
    const name = other.displayName || 'Member';
    const avatarHtml = other.photoURL
      ? '<img src="' + escHtml(other.photoURL) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">'
      : escHtml(name.charAt(0).toUpperCase());
    const lastMsg = d.lastMessage || '';
    const time = d.lastMessageAt ? timeAgo(d.lastMessageAt.toDate()) : '';
    return '<div class="conv-item' + (isActive ? ' active' : '') + '" onclick="openConv(\'' + doc.id + '\',\'' + otherUid + '\')">' +
      '<div class="conv-av">' + avatarHtml + '</div>' +
      '<div class="conv-info">' +
        '<div class="conv-name-row">' +
          '<div class="conv-name">' + escHtml(name) + '</div>' +
          '<div class="conv-time">' + time + '</div>' +
        '</div>' +
        '<div class="conv-preview-row">' +
          '<div class="conv-preview' + (unread > 0 ? ' unread-preview' : '') + '">' + escHtml(lastMsg) + '</div>' +
          (unread > 0 ? '<div class="conv-badge">' + (unread > 9 ? '9+' : unread) + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // â”€â”€ OPEN CONVERSATION â”€â”€
  async function openConv(convId, otherUid) {
    currentConvId = convId;
    currentOtherUid = otherUid;

    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const active = document.querySelector('.conv-item[onclick*="\'' + convId + '\'"]');
    if (active) active.classList.add('active');

    const other = await getUser(otherUid);
    const name = other.displayName || 'Member';

    // Show chat view
    document.getElementById('chat-empty').style.display = 'none';
    document.getElementById('chat-active-view').style.display = 'flex';
    document.getElementById('inbox-wrap').classList.add('chat-active');

    // Update header
    document.getElementById('chat-header-name').textContent = name;
    const chatAv = document.getElementById('chat-header-av');
    if (other.photoURL) {
      chatAv.innerHTML = '<img src="' + escHtml(other.photoURL) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">';
    } else {
      chatAv.textContent = name.charAt(0).toUpperCase();
    }

    // Mark as read
    db.collection('conversations').doc(convId).update({
      ['unreadCount' + currentUser.uid]: 0
    }).catch(() => {});

    // Subscribe to messages
    if (messagesUnsub) messagesUnsub();
    document.getElementById('chat-messages').innerHTML = '<div class="msg-loading">Loadingâ€¦</div>';

    messagesUnsub = db.collection('conversations').doc(convId)
      .collection('messages')
      .orderBy('createdAt')
      .onSnapshot(snap => {
        renderMessages(snap.docs, other);
      }, err => {
        document.getElementById('chat-messages').innerHTML = '<div class="msg-loading">Could not load messages.</div>';
        console.error(err);
      });
  }

  // â”€â”€ RENDER MESSAGES â”€â”€
  function renderMessages(docs, other) {
    const el = document.getElementById('chat-messages');
    const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;

    if (!docs.length) {
      el.innerHTML = '<div class="msg-empty">No messages yet. Say hello!</div>';
      return;
    }

    let html = '';
    let prevDate = null;

    docs.forEach(doc => {
      const d = doc.data();
      const isMine = d.senderId === currentUser.uid;
      const ts = d.createdAt ? d.createdAt.toDate() : new Date();
      const dateStr = ts.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      if (dateStr !== prevDate) {
        html += '<div class="msg-date-sep">' + dateStr + '</div>';
        prevDate = dateStr;
      }
      const timeStr = ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const avHtml = other.photoURL
        ? '<img src="' + escHtml(other.photoURL) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">'
        : escHtml((other.displayName || 'M').charAt(0).toUpperCase());

      html += '<div class="msg-row ' + (isMine ? 'mine' : 'theirs') + '">';
      if (!isMine) html += '<div class="msg-av">' + avHtml + '</div>';
      html += '<div class="msg-group">';
      if (d.imageURL) {
        html += '<div class="msg-bubble img-msg"><img src="' + escHtml(d.imageURL) + '" alt="image" onclick="window.open(this.src,\'_blank\')"></div>';
      }
      if (d.content) {
        html += '<div class="msg-bubble">' + escHtml(d.content) + '</div>';
      }
      html += '<div class="msg-time">' + timeStr + '</div>';
      html += '</div></div>';
    });

    el.innerHTML = html;
    if (nearBottom) el.scrollTop = el.scrollHeight;
  }

  // â”€â”€ SEND MESSAGE â”€â”€
  async function sendMessage() {
    if (!currentConvId || !currentUser || isSending) return;
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content && !selectedMsgImage) return;

    isSending = true;
    document.getElementById('send-btn').disabled = true;
    const contentToSend = content;
    input.value = '';
    autoResizeInput(input);

    try {
      let imageURL = '';
      if (selectedMsgImage) {
        imageURL = await uploadMsgImage();
        removeMsgImage();
      }
      await db.collection('conversations').doc(currentConvId).collection('messages').add({
        senderId: currentUser.uid,
        content: contentToSend,
        imageURL,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        read: false
      });
      await db.collection('conversations').doc(currentConvId).update({
        lastMessage: contentToSend || 'ðŸ“· Image',
        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
        ['unreadCount' + currentOtherUid]: firebase.firestore.FieldValue.increment(1)
      });
    } catch(e) {
      input.value = contentToSend;
      autoResizeInput(input);
      console.error('send error', e);
    } finally {
      isSending = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  // â”€â”€ IMAGE â”€â”€
  async function uploadMsgImage() {
    if (!selectedMsgImage || !currentUser) return '';
    const ext = selectedMsgImage.name.split('.').pop();
    const ref = storage.ref('message-images/' + currentUser.uid + '_' + Date.now() + '.' + ext);
    await ref.put(selectedMsgImage);
    return await ref.getDownloadURL();
  }

  function handleMsgImageSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5 MB.'); return; }
    selectedMsgImage = file;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('msg-img-preview').src = ev.target.result;
      document.getElementById('msg-img-preview-wrap').style.display = 'flex';
    };
    reader.readAsDataURL(file);
  }

  function removeMsgImage() {
    selectedMsgImage = null;
    document.getElementById('msg-image-input').value = '';
    document.getElementById('msg-img-preview').src = '';
    document.getElementById('msg-img-preview-wrap').style.display = 'none';
  }

  // â”€â”€ MOBILE BACK â”€â”€
  function closeChatMobile() {
    document.getElementById('inbox-wrap').classList.remove('chat-active');
    if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
    currentConvId = null;
    currentOtherUid = null;
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    document.getElementById('chat-empty').style.display = 'flex';
    document.getElementById('chat-active-view').style.display = 'none';
  }

  // â”€â”€ NEW CONVERSATION MODAL â”€â”€
  function openNewConvModal() {
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('new-conv-modal').classList.add('open');
    document.getElementById('member-search-input').value = '';
    document.getElementById('modal-results').innerHTML = '<div class="search-state">Start typing to find a member.</div>';
    setTimeout(() => document.getElementById('member-search-input').focus(), 80);
  }

  function closeNewConvModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('new-conv-modal').classList.remove('open');
    clearTimeout(searchTimeout);
  }

  function searchMembers(query) {
    clearTimeout(searchTimeout);
    const q = query.trim();
    if (!q) {
      document.getElementById('modal-results').innerHTML = '<div class="search-state">Start typing to find a member.</div>';
      return;
    }
    searchTimeout = setTimeout(() => doSearch(q), 280);
  }

  async function doSearch(query) {
    const results = document.getElementById('modal-results');
    const q = query.charAt(0).toUpperCase() + query.slice(1);
    results.innerHTML = '<div class="search-state">Searching...</div>';
    try {
      const snap = await db.collection('users')
        .orderBy('displayName')
        .startAt(q)
        .endAt(q + '')
        .limit(12)
        .get();

      const members = snap.docs
        .filter(doc => doc.id !== currentUser.uid)
        .map(doc => ({ uid: doc.id, ...doc.data() }));

      if (!members.length) {
        results.innerHTML = '<div class="search-state">No members found.</div>';
        return;
      }

      results.innerHTML = members.map(m => {
        const name = m.displayName || 'Member';
        const avHtml = m.photoURL
          ? '<img src="' + escHtml(m.photoURL) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">'
          : escHtml(name.charAt(0).toUpperCase());
        return '<div class="member-result" onclick="startConvWith(\'' + m.uid + '\')">' +
          '<div class="member-av">' + avHtml + '</div>' +
          '<div><div class="member-name">' + escHtml(name) + '</div>' +
          (m.userEmail ? '<div class="member-email">' + escHtml(m.userEmail) + '</div>' : '') +
          '</div></div>';
      }).join('');
    } catch(e) {
      results.innerHTML = '<div class="search-state">Search failed. Try again.</div>';
      console.error(e);
    }
  }

  async function startConvWith(targetUid) {
    closeNewConvModal();
    try {
      // Check for existing conversation with this user
      const snap = await db.collection('conversations')
        .where('participants', 'array-contains', currentUser.uid)
        .get();
      const existing = snap.docs.find(doc => (doc.data().participants || []).includes(targetUid));
      if (existing) { openConv(existing.id, targetUid); return; }

      // Create new conversation
      const docRef = await db.collection('conversations').add({
        participants: [currentUser.uid, targetUid],
        lastMessage: '',
        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
        ['unreadCount' + currentUser.uid]: 0,
        ['unreadCount' + targetUid]: 0
      });
      openConv(docRef.id, targetUid);
    } catch(e) {
      console.error('startConvWith error', e);
    }
  }


  // â”€â”€ TEXTAREA: auto-resize + Enter to send â”€â”€
  const msgInputEl = document.getElementById('msg-input');
  msgInputEl.addEventListener('input', () => autoResizeInput(msgInputEl));
  msgInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function autoResizeInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // â”€â”€ UTILS â”€â”€
  function timeAgo(date) {
    const s = Math.floor((Date.now() - date.getTime()) / 1000);
    if (s < 60) return 'now';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    if (s < 86400) return Math.floor(s / 3600) + 'h';
    if (s < 604800) return Math.floor(s / 86400) + 'd';
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>

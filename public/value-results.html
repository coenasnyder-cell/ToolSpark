<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Value Report — ToolSpark</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>

<script src="js/auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:       #0C0B09;
    --dark2:      #141210;
    --dark3:      #1C1A17;
    --gold:       #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim:   rgba(201,168,76,0.10);
    --gold-mid:   rgba(201,168,76,0.20);
    --border:     rgba(201,168,76,0.15);
    --border-mid: rgba(201,168,76,0.25);
    --cream:      #F0EDE6;
    --text3:      #9E9891;
    --green-dim:  rgba(42,92,69,0.25);
    --green-mid:  #3D8A65;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
  }

  @keyframes rise {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── LOADING ── */
  #loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text3); }

  /* ── NO RESULTS ── */
  #no-results {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; text-align: center; padding: 2rem;
  }
  .no-results-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .no-results-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold-light); }
  .no-results-sub { font-size: 14px; color: var(--text3); line-height: 1.7; max-width: 360px; }

  /* ── PAGE ── */
  #results-page { display: none; }

  /* Header */
  .page-header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    flex-wrap: wrap;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .header-logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); }
  .header-logo span { color: var(--gold); }
  .header-label {
    font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.14em;
    background: var(--dark3); border: 1px solid var(--border);
    border-radius: 100px; padding: 2px 9px;
  }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .header-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
  }
  .header-btn.ghost { background: none; border: 1px solid var(--border-mid); color: var(--text3); }
  .header-btn.ghost:hover { border-color: var(--gold); color: var(--gold); }
  .header-btn.gold { background: var(--gold); border: none; color: var(--dark); }
  .header-btn.gold:hover { background: var(--gold-light); }

  /* Hero */
  .results-hero {
    text-align: center;
    padding: 48px 24px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--dark2);
    position: relative; overflow: hidden;
  }
  .results-hero::before {
    content: ''; position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .results-eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); opacity: 0.7; margin-bottom: 14px;
  }
  .results-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px); font-weight: 400;
    color: var(--gold-light); line-height: 1.2; margin-bottom: 10px;
  }
  .results-hero h1 em { font-style: italic; color: var(--gold); }
  .results-meta { font-size: 12px; color: var(--text3); margin-top: 8px; }

  /* Content */
  .results-content { max-width: 700px; margin: 0 auto; padding: 40px 20px 60px; }

  .result-block {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px 30px; margin-bottom: 16px;
    animation: rise 0.5s ease both;
  }
  .result-block:nth-child(2) { animation-delay: 0.08s; }
  .result-block:nth-child(3) { animation-delay: 0.16s; }
  .result-block:nth-child(4) { animation-delay: 0.24s; }

  .result-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .result-text { font-size: 15px; color: var(--gold-light); line-height: 1.85; }

  /* Use cases */
  .use-cases { display: flex; flex-direction: column; gap: 10px; }
  .use-case {
    background: rgba(201,168,76,0.05); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .use-case-num {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--gold); font-weight: 400;
    flex-shrink: 0; line-height: 1.2; min-width: 20px;
  }
  .use-case-name { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 3px; }
  .use-case-desc { font-size: 14px; color: var(--gold-light); line-height: 1.6; }

  /* Closing */
  .closing-block {
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border-mid);
    border-left: 3px solid var(--gold);
    border-radius: 0 20px 20px 0;
    padding: 28px 30px; margin-bottom: 16px;
    animation: rise 0.5s 0.32s ease both;
  }
  .closing-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-style: italic;
    color: var(--gold-light); line-height: 1.75;
  }

  /* Actions */
  .results-actions {
    display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap;
    animation: rise 0.5s 0.4s ease both;
  }
  .res-btn {
    flex: 1; min-width: 160px; padding: 14px 20px;
    border-radius: 12px; font-family: 'Lato', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; text-align: center; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none;
  }
  .res-btn.primary { background: var(--gold); color: var(--dark); }
  .res-btn.primary:hover { background: var(--gold-light); }
  .res-btn.secondary { background: none; color: var(--gold); border: 1px solid var(--border-mid); }
  .res-btn.secondary:hover { background: var(--gold-dim); }

  @media (max-width: 600px) {
    .result-block { padding: 22px 20px; }
    .closing-block { padding: 22px 20px; }
    .page-header { padding: 16px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-state">
  <div class="spinner"></div>
  <div class="loading-text">Loading your report…</div>
</div>

<!-- NO RESULTS -->
<div id="no-results">
  <div class="no-results-icon">💡</div>
  <div class="no-results-title">No report yet</div>
  <div class="no-results-sub">You haven't run the Value Mirror yet. Complete it to see your full value report here.</div>
  <a href="value-tool.html" style="margin-top:1.5rem;display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--dark);font-family:'Lato',sans-serif;font-size:14px;font-weight:700;padding:12px 28px;border-radius:10px;text-decoration:none;">Run the Value Mirror →</a>
</div>

<!-- RESULTS PAGE -->
<div id="results-page">

  <div class="page-header">
    <a href="dashboard.html" class="header-brand">
      <div class="header-logo">Tool<span>Spark</span></div>
      <span class="header-label">Value Mirror</span>
    </a>
    <div class="header-actions">
      <a href="value-tool.html" class="header-btn ghost">Redo →</a>
      <a href="dashboard.html" class="header-btn gold">Dashboard</a>
    </div>
  </div>

  <div class="results-hero">
    <div class="results-eyebrow">Roadblock 8 · Complete</div>
    <h1>Your <em>Value Report</em></h1>
    <div class="results-meta" id="results-date"></div>
  </div>

  <div class="results-content" id="results-content"></div>

</div>

<script>
  window.addEventListener('tsUserReady', async function() {
    const user = firebase.auth().currentUser;
    if (!user) { window.location.href = 'signon.html'; return; }

    try {
      const snap = await db.collection('value_tool')
        .where('userId', '==', user.uid)
        .orderBy('createdAt', 'desc')
        .limit(1)
        .get();

      document.getElementById('loading-state').style.display = 'none';

      if (snap.empty) {
        document.getElementById('no-results').style.display = 'flex';
        return;
      }

      const data = snap.docs[0].data();
      renderResults(data);
    } catch(e) {
      console.error(e);
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('no-results').style.display = 'flex';
    }
  });

  function renderResults(data) {
    document.getElementById('results-page').style.display = 'block';

    if (data.createdAt) {
      const d = data.createdAt.toDate();
      document.getElementById('results-date').textContent =
        'Generated ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    const raw = data.rawReport || '';
    const reportMatch = raw.match(/VALUE_REPORT_START([\s\S]*?)VALUE_REPORT_END/);
    if (!reportMatch) {
      document.getElementById('no-results').style.display = 'flex';
      return;
    }
    const report = reportMatch[1];

    const get = (key) => {
      const re = new RegExp(key + ':([\\s\\S]*?)(?=\\n[A-Z_]+:|VALUE_REPORT_END|$)');
      const m = report.match(re);
      return m ? m[1].trim() : '';
    };

    const whatBuilt     = get('WHAT_YOU_BUILT');
    const whoTransforms = get('WHO_THIS_TRANSFORMS');
    const threeWays     = get('THREE_WAYS_THIS_IS_USEFUL');
    const whyWorth      = get('WHY_ITS_WORTH_PAYING_FOR');
    const closing       = get('CLOSING');

    const uses = [];
    const useRe = /USE_(\d):\s*([^|]+)\|\s*(.+)/g;
    let m;
    while ((m = useRe.exec(threeWays)) !== null) {
      uses.push({ num: m[1], name: m[2].trim(), desc: m[3].trim() });
    }

    document.getElementById('results-content').innerHTML = `
      <div class="result-block">
        <div class="result-label">What you actually built</div>
        <div class="result-text">${esc(whatBuilt)}</div>
      </div>

      <div class="result-block">
        <div class="result-label">Who this transforms</div>
        <div class="result-text">${esc(whoTransforms)}</div>
      </div>

      <div class="result-block">
        <div class="result-label">Three ways to use it right now</div>
        <div class="use-cases">
          ${uses.map(u => `
            <div class="use-case">
              <div class="use-case-num">${u.num}</div>
              <div class="use-case-body">
                <div class="use-case-name">${esc(u.name)}</div>
                <div class="use-case-desc">${esc(u.desc)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div class="result-block">
        <div class="result-label">Why it's worth launching</div>
        <div class="result-text">${esc(whyWorth)}</div>
      </div>

      ${closing ? `<div class="closing-block"><div class="closing-text">"${esc(closing)}"</div></div>` : ''}

      <div class="results-actions">
        <a href="dashboard.html" class="res-btn primary">Back to Dashboard →</a>
        <a href="value-tool.html" class="res-btn secondary">Redo the Value Mirror</a>
      </div>`;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>

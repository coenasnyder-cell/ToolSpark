<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --green: #2A5C45;
    --green-light: #3D8A65;
    --purple: #4B3F8A;
    --coral: #C4622D;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* MAIN */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* PAGE */
  .page-content { flex: 1; padding: 1.75rem 2rem; max-width: 960px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 3rem; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: var(--text3); }

  /* FILTER */
  .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-chip { padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; font-weight: 700; color: var(--text2); background: var(--surface); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
  .filter-chip.active { background: var(--dark); border-color: var(--dark); color: var(--gold-light); }

  /* SECTION */
  .section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* EVENT CARDS */
  .events-list { display: flex; flex-direction: column; gap: 1rem; }

  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; display: flex; gap: 1.25rem; align-items: flex-start; transition: box-shadow 0.15s, transform 0.15s; cursor: pointer; text-decoration: none; color: inherit; }
  .event-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .event-card.past { opacity: 0.6; cursor: default; }
  .event-card.past:hover { box-shadow: var(--shadow); transform: none; }

  .event-date-block { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: var(--radius-sm); background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); flex-shrink: 0; }
  .event-month { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--gold); letter-spacing: 0.1em; }
  .event-day { font-size: 28px; font-weight: 900; color: var(--text); line-height: 1; }

  .event-info { flex: 1; min-width: 0; }
  .event-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .event-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .event-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 100px; }
  .badge-upcoming { background: rgba(42,92,69,0.1); border: 1px solid rgba(42,92,69,0.2); color: var(--green-light); }
  .badge-live { background: rgba(196,98,45,0.12); border: 1px solid rgba(196,98,45,0.25); color: var(--coral); animation: pulse 2s infinite; }
  .badge-past { background: var(--bg); border: 1px solid var(--border); color: var(--text3); }
  .badge-recurring { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .event-meta { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text3); margin-bottom: 8px; flex-wrap: wrap; }
  .event-meta-item { display: flex; align-items: center; gap: 5px; }
  .event-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .event-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
  .event-cta { display: inline-flex; align-items: center; gap: 6px; background: var(--gold); color: #0C0B09; border: none; border-radius: var(--radius-sm); padding: 8px 18px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .event-cta:hover { background: var(--gold-light); }
  .event-cta.secondary { background: none; border: 1px solid var(--border); color: var(--text2); }
  .event-cta.secondary:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .event-add-cal { font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: none; transition: color 0.15s; }
  .event-add-cal:hover { color: var(--gold); }

  .past-events-card { background: linear-gradient(135deg, #FFFFFF 0%, #F8F3E8 100%); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1.25rem; text-decoration: none; color: inherit; transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s; }
  .past-events-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: rgba(201,168,76,0.45); }
  .past-events-icon { width: 54px; height: 54px; border-radius: var(--radius-sm); background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); display: flex; align-items: center; justify-content: center; color: var(--gold); flex-shrink: 0; }
  .past-events-copy { flex: 1; min-width: 0; }
  .past-events-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .past-events-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .past-events-arrow { color: var(--gold); font-size: 20px; font-weight: 700; flex-shrink: 0; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; }

  @media (max-width: 767px) {
    .page-content { padding: 1rem 1rem 1.5rem; gap: 1rem; }
    .event-card { flex-direction: column; gap: 1rem; }
    .past-events-card { align-items: flex-start; }
    .event-date-block { flex-direction: row; width: auto; height: auto; padding: 6px 12px; gap: 8px; }
    .event-day { font-size: 20px; }
    .filter-bar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
  }
  @media (max-width: 480px) {
    .page-content { padding: 0.875rem 0.875rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- MAIN -->
<div class="main-wrap">
  <header class="top-header"></header>

  <div class="page-content">
    <div>
      <div class="page-title">Upcoming Events</div>
      <div class="page-sub">Live sessions, workshops, and community calls — join us</div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="upcoming">Upcoming</div>
      <div class="filter-chip" data-filter="past">Past</div>
    </div>

    <!-- Upcoming -->
    <div id="upcoming-section">
      <div class="section-label">Upcoming</div>
      <div class="events-list" id="upcoming-list">
        <div style="color:var(--text3);font-size:13px;">Loading events...</div>
      </div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>

<script src="js/auth.js"></script>
<script>
  let currentUser = null;
  let allEvents = [];
  let activeFilter = 'all';

  window.addEventListener('tsUserReady', async function() {
    const user = firebase.auth().currentUser;
    if (!user) return;
    currentUser = user;
    loadEvents();
  });

  async function loadEvents() {
    try {
      const snap = await db.collection('Events')
        .orderBy('eventDate', 'asc')
        .get();

      const now = new Date();

      allEvents = snap.docs.map(function(doc) {
        const d = doc.data();
        let eventDate = null;
        const dateValue = d.eventDate || d.date;
        if (dateValue) {
          eventDate = dateValue.toDate ? dateValue.toDate() : new Date(dateValue);
        }
        const isPast = eventDate ? eventDate < now : false;
        const isLive = d.status === 'live';

        return {
          id: doc.id,
          title: d.eventTitle || d.title || 'Untitled Event',
          description: d.description || '',
          date: eventDate,
          eventStart: d.eventStart || '',
          eventLocation: d.eventLocation || '',
          eventURL: d.eventURL || '',
          status: d.status || (isPast ? 'past' : 'upcoming'),
          isRecurring: d.isRecurring || false,
          isPast,
          isLive,
        };
      });

      renderEvents();

    } catch(e) {
      console.error(e);
      document.getElementById('upcoming-list').innerHTML =
        '<div style="color:var(--text3);font-size:13px;">Could not load events. Please refresh.</div>';
    }
  }

  function renderEvents() {
    const upcoming = allEvents.filter(function(e) {
      if (activeFilter === 'upcoming') return !e.isPast;
      if (activeFilter === 'past') return e.isPast;
      return true;
    });

    const upcomingEvents = upcoming.filter(e => !e.isPast);

    // Upcoming section
    const upcomingSection = document.getElementById('upcoming-section');
    const upcomingList = document.getElementById('upcoming-list');

    if (activeFilter === 'past') {
      upcomingSection.style.display = 'none';
    } else {
      upcomingSection.style.display = 'block';
      if (upcomingEvents.length === 0) {
        upcomingList.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No upcoming events</div><div class="empty-sub">Check back soon — new sessions are being planned</div></div>';
      } else {
        upcomingList.innerHTML = upcomingEvents.map(renderEventCard).join('');
      }
    }

    // Past section
    const pastSection = document.getElementById('past-section');

    if (activeFilter === 'upcoming') {
      pastSection.style.display = 'none';
    } else {
      pastSection.style.display = 'block';
    }
  }

  function renderEventCard(event) {
    const dateBlock = event.date
      ? '<div class="event-date-block"><div class="event-month">' +
        event.date.toLocaleDateString('en-US', { month: 'short' }).toUpperCase() +
        '</div><div class="event-day">' +
        event.date.getDate() +
        '</div></div>'
      : '<div class="event-date-block"><div class="event-month">TBD</div><div class="event-day">—</div></div>';

    let badgeHtml = '';
    if (event.isLive) {
      badgeHtml = '<span class="event-badge badge-live">● Live Now</span>';
    } else if (event.isPast) {
      badgeHtml = '<span class="event-badge badge-past">Past</span>';
    } else {
      badgeHtml = '<span class="event-badge badge-upcoming">Upcoming</span>';
    }
    if (event.isRecurring) {
      badgeHtml += '<span class="event-badge badge-recurring">Recurring</span>';
    }

    const metaHtml = [
      event.eventStart ? '<span class="event-meta-item"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + escHtml(event.eventStart) + '</span>' : '',
      event.eventLocation ? '<span class="event-meta-item"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' + escHtml(event.eventLocation) + '</span>' : '',
    ].filter(Boolean).join('');

    const footerHtml = event.isPast
      ? ''
      : '<div class="event-footer">' +
        (event.eventURL
          ? '<a class="event-cta" href="' + escHtml(event.eventURL) + '" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Join Event →</a>'
          : '<span></span>') +
        '</div>';

    return '<div class="event-card' + (event.isPast ? ' past' : '') + '">' +
      dateBlock +
      '<div class="event-info">' +
      '<div class="event-title-row"><div class="event-title">' + escHtml(event.title) + '</div>' + badgeHtml + '</div>' +
      (metaHtml ? '<div class="event-meta">' + metaHtml + '</div>' : '') +
      (event.description ? '<div class="event-desc">' + escHtml(event.description) + '</div>' : '') +
      footerHtml +
      '</div></div>';
  }

  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Filter chips
  document.querySelectorAll('.filter-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      renderEvents();
    });
  });

</script>
<script src="js/nav.js"></script>
<script>initNav('events', 'Events');</script>
</body>
</html>

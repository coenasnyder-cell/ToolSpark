<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Admin — ToolSpark</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    storageBucket: "toolspark-2d62d.firebasestorage.app",

<script src="/js/admin-shell.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --dark3: #1C1A17; --border-dark: #2A2720;
    --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE; --surface: #FFFFFF; --border: #E4E0D8;
    --text: #1A1714; --text2: #6B6560; --text3: #9E9891;
    --green: #2A5C45; --green-light: #3D8A65; --green-dim: rgba(42,92,69,0.08);
    --red: #C0392B; --red-dim: rgba(192,57,43,0.08);
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --sidebar-width: 220px; --header-height: 64px;
  }
  body { font-family:'Lato',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; }

  /* MAIN */
  .main-wrap { margin-left:var(--sidebar-width); flex:1; display:flex; flex-direction:column; }
  .top-header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; }
  .header-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:400; color:var(--text); }
  .header-subtitle { font-size:13px; color:var(--text3); margin-top:2px; }
  .page-content { padding:2rem; display:flex; flex-direction:column; gap:2rem; max-width:1000px; }

  /* SECTION */
  .section-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .section-header { padding:1.1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .section-title { font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
  .count-badge { font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; }
  .badge-pending { background:rgba(201,168,76,0.12); color:#9A7B2E; border:1px solid rgba(201,168,76,0.25); }
  .badge-active  { background:var(--green-dim); color:var(--green-light); border:1px solid rgba(42,92,69,0.2); }
  .section-empty { padding:2rem; text-align:center; color:var(--text3); font-size:13px; }

  /* LISTING ROW */
  .listing-row { display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.5rem; border-bottom:1px solid var(--border); }
  .listing-row:last-child { border-bottom:none; }
  .listing-info { flex:1; min-width:0; }
  .listing-name { font-size:14px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .listing-meta { font-size:12px; color:var(--text3); line-height:1.6; }
  .listing-meta a { color:var(--gold); text-decoration:none; font-weight:700; }
  .listing-meta a:hover { opacity:0.8; }
  .listing-tags { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; padding:2px 7px; border-radius:20px; }
  .tag-type { background:rgba(75,63,138,0.1); color:#8B7FD4; border:1px solid rgba(75,63,138,0.2); }
  .tag-cat  { background:rgba(56,132,158,0.1); color:#38849E; border:1px solid rgba(56,132,158,0.2); }
  .tag-free { background:var(--green-dim); color:var(--green-light); border:1px solid rgba(42,92,69,0.2); }
  .tag-paid { background:var(--gold-dim); color:#9A7B2E; border:1px solid rgba(201,168,76,0.25); }
  .listing-actions { display:flex; gap:8px; flex-shrink:0; align-items:center; }
  .btn-approve { background:var(--green-dim); color:var(--green-light); border:1px solid rgba(42,92,69,0.25); border-radius:7px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Lato',sans-serif; transition:all 0.15s; white-space:nowrap; }
  .btn-approve:hover { background:rgba(42,92,69,0.15); }
  .btn-approve:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-delete { background:var(--red-dim); color:var(--red); border:1px solid rgba(192,57,43,0.2); border-radius:7px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Lato',sans-serif; transition:all 0.15s; white-space:nowrap; }
  .btn-delete:hover { background:rgba(192,57,43,0.14); }
  .btn-delete:disabled { opacity:0.5; cursor:not-allowed; }
  .listing-date { font-size:11px; color:var(--text3); white-space:nowrap; margin-top:2px; }

  /* LOADING */
  .loading-state { padding:2rem; text-align:center; color:var(--text3); font-size:13px; }

  @media (max-width:767px) { .main-wrap { margin-left:0; } .page-content { padding:1rem; } }
</style>
</head>
<body>

<div id="ts-admin-sidebar"></div>

<div class="main-wrap">
  <div class="top-header">
    <div>
      <div class="header-title">Marketplace Admin</div>
      <div class="header-subtitle">Review submissions and manage live listings</div>
    </div>
    <a href="marketplace.html" style="font-size:13px;font-weight:700;color:var(--gold);text-decoration:none;">View Public Marketplace →</a>
  </div>

  <div class="page-content">

    <!-- PENDING -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Pending Review
          <span class="count-badge badge-pending" id="pending-count">—</span>
        </div>
        <div style="font-size:12px;color:var(--text3);">Approve to publish, reject to remove</div>
      </div>
      <div id="pending-list"><div class="loading-state">Loading…</div></div>
    </div>

    <!-- ACTIVE -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Live Listings
          <span class="count-badge badge-active" id="active-count">—</span>
        </div>
        <div style="font-size:12px;color:var(--text3);">Currently visible on the public marketplace</div>
      </div>
      <div id="active-list"><div class="loading-state">Loading…</div></div>
    </div>

  </div>
</div>

<script>
var currentUser = null;

window.SITE_ADMIN_ACTIVE = 'marketplace';
initSiteAdminPage(function(user) {
  currentUser = user;
  loadListings();
});

async function loadListings() {
  try {
    var results = await Promise.all([
      db.collection('marketplace_listings').where('status', '==', 'pending').get(),
      db.collection('marketplace_listings').where('status', '==', 'active').get()
    ]);

    var sortByDate = function(docs) {
      return docs.slice().sort(function(a, b) {
        var aT = a.data().listedAt ? a.data().listedAt.toMillis() : 0;
        var bT = b.data().listedAt ? b.data().listedAt.toMillis() : 0;
        return bT - aT;
      });
    };

    renderSection('pending-list', 'pending-count', sortByDate(results[0].docs), 'pending');
    renderSection('active-list', 'active-count', sortByDate(results[1].docs), 'active');
  } catch(e) {
    document.getElementById('pending-list').innerHTML = '<div class="loading-state">Failed to load — ' + e.message + '</div>';
    document.getElementById('active-list').innerHTML  = '<div class="loading-state">Failed to load — ' + e.message + '</div>';
  }
}

function renderSection(listId, countId, docs, mode) {
  document.getElementById(countId).textContent = docs.length;
  if (!docs.length) {
    document.getElementById(listId).innerHTML = '<div class="section-empty">' +
      (mode === 'pending' ? 'No pending submissions.' : 'No active listings yet.') + '</div>';
    return;
  }
  document.getElementById(listId).innerHTML = docs.map(function(doc) {
    var d = doc.data();
    var id = doc.id;
    var date = d.listedAt ? fmtDate(d.listedAt.toDate()) : '—';
    var typeBadge  = d.listingType === 'paid' ? '<span class="tag tag-paid">Paid</span>' : '<span class="tag tag-free">Free</span>';
    var toolType   = d.toolType   ? '<span class="tag tag-type">' + esc(d.toolType) + '</span>' : '';
    var category   = d.category   ? '<span class="tag tag-cat">'  + esc(d.category) + '</span>' : '';
    var approveBtn = mode === 'pending'
      ? '<button class="btn-approve" onclick="approveListing(\'' + id + '\', this)">Approve →</button>'
      : '';
    return '<div class="listing-row" id="row-' + id + '">' +
      '<div class="listing-info">' +
        '<div class="listing-name">' + esc(d.toolName || '—') + '</div>' +
        '<div class="listing-meta">' +
          'By <strong>' + esc(d.builderName || '—') + '</strong> · ' +
          (d.toolUrl ? '<a href="' + esc(d.toolUrl) + '" target="_blank" rel="noopener">View Tool ↗</a>' : 'No URL') + '<br>' +
          esc(d.description || '') +
        '</div>' +
        '<div class="listing-tags">' + typeBadge + toolType + category + '</div>' +
        '<div class="listing-date">Submitted ' + date + '</div>' +
      '</div>' +
      '<div class="listing-actions">' +
        approveBtn +
        '<button class="btn-delete" onclick="deleteListing(\'' + id + '\', this)">Delete</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function approveListing(id, btn) {
  btn.disabled = true;
  btn.textContent = 'Approving…';
  try {
    await db.collection('marketplace_listings').doc(id).update({ status: 'active' });
    var row = document.getElementById('row-' + id);
    if (row) {
      row.style.background = 'rgba(42,92,69,0.06)';
      row.querySelector('.listing-actions').innerHTML = '<span style="font-size:12px;font-weight:700;color:var(--green-light);">✓ Approved</span>';
    }
    // Update counts
    var pendingCount = document.getElementById('pending-count');
    pendingCount.textContent = Math.max(0, parseInt(pendingCount.textContent) - 1);
    var activeCount = document.getElementById('active-count');
    activeCount.textContent = parseInt(activeCount.textContent) + 1;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Approve →';
    alert('Error: ' + e.message);
  }
}

async function deleteListing(id, btn) {
  if (!confirm('Delete this listing? This cannot be undone.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    await db.collection('marketplace_listings').doc(id).delete();
    var row = document.getElementById('row-' + id);
    if (row) row.remove();
    // Update count
    var section = btn.closest('[id$="-list"]');
    if (section) {
      var countId = section.id.replace('-list', '-count');
      var countEl = document.getElementById(countId);
      if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Delete';
    alert('Error: ' + e.message);
  }
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waitlist — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --dark3: #1C1A17; --border-dark: #2A2720;
    --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE; --surface: #FFFFFF; --border: #E4E0D8;
    --text: #1A1714; --text2: #6B6560; --text3: #9E9891;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --sidebar-width: 220px; --header-height: 64px;
  }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; font-weight: 400; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 50; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: #F0EDE6; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .admin-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); border-radius: 100px; padding: 4px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

  .page-content { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; padding: 1.75rem 2rem; max-width: 900px; width: 100%; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .count-badge { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); border-radius: 100px; padding: 4px 12px; font-size: 12px; font-weight: 700; color: var(--gold); }
  .export-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 16px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .export-btn:hover { border-color: var(--gold); color: var(--gold); }

  .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 0.875rem 1.25rem; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; background: var(--bg); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAF8; }
  tbody td { padding: 0.875rem 1.25rem; font-size: 14px; color: var(--text); vertical-align: middle; }
  .td-name { font-weight: 700; }
  .td-email { color: var(--text2); font-size: 13px; }
  .td-time { color: var(--text3); font-size: 12px; white-space: nowrap; }
  .td-num { font-size: 12px; font-weight: 700; color: var(--text3); width: 48px; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .loading-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  #access-denied { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 3rem; text-align: center; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">Tool<span>Spark</span></div>
    <div class="logo-tag">Admin Panel</div>
  </div>
  <nav class="sidebar-nav">
    <a href="community.html" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Community
    </a>
    <a href="admindashboard.html" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Admin Dashboard
    </a>
    <a href="adminwaitlist.html" class="nav-item active">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Waitlist
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-role">Admin</div>
      </div>
    </div>
    <button class="logout-btn" onclick="auth.signOut().then(() => window.location.href='signon.html')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-wrap">
  <header class="top-header">
    <div>
      <div class="header-title">Waitlist</div>
      <div class="header-subtitle">Early access signups</div>
    </div>
    <div class="admin-badge">📋 Waitlist</div>
  </header>

  <div id="access-denied">
    <div style="font-size:2.5rem;">🔒</div>
    <div style="font-family:'Playfair Display',serif;font-size:22px;">Access Restricted</div>
    <div style="font-size:14px;color:var(--text2);">Admin only.</div>
    <a href="dashboard.html" style="color:var(--gold);font-weight:700;font-size:14px;text-decoration:none;">← Back</a>
  </div>

  <main class="page-content" id="admin-content" style="display:none;">

    <div class="top-bar">
      <span class="count-badge" id="count-badge">— signups</span>
      <button class="export-btn" onclick="exportCSV()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>

    <div class="admin-card">
      <div class="loading-state" id="list-loading">Loading...</div>
      <table id="waitlist-table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="waitlist-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">No signups yet. Share your waitlist link!</div>
    </div>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "82966513396",
    appId: "1:82966513396:web:f52b52b0ed2dc9537ac0a1"
  };
  firebase.initializeApp(firebaseConfig);
  firebase.appCheck().activate('6LefuOcsAAAAAD1Pbu-O1q94rMf8u3bdPYoS82zJ', true);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let allSignups = [];

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'signon.html'; return; }
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (!snap.exists || snap.data().userRole !== 'admin') {
        document.getElementById('access-denied').style.display = 'flex';
        return;
      }
    } catch(e) {
      document.getElementById('access-denied').style.display = 'flex';
      return;
    }

    document.getElementById('admin-content').style.display = 'flex';
    const name = user.displayName || user.email || 'Admin';
    document.getElementById('sidebar-name').textContent = name;
    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    else av.textContent = name.charAt(0).toUpperCase();

    loadWaitlist();
  });

  async function loadWaitlist() {
    try {
      const snap = await db.collection('waitlist').orderBy('joinedAt', 'asc').get();
      document.getElementById('list-loading').style.display = 'none';

      if (snap.empty) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('count-badge').textContent = '0 signups';
        return;
      }

      allSignups = snap.docs.map((d, i) => ({ ...d.data(), pos: i + 1 }));
      document.getElementById('count-badge').textContent = allSignups.length + ' signup' + (allSignups.length !== 1 ? 's' : '');

      document.getElementById('waitlist-body').innerHTML = allSignups.map(s => `
        <tr>
          <td class="td-num">${s.pos}</td>
          <td class="td-name">${escHtml(s.name || '—')}</td>
          <td class="td-email">${escHtml(s.email || '')}</td>
          <td class="td-time">${s.joinedAt ? s.joinedAt.toDate().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—'}</td>
        </tr>`).join('');

      document.getElementById('waitlist-table').style.display = 'table';
    } catch(e) {
      document.getElementById('list-loading').textContent = 'Could not load. Try refreshing.';
      console.error(e);
    }
  }

  function exportCSV() {
    if (!allSignups.length) return;
    const rows = [['#', 'Name', 'Email', 'Joined']];
    allSignups.forEach(s => {
      const date = s.joinedAt ? s.joinedAt.toDate().toLocaleDateString() : '';
      rows.push([s.pos, s.name || '', s.email || '', date]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'toolspark-waitlist.csv';
    a.click();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>

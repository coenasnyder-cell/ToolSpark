<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Projects — ToolSpark Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0C0B09; --dark2: #141210; --dark3: #1C1A17;
    --border-dark: #2A2720; --gold: #C9A84C; --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12); --bg: #F4F2EE; --surface: #FFFFFF;
    --border: #E4E0D8; --text: #1A1714; --text2: #6B6560; --text3: #9E9891;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --sidebar-width: 220px; --header-height: 64px;
  }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; letter-spacing: 0.01em; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; font-weight: 400; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: background 0.15s, color 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  .sidebar-close-btn { display: none; background: none; border: none; color: #9A9488; cursor: pointer; padding: 4px; border-radius: 6px; }
  .sidebar-close-btn:hover { color: #F0EDE6; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; display: block; }

  /* MAIN */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 50; gap: 12px; }
  .page-content { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; padding: 1.75rem 2rem; max-width: 1200px; width: 100%; }

  /* CARDS */
  .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .admin-card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .admin-card-header-left { display: flex; align-items: center; gap: 12px; }
  .admin-card-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .admin-card-title { font-weight: 700; font-size: 15px; color: var(--text); }
  .admin-card-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .admin-card-body { padding: 1.5rem; }

  /* PROJECT GRID */
  .course-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
  .course-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 1rem 1.125rem; display: flex; flex-direction: column; gap: 0.85rem;
  }
  .course-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .course-copy { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .course-title { font-family: 'Playfair Display', serif; font-size: 19px; line-height: 1.2; color: var(--text); }
  .course-desc { font-size: 13px; color: var(--text2); line-height: 1.55; }
  .course-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .course-badge {
    display: inline-flex; align-items: center; border-radius: 100px; padding: 3px 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--border); color: var(--text2); background: #fff;
  }
  .course-badge.live { background: rgba(42,122,85,0.08); border-color: rgba(42,122,85,0.2); color: #2A7A55; }
  .course-badge.draft { background: rgba(192,57,43,0.06); border-color: rgba(192,57,43,0.18); color: #C0392B; }
  .course-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text3); }
  .course-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #project-empty { display: none; text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }

  /* BUTTONS */
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; background: var(--gold); color: #1A1714; border: none; border-radius: var(--radius-sm); padding: 9px 18px; font-size: 13px; font-weight: 700; font-family: 'Lato', sans-serif; cursor: pointer; transition: opacity 0.15s; text-decoration: none; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .btn-outline:hover { border-color: var(--text3); color: var(--text); }

  .loading-state { display: flex; align-items: center; justify-content: center; padding: 3rem; gap: 10px; color: var(--text3); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #access-denied { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 3rem; text-align: center; }

  @media (max-width: 860px) { .course-grid { grid-template-columns: 1fr; } }
  @media (max-width: 1024px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .main-wrap { margin-left: 60px; }
  }
  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-close-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
    .sidebar-overlay { display: block; }
    .main-wrap { margin-left: 0; }
    .page-content { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div>
      <div class="logo-text">Tool<span>Spark</span></div>
      <div class="logo-tag">Builder Platform</div>
    </div>
    <button class="sidebar-close-btn" id="sidebar-close-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-role" id="sidebar-role">Builder</div>
      </div>
    </div>
    <button class="logout-btn" onclick="auth.signOut().then(() => window.location.href='signon.html')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-wrap">
  <header class="top-header"></header>

  <div id="access-denied">
    <div style="font-size:2.5rem;">🔒</div>
    <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text);">Access Restricted</div>
    <div style="font-size:14px;color:var(--text2);">You need an active account to view this page.</div>
    <a href="dashboard.html" style="color:var(--gold);font-weight:700;font-size:14px;text-decoration:none;">← Back to Dashboard</a>
  </div>

  <main class="page-content" id="main-content" style="display:none;">

    <div class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-header-left">
          <div class="admin-card-icon">🎬</div>
          <div>
            <div class="admin-card-title">All Lesson Projects</div>
            <div class="admin-card-desc" id="project-count-desc">Loading...</div>
          </div>
        </div>
        <button class="btn-primary" id="btn-new" onclick="createProject()">
          + New Project
        </button>
      </div>
      <div class="admin-card-body">
        <div class="loading-state" id="projects-loading">
          <div class="spinner"></div> Loading projects...
        </div>
        <div class="course-grid" id="projects-grid" style="display:none;"></div>
        <div id="project-empty">No lesson projects yet. Click "New Project" to get started.</div>
      </div>
    </div>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script src="js/nav.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJ0aVMa7M_Bs_Rg7otoAuckI86OtsFUgE",
    authDomain: "toolspark-2d62d.firebaseapp.com",
    projectId: "toolspark-2d62d",
    storageBucket: "toolspark-2d62d.firebasestorage.app",
    messagingSenderId: "822894840120",
    appId: "1:822894840120:web:99c418b3e81ef9a0a11b72"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  try {
    firebase.appCheck().activate('6LfxWCsrAAAAAIkmBgN9b5hB9_TOdcXwHELZFqf-', true);
  } catch(e) {}

  let currentUser = null;

  // ── Auth ──────────────────────────────────────────────────
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'signon.html'; return; }
    currentUser = user;
    document.getElementById('main-content').style.display = 'flex';
    const name = user.displayName || user.email || 'Builder';
    document.getElementById('sidebar-name').textContent = name;
    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      av.innerHTML = `<img src="${user.photoURL}" alt="avatar">`;
    } else {
      av.textContent = name.charAt(0).toUpperCase();
    }
    if (window.initNav) initNav('lesson-projects', 'Lesson Generator');
    loadProjects();
  });

  // ── Load Projects ─────────────────────────────────────────
  async function loadProjects() {
    try {
      const snap = await db.collection('lesson_projects')
        .orderBy('createdAt', 'desc')
        .get();

      document.getElementById('projects-loading').style.display = 'none';

      const docs = snap.docs;
      document.getElementById('project-count-desc').textContent =
        docs.length === 1 ? '1 project' : `${docs.length} projects`;

      if (docs.length === 0) {
        document.getElementById('project-empty').style.display = 'block';
        return;
      }

      const grid = document.getElementById('projects-grid');
      grid.style.display = 'grid';
      grid.innerHTML = docs.map(doc => projectCardHTML(doc.id, doc.data())).join('');
    } catch(e) {
      document.getElementById('projects-loading').style.display = 'none';
      document.getElementById('project-empty').style.display = 'block';
      document.getElementById('project-empty').textContent = 'Failed to load projects.';
    }
  }

  function projectCardHTML(id, data) {
    const status     = data.status || 'draft';
    const title      = data.title || 'Untitled Project';
    const toolName   = data.toolName || '';
    const created    = data.createdAt?.toDate?.()?.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) || '';
    const badgeClass = status === 'complete' ? 'live' : 'draft';
    const badgeLabel = status === 'complete' ? 'Complete' : 'Draft';

    return `<div class="course-card">
      <div class="course-top">
        <div class="course-copy">
          <div class="course-title">${escHtml(title)}</div>
          ${toolName ? `<div class="course-desc">${escHtml(toolName)}</div>` : ''}
        </div>
      </div>
      <div class="course-badges">
        <span class="course-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="course-meta">
        ${created ? `Created ${created}` : ''}
      </div>
      <div class="course-actions">
        <a class="btn-primary" href="lesson-project-editor.html?projectId=${id}">Open Editor →</a>
      </div>
    </div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Create Project ────────────────────────────────────────
  async function createProject() {
    const btn = document.getElementById('btn-new');
    btn.disabled = true;
    btn.textContent = 'Creating...';
    try {
      const ref = await db.collection('lesson_projects').add({
        title:     'Untitled Project',
        toolName:  '',
        status:    'draft',
        userId:    currentUser.uid,
        userEmail: currentUser.email || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        overview:    {},
        script:      {},
        voice:       {},
        videoStatus: { done: false },
        exportStatus: {
          hasWalkthroughVideo: false,
          hasVoiceover1:       false,
          hasVoiceover2:       false,
          hasSlides:           false,
          hasVideo:            false
        }
      });
      window.location.href = `lesson-project-editor.html?projectId=${ref.id}`;
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '+ New Project';
      alert('Failed to create project: ' + e.message);
    }
  }
</script>
</body>
</html>

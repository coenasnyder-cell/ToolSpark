<title>Members — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --green: #2A5C45;
    --green-light: #3D8A65;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    --sidebar-width: 220px;
    --header-height: 64px;
  }

  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ── SIDEBAR ── */
  .sidebar { width: var(--sidebar-width); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; border-right: 1px solid var(--border-dark); transition: transform 0.3s ease; }
  .sidebar-logo { padding: 1.5rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: space-between; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #F0EDE6; }
  .logo-text span { color: var(--gold); }
  .logo-tag { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; font-weight: 700; }
  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--border-dark); text-transform: uppercase; letter-spacing: 0.14em; padding: 0.75rem 0.5rem 0.5rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: #9A9488; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F0EDE6; }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border-dark); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 12px; margin-top: 4px; background: none; border: none; border-radius: var(--radius-sm); color: #6B5F5F; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; text-align: left; }
  .logout-btn:hover { background: rgba(220,50,50,0.1); color: #E05555; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; color: #F0EDE6; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }
  .sidebar-close-btn { display: none; background: none; border: none; color: #9A9488; cursor: pointer; padding: 4px; border-radius: 6px; }
  .sidebar-close-btn:hover { color: #F0EDE6; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  /* ── MAIN ── */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .top-header { background: var(--dark2); border-bottom: 1px solid var(--border-dark); height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 50; gap: 1rem; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hamburger-btn { display: none; background: none; border: none; color: #F0EDE6; cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.15s; }
  .hamburger-btn:hover { background: rgba(255,255,255,0.08); }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: #F0EDE6; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .notif-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--dark3); border: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #9A9488; transition: all 0.15s; position: relative; text-decoration: none; }
  .notif-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--gold); }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; border: 1px solid var(--dark2); display: none; }

  /* ── PAGE ── */
  .page-content { flex: 1; padding: 1.75rem 2rem; max-width: 1100px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 3rem; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); transition: border-color 0.15s; outline: none; }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text3); }
  .filter-chip { padding: 7px 16px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; font-weight: 700; color: var(--text2); background: var(--surface); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
  .filter-chip.active { background: var(--dark); border-color: var(--dark); color: var(--gold-light); }
  .member-count { font-size: 13px; color: var(--text3); margin-left: auto; white-space: nowrap; }

  /* ── GRID ── */
  .members-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

  /* ── MEMBER CARD ── */
  .member-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem 1.25rem; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem; text-decoration: none; color: inherit; transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s; }
  .member-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: rgba(201,168,76,0.35); }

  .member-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #fff; flex-shrink: 0; overflow: hidden; margin-bottom: 0.25rem; letter-spacing: -0.5px; }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .member-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .member-level { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 10px; border-radius: 100px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); margin-top: 2px; }
  .member-level.legendary { background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(232,213,163,0.15)); border-color: rgba(201,168,76,0.5); color: var(--gold); }

  .member-stats { display: flex; align-items: center; gap: 14px; margin-top: 6px; }
  .member-stat { display: flex; flex-direction: column; align-items: center; }
  .member-stat-val { font-size: 16px; font-weight: 900; color: var(--gold); line-height: 1; }
  .member-stat-val.streak { color: var(--text); }
  .member-stat-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .member-stat-divider { width: 1px; height: 24px; background: var(--border); }

  .member-joined { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .view-profile { font-size: 12px; font-weight: 700; color: var(--gold); margin-top: 8px; transition: color 0.15s; }
  .member-card:hover .view-profile { color: var(--gold-light); }

  /* ── EMPTY / LOADING ── */
  .state-msg { text-align: center; padding: 4rem 2rem; color: var(--text3); font-size: 14px; grid-column: 1 / -1; }
  .state-msg svg { display: block; margin: 0 auto 1rem; opacity: 0.35; }

  /* ── MOBILE BOTTOM NAV ── */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--dark); border-top: 1px solid var(--border-dark); z-index: 200; align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: #7A7468; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .mobile-nav-item.active, .mobile-nav-item:hover { color: var(--gold); }

  /* ── RESPONSIVE ── */
  @media (max-width: 1023px) {
    .sidebar { width: 60px; }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: none; }
    .main-wrap { margin-left: 60px; }
    .nav-item { justify-content: center; padding: 10px; }
    .members-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 767px) {
    .sidebar { width: 280px; transform: translateX(-100%); z-index: 300; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-logo > div:first-child, .nav-section-label, .nav-item span, .logo-tag, .user-info { display: block; }
    .nav-item { justify-content: flex-start; padding: 9px 12px; }
    .sidebar-close-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
    .sidebar-overlay { display: block; }
    .hamburger-btn { display: flex; }
    .main-wrap { margin-left: 0; }
    .top-header { padding: 0 1rem; height: 54px; }
    .page-content { padding: 1rem 1rem 80px; gap: 1rem; }
    .members-grid { grid-template-columns: repeat(2, 1fr); }
    .mobile-bottom-nav { display: flex; }
    .member-count { display: none; }
  }
  @media (max-width: 480px) {
    .members-grid { grid-template-columns: 1fr; }
    .page-content { padding: 0.875rem 0.875rem 80px; }
  }
</style>

    { level: 4, name: 'Community Builder',    min: 600 },
    { level: 5, name: 'Community Expert',     min: 1000 },
    { level: 6, name: 'Community Pro',        min: 2000 },
    { level: 7, name: 'Community Leader',     min: 4000 },
    { level: 8, name: 'Top Performer',        min: 7000 },
    { level: 9, name: 'LEGENDARY',            min: 10000 },
  ];

  const AVATAR_GRADIENTS = [
    'linear-gradient(135deg,#2A5C45,#3D8A65)',
    'linear-gradient(135deg,#4B3F8A,#6B5FCA)',
    'linear-gradient(135deg,#C4622D,#E08050)',
    'linear-gradient(135deg,#1A4A6B,#2E7AAF)',
    'linear-gradient(135deg,#6B2A5C,#A04090)',
    'linear-gradient(135deg,#5C4A2A,#9A7A45)',
  ];

  let allMembers = [];
  let searchQuery = '';
  let activeFilter = 'all';

  function getUserLevel(points) {
    let cur = LEVELS[0];
    for (const l of LEVELS) { if (points >= l.min) cur = l; else break; }
    return cur;
  }

  function avatarGradient(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_GRADIENTS[Math.abs(hash) % AVATAR_GRADIENTS.length];
  }

  function initials(name) {
    const parts = name.trim().split(/\s+/);
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();
  }

  function formatJoinDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return 'Joined ' + d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── AUTH ──────────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'signon.html'; return; }

    const name = user.displayName || user.email || 'Builder';
    document.getElementById('sidebar-name').textContent = name;
    const av = document.getElementById('sidebar-avatar');
    if (user.photoURL) {
      av.innerHTML = '<img src="' + esc(user.photoURL) + '" alt="avatar">';
    } else {
      av.textContent = name.charAt(0).toUpperCase();
    }

    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists && snap.data().userRole === 'admin') {
        document.getElementById('admin-nav-link').style.display = 'flex';
        document.getElementById('sidebar-role').textContent = 'Admin';
      }
    } catch(e) {}

    try {
      const notifSnap = await db.collection('notifications')
        .where('userId', '==', user.uid).where('read', '==', false).limit(1).get();
      if (!notifSnap.empty) document.getElementById('notif-dot').style.display = 'block';
    } catch(e) {}

    loadMembers();
  });

  // ── LOAD ──────────────────────────────────────────────────────────────────
  async function loadMembers() {
    const grid = document.getElementById('members-grid');
    try {
      const snap = await db.collection('users')
        .orderBy('points', 'desc')
        .get();

      allMembers = snap.docs.map(function(doc) {
        return Object.assign({ id: doc.id }, doc.data());
      });

      renderGrid();
    } catch(e) {
      console.error(e);
      grid.innerHTML = '<div class="state-msg">Could not load members. Please refresh.</div>';
    }
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('members-grid');
    const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

    let list = allMembers;

    if (activeFilter === 'new') {
      list = list.filter(function(m) {
        if (!m.createdAt) return false;
        const d = m.createdAt.toDate ? m.createdAt.toDate() : new Date(m.createdAt);
        return d.getTime() >= oneWeekAgo;
      });
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(function(m) {
        return (m.displayName || '').toLowerCase().includes(q);
      });
    }

    document.getElementById('member-count').textContent = list.length + ' member' + (list.length !== 1 ? 's' : '');

    if (list.length === 0) {
      const msg = searchQuery
        ? 'No members match "' + esc(searchQuery) + '".'
        : activeFilter === 'new'
          ? 'No new members joined this week.'
          : 'No members found.';
      grid.innerHTML = '<div class="state-msg">' + msg + '</div>';
      return;
    }

    grid.innerHTML = list.map(renderCard).join('');
  }

  function renderCard(m) {
    const name = m.displayName || 'Builder';
    const points = m.points || 0;
    const streak = m.streak || 0;
    const lvl = getUserLevel(points);
    const isLegendary = lvl.level === 9;
    const joinDate = formatJoinDate(m.createdAt);

    const avatarHtml = m.photoURL
      ? '<img src="' + esc(m.photoURL) + '" alt="' + esc(name) + '">'
      : initials(name);
    const avatarBg = m.photoURL ? 'transparent' : avatarGradient(name);

    const streakHtml = streak >= 3
      ? '🔥 ' + streak
      : streak > 0
        ? streak + ' day' + (streak !== 1 ? 's' : '')
        : '—';

    return '<a href="profile.html?uid=' + esc(m.id) + '" class="member-card">' +
      '<div class="member-avatar" style="background:' + avatarBg + '">' + avatarHtml + '</div>' +
      '<div class="member-name">' + esc(name) + '</div>' +
      '<div class="member-level' + (isLegendary ? ' legendary' : '') + '">' + esc(lvl.name) + '</div>' +
      '<div class="member-stats">' +
        '<div class="member-stat">' +
          '<div class="member-stat-val">' + points.toLocaleString() + '</div>' +
          '<div class="member-stat-label">Points</div>' +
        '</div>' +
        '<div class="member-stat-divider"></div>' +
        '<div class="member-stat">' +
          '<div class="member-stat-val streak">' + streakHtml + '</div>' +
          '<div class="member-stat-label">Streak</div>' +
        '</div>' +
      '</div>' +
      (joinDate ? '<div class="member-joined">' + esc(joinDate) + '</div>' : '') +
      '<div class="view-profile">View Profile →</div>' +
    '</a>';
  }

  // ── FILTERS & SEARCH ──────────────────────────────────────────────────────
  document.querySelectorAll('.filter-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('member-search').addEventListener('input', function() {
    searchQuery = this.value.trim();
    renderGrid();
  });

  // ── SIDEBAR MOBILE ────────────────────────────────────────────────────────
  document.getElementById('hamburger-btn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
  window.addEventListener('resize', function() { if (window.innerWidth > 767) closeSidebar(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members — ToolSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #0C0B09;
    --dark2: #141210;
    --dark3: #1C1A17;
    --border-dark: #2A2720;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,168,76,0.12);
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --border: #E4E0D8;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9891;
    --green: #2A5C45;
    --green-light: #3D8A65;
    --radius: 22px;
    --radius-sm: 14px;
    --shadow: 0 18px 45px rgba(34,27,18,0.08);
    --shadow-md: 0 10px 30px rgba(34,27,18,0.08);
    --sidebar-width: 220px;
    --header-height: 64px;
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }

  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(180deg, #FFFEFC 0%, #F7F4EE 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── MAIN ── */
  .main-wrap { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── PAGE ── */
  .page-content {
    flex: 1;
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    padding: 1.75rem 2rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  #dashboard-hero .ts-hero-avatar-wrap,
  #dashboard-hero .ts-hero-avatar-wrap.ts-hero-avatar-small {
    width: 104px;
    max-width: 104px;
  }
  #dashboard-hero .ts-hero-avatar-plain,
  #dashboard-hero .ts-hero-avatar-wrap.ts-hero-avatar-small .ts-hero-avatar-plain {
    max-width: 104px;
  }

  /* ── TOOLBAR ── */
  .toolbar-shell {
    background: linear-gradient(180deg, #F6F1E8 0%, #EFE7D8 100%);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    box-shadow: var(--shadow);
  }
  .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 380px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-input {
    width: 100%;
    min-height: 48px;
    padding: 0.9rem 0.95rem 0.9rem 2.2rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: rgba(255,255,255,0.96);
    transition: border-color 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
    outline: none;
    box-shadow: var(--shadow);
  }
  .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  .search-input::placeholder { color: var(--text3); }
  .filter-chip {
    min-height: 44px;
    padding: 0.7rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 12px;
    font-weight: 800;
    color: var(--text2);
    background: rgba(255,255,255,0.96);
    cursor: pointer;
    transition: border-color 0.18s var(--ease-out), color 0.18s var(--ease-out), transform 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .filter-chip:hover { border-color: var(--gold); color: #A57C1D; transform: translateY(-1px); }
  .filter-chip.active { background: linear-gradient(180deg, #181613 0%, #0C0B09 100%); border-color: var(--dark); color: var(--gold-light); box-shadow: 0 12px 24px rgba(12,11,9,0.14); }
  .member-count { font-size: 13px; color: var(--text3); margin-left: auto; white-space: nowrap; }


  /* ── GRID ── */
  .members-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }

  /* ── MEMBER CARD ── */
  .member-card {
    background: var(--surface); border: 1px solid rgba(201,168,76,0.26);
    border: 1px solid rgba(201,168,76,0.55);
    padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
    text-decoration: none; color: inherit;
    transition: box-shadow 0.18s var(--ease-out), transform 0.18s var(--ease-out), border-color 0.18s var(--ease-out);
    position: relative;
    height: 270px;
    overflow: hidden;
    box-shadow: none;
  }
  .member-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); border-color: rgba(201,168,76,0.35); }

  /* status badge row */
  .card-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--text3); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.today  { background: #2A8C5A; }
  .status-dot.week   { background: var(--gold); }
  .status-dot.away   { background: #C4BEB4; }
  .card-status.today  { color: #2A8C5A; }
  .card-status.week   { color: #8A6E1E; }

  /* avatar + name row */
  .card-header { display: flex; align-items: center; gap: 12px; }
  .member-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: #fff; flex-shrink: 0; overflow: hidden; letter-spacing: -0.5px; }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-identity { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .member-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-level { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 9px; border-radius: 100px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25); color: #8A6E1E; width: fit-content; }
  .member-level.legendary { background: linear-gradient(135deg,rgba(201,168,76,0.2),rgba(232,213,163,0.15)); border-color: rgba(201,168,76,0.5); }

  /* bio */
  .member-bio { font-size: 13px; color: var(--text2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .member-bio.is-placeholder { color: var(--text3); }

  /* lower meta */
  .member-meta {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .member-building { font-size: 12px; color: var(--text3); }
  .member-building strong { color: var(--text); font-weight: 700; }

  /* stats row */
  .member-stats { display: flex; align-items: center; gap: 14px; }
  .member-stat-inline { font-size: 12px; font-weight: 700; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .member-stat-inline span { color: var(--text3); font-weight: 400; }

  .view-profile { font-size: 12px; font-weight: 700; color: var(--gold); transition: color 0.15s; }
  .member-card:hover .view-profile { color: #8A6E1E; }

  /* ── INVITE CARD ── */
  .invite-card {
    background: var(--surface); border: 1.5px dashed var(--border);
    border-radius: var(--radius); box-shadow: none;
    padding: 28px 20px;
    height: 270px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 12px;
  }
  .invite-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold-dim); border: 1.5px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
  }
  .invite-heading { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .invite-sub { font-size: 12px; color: var(--text3); line-height: 1.5; }
  .invite-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px; border-radius: 8px;
    background: var(--dark); color: #F0EDE6;
    font-family: inherit; font-size: 13px; font-weight: 700;
    text-decoration: none; border: none; cursor: pointer;
    transition: opacity 0.15s, transform 0.15s; margin-top: 4px;
  }
  .invite-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* ── LOAD MORE ── */
  .load-more-btn {
    padding: 11px 32px; border-radius: 100px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text); font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: border-color 0.18s var(--ease-out), background 0.18s var(--ease-out), transform 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
    box-shadow: var(--shadow);
  }
  .load-more-btn:hover { border-color: var(--gold); background: var(--bg); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  /* ── EMPTY / LOADING ── */
  .state-msg { text-align: center; padding: 4rem 2rem; color: var(--text3); font-size: 14px; grid-column: 1 / -1; }
  .state-msg svg { display: block; margin: 0 auto 1rem; opacity: 0.35; }

  @media (max-width: 1023px) {
    .members-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 860px) {
    .main-wrap { margin-left: 0; }
  }
  @media (max-width: 767px) {
    .page-content { padding: 1rem 1rem 1.5rem; gap: 1rem; }
    .spotlight { 
      display: none; 
    }
    .spotlight-left { 
      display: none;
     }
    .members-grid { grid-template-columns: repeat(2, 1fr); }
    .member-count { display: none; }
  }
  @media (max-width: 480px) {
    .members-grid { grid-template-columns: 1fr; }
    .page-content { padding: 0.875rem 0.875rem 1.5rem; }
     .spotlight { 
      display: none; 
    }
    .spotlight-left { 
      display: none;
     }
  }
</style>
</head>

<!-- MAIN -->
<div class="main-wrap">
  <header class="top-header"></header>

  <div class="page-content">
<div id="dashboard-hero"></div>

    <!-- TOOLBAR -->

<script>
  const LEVELS = [
    { level: 1, name: 'Beginner',            min: 0 },
    { level: 2, name: 'Action Taker',         min: 100 },
    { level: 3, name: 'Creative Contributor', min: 300 },
    { level: 4, name: 'Community Builder',    min: 600 },
    { level: 5, name: 'Community Expert',     min: 1000 },
    { level: 6, name: 'Community Pro',        min: 2000 },
    { level: 7, name: 'Community Leader',     min: 4000 },
    { level: 8, name: 'Top Performer',        min: 7000 },
    { level: 9, name: 'LEGENDARY',            min: 10000 },
  ];

  const AVATAR_GRADIENTS = [
    'linear-gradient(135deg,#2A5C45,#3D8A65)',
    'linear-gradient(135deg,#4B3F8A,#6B5FCA)',
    'linear-gradient(135deg,#C4622D,#E08050)',
    'linear-gradient(135deg,#1A4A6B,#2E7AAF)',
    'linear-gradient(135deg,#6B2A5C,#A04090)',
    'linear-gradient(135deg,#5C4A2A,#9A7A45)',
  ];

  let allMembers = [];
  let searchQuery = '';
  let activeFilter = 'all';
  const PAGE_SIZE = 12;
  let visibleCount = PAGE_SIZE;

  function getUserLevel(points) {
    let cur = LEVELS[0];
    for (const l of LEVELS) { if (points >= l.min) cur = l; else break; }
    return cur;
  }

  function avatarGradient(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_GRADIENTS[Math.abs(hash) % AVATAR_GRADIENTS.length];
  }

  function initials(name) {
    const parts = name.trim().split(/\s+/);
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();
  }

  function formatJoinDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return 'Joined ' + d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── AUTH ──────────────────────────────────────────────────────────────────
  window.addEventListener('tsUserReady', async function() {
    const user = firebase.auth().currentUser;
    if (!user) return;
    loadSpotlight();
    loadMembers();
  });

  // ── SPOTLIGHT ─────────────────────────────────────────────────────────────
  async function loadSpotlight() {
    try {
      const doc = await db.collection('settings').doc('memberSpotlight').get();
      if (!doc.exists) return;
      const d = doc.data();
      if (d.name) {
        document.getElementById('spotlight-name').textContent        = d.name;
        document.getElementById('spotlight-attribution').textContent = '— ' + d.name;
      }
      if (d.achievement) document.getElementById('spotlight-achievement').textContent = d.achievement;
      if (d.quote)       document.getElementById('spotlight-quote').textContent       = d.quote;
      if (d.profileUid) {
        document.getElementById('spotlight-btn').href = 'profile.html?uid=' + d.profileUid;
      }
      const av = document.getElementById('spotlight-avatar');
      // Prefer stored photoURL, then fall back to fetching from user doc
      if (d.photoURL) {
        av.innerHTML = '<img src="' + d.photoURL + '" alt="' + (d.name || '') + '">';
        av.style.background = 'transparent';
      } else if (d.profileUid) {
        const userDoc = await db.collection('users').doc(d.profileUid).get();
        const photo = userDoc.exists && userDoc.data().photoURL;
        if (photo) {
          av.innerHTML = '<img src="' + photo + '" alt="' + (d.name || '') + '">';
          av.style.background = 'transparent';
        } else if (d.name) {
          av.textContent = d.name.charAt(0).toUpperCase();
        }
      } else if (d.name) {
        av.textContent = d.name.charAt(0).toUpperCase();
      }
    } catch(e) { console.error('spotlight:', e); }
  }

  // ── LOAD ──────────────────────────────────────────────────────────────────
  async function loadMembers() {
    const grid = document.getElementById('members-grid');
    try {
      const snap = await db.collection('users')
        .orderBy('points', 'desc')
        .get();

      allMembers = snap.docs.map(function(doc) {
        return Object.assign({ id: doc.id }, doc.data());
      });

      renderGrid();
    } catch(e) {
      console.error(e);
      grid.innerHTML = '<div class="state-msg">Could not load members. Please refresh.</div>';
    }
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('members-grid');
    const oneWeekAgo  = Date.now() - 7  * 24 * 60 * 60 * 1000;
    const oneMonthAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;

    let list = allMembers;

    if (activeFilter === 'active') {
      list = list.filter(function(m) { return (m.streak || 0) > 0; });
    } else if (activeFilter === 'new') {
      list = list.filter(function(m) {
        if (!m.createdAt) return false;
        const d = m.createdAt.toDate ? m.createdAt.toDate() : new Date(m.createdAt);
        return d.getTime() >= oneWeekAgo;
      });
    } else if (activeFilter === 'recent') {
      list = list.filter(function(m) {
        if (!m.createdAt) return false;
        const d = m.createdAt.toDate ? m.createdAt.toDate() : new Date(m.createdAt);
        return d.getTime() >= oneMonthAgo;
      });
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(function(m) {
        return (m.displayName || '').toLowerCase().includes(q);
      });
    }

    document.getElementById('member-count').textContent = list.length + ' member' + (list.length !== 1 ? 's' : '');

    if (list.length === 0) {
      const msg = searchQuery
        ? 'No members match "' + esc(searchQuery) + '".'
        : activeFilter === 'active'  ? 'No active members with a current streak.'
        : activeFilter === 'new'     ? 'No new members joined this week.'
        : activeFilter === 'recent'  ? 'No members joined in the last 30 days.'
        : 'No members found.';
      grid.innerHTML = '<div class="state-msg">' + msg + '</div>';
      return;
    }

    const visible = list.slice(0, visibleCount);
    const hasMore = list.length > visibleCount;

    const inviteCard = '<div class="invite-card">' +
      '<div class="invite-icon">' +
        '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>' +
      '</div>' +
      '<div class="invite-heading">More builders.<br>More ideas. More impact.</div>' +
      '<div class="invite-sub">Know someone who should be building here?</div>' +
      '<a href="community.html" class="invite-btn">Invite a Builder</a>' +
    '</div>';
    grid.innerHTML = visible.map(renderCard).join('') + (!hasMore ? inviteCard : '');

    const loadMoreWrap = document.getElementById('load-more-wrap');
    if (hasMore) {
      loadMoreWrap.style.display = 'flex';
      loadMoreWrap.querySelector('button').textContent = 'Load More (' + (list.length - visibleCount) + ' remaining)';
    } else {
      loadMoreWrap.style.display = 'none';
    }
  }

  function renderCard(m) {
    const name    = m.displayName || 'Builder';
    const points  = m.points || 0;
    const streak  = m.streak || 0;
    const lvl     = getUserLevel(points);
    const bio     = (m.bio || '').trim();
    const bioText = bio || 'Profile coming soon...';
    const tool    = m.toolName || m.workingOn || '';

    const avatarHtml = m.photoURL
      ? '<img src="' + esc(m.photoURL) + '" alt="' + esc(name) + '">'
      : initials(name);
    const avatarBg = m.photoURL ? 'transparent' : avatarGradient(name);

    // Status badge from lastActiveAt or streak
    var statusClass = 'away', statusLabel = 'Away';
    if (m.lastActiveAt) {
      const ms  = m.lastActiveAt.toDate ? m.lastActiveAt.toDate().getTime() : new Date(m.lastActiveAt).getTime();
      const age = Date.now() - ms;
      if (age < 86400000)      { statusClass = 'today'; statusLabel = 'Active today'; }
      else if (age < 604800000){ statusClass = 'week';  statusLabel = 'Active this week'; }
    } else if (streak > 0) {
      statusClass = 'week'; statusLabel = 'Active this week';
    }

    const streakHtml = streak > 0 ? '🔥 ' + streak + ' day streak' : '🔥 0 day streak';

    return '<a href="profile.html?uid=' + esc(m.id) + '" class="member-card">' +
      '<div class="card-status ' + statusClass + '"><span class="status-dot ' + statusClass + '"></span>' + statusLabel + '</div>' +
      '<div class="card-header">' +
        '<div class="member-avatar" style="background:' + avatarBg + '">' + avatarHtml + '</div>' +
        '<div class="card-identity">' +
          '<div class="member-name">' + esc(name) + '</div>' +
          '<div class="member-level' + (lvl.level === 9 ? ' legendary' : '') + '">' + esc(lvl.name) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="member-bio' + (bio ? '' : ' is-placeholder') + '">' + esc(bioText) + '</div>' +
      '<div class="member-meta">' +
        (tool ? '<div class="member-building">Building: <strong>' + esc(tool) + '</strong></div>' : '') +
        '<div class="member-stats">' +
          '<div class="member-stat-inline">⭐ ' + points.toLocaleString() + ' <span>pts</span></div>' +
          '<div class="member-stat-inline">' + streakHtml + '</div>' +
        '</div>' +
        '<div class="view-profile">View Profile →</div>' +
      '</div>' +
    '</a>';
  }

  // ── FILTERS & SEARCH ──────────────────────────────────────────────────────
  document.querySelectorAll('.filter-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      visibleCount = PAGE_SIZE;
      renderGrid();
    });
  });

  document.getElementById('load-more-btn').addEventListener('click', function() {
    visibleCount += PAGE_SIZE;
    renderGrid();
  });

  document.getElementById('member-search').addEventListener('input', function() {
    searchQuery = this.value.trim();
    visibleCount = PAGE_SIZE;
    renderGrid();
  });

</script>
